name: CI
# push / PR ごとにロジックの回帰テストを自動実行（依存ゼロ・npm install不要）。
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # 各 test は実コードを評価して検証するため、構文エラーもここで弾ける。
      - name: App logic tests (index.html)
        run: node test.js
      - name: Community backend tests (community-gas/Code.gs)
        run: node test-gas.js
