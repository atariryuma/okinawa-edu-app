// 出典テキストに条番号を明示しているので、ページ内の目次から該当条へ辿れる。
function srcLink(src){const s=String(src||'');for(const x of LAW_LINKS){if(s.indexOf(x.p)>=0)return{u:x.u,t:'📖 条文を読む'};}for(const x of DOC_LINKS){if(s.indexOf(x.p)>=0)return{u:x.u,t:'📖 資料を読む'};}return null;}
function srcChk(src){const l=srcLink(src);const st='margin-left:10px;color:var(--accent);text-decoration:underline;white-space:nowrap';return l?`<a class="srcchk" href="${l.u}" target="_blank" rel="noopener noreferrer" aria-label="出典を新しいタブで開く" style="${st}">${l.t}</a>`:`<a class="srcchk" href="https://www.google.com/search?q=${encodeURIComponent(src||'')}" target="_blank" rel="noopener noreferrer" aria-label="出典を検索して確認（新しいタブ）" style="${st}">🔍 ネットで調べる</a>`;}
function srcLine(q){return `<div class="src"><span>出典：${esc(q.src)}</span>${srcChk(q.src)}</div>`;}
function answer(id,ok,grade){review(id,ok,grade);sAnswered++;if(ok){sCorrect++;sStreak++;}else{sStreak=0;sWrongIds.push(id);} // セッション内の連続正解と誤答idを記録
  const ss=document.getElementById('sstat');if(ss){const r=ss.querySelector('.sstreak');if(r)r.textContent=sStreak>1?('🔥 '+sStreak+'連続正解'):'';}
  store.totalAnswered=(store.totalAnswered||0)+1;if(ok)store.totalCorrect=(store.totalCorrect||0)+1;
  const d=todayStr();store.dailyDone=store.dailyDone||{};store.dailyDone[d]=(store.dailyDone[d]||0)+1;
  store.dailyDone=pruneDailyDone(store.dailyDone); // 古い日次記録を剪定（共通ヘルパ）
  save();
  if(navigator.vibrate)try{navigator.vibrate(ok?15:[12,40,12]);}catch(_){}        // 触覚フィードバック（非対応端末は無視）
  const g=store.dailyGoal||10;if(store.dailyDone[d]===g)celebrate('🎉 今日の目標 '+g+'問 達成！'); // その日初めてゴール到達した瞬間だけ
}
// 控えめなお祝い（節目のみ）。reduced-motion 尊重・依存ゼロの軽量confetti。
function celebrate(msg){try{toast(msg);}catch(_){}
  try{if(matchMedia('(prefers-reduced-motion:reduce)').matches)return;}catch(_){return;}
  const n=document.createElement('div');n.className='confetti';
  const cols=['#0e7490','#15803d','#b5651d','#9a2c6e','#f59e0b','#2563eb'];
  for(let i=0;i<26;i++){const s=document.createElement('i');s.style.left=(Math.random()*100)+'%';s.style.background=cols[i%cols.length];s.style.animationDelay=(Math.random()*0.25).toFixed(2)+'s';n.appendChild(s);}
  document.body.appendChild(n);setTimeout(()=>{n.remove();},1700);}

// 自己採点の使い方を初回だけ説明（正直な自己評価を促す）。表示は一度きり。
function gradeHintHTML(){if(localStorage.getItem('oki_grade_hint')==='1')return '';localStorage.setItem('oki_grade_hint','1');
  return `<div class="hint" style="font-size:.72rem;margin:8px 2px 0;color:var(--sub)">💡 3段階で自己評価（キー 1/2/3）。「あいまい」＝すぐ復習／「できた」＝標準／「楽勝」＝間隔を長めに。正直に押すほど復習が最適化されます。</div>`;}
const GRADE3=`<div style="margin-top:11px;display:flex;gap:7px">
        <button class="btn ng" style="flex:1" id="g0">✗ あいまい</button>
        <button class="btn ok" style="flex:1" id="g1">◯ できた</button>
        <button class="btn ok" style="flex:1;background:#2563eb;border-color:#2563eb" id="g2">◎ 楽勝</button></div>`;
function bindGrade3(card,id){
  card.querySelector('#g0').addEventListener('click',()=>{answer(id,false);srSay('あいまい。弱点として記録。後日また出題します。');toast('🎯 弱点として記録（また戻します）');quizIdx++;showQ();});
  card.querySelector('#g1').addEventListener('click',()=>{answer(id,true);srSay('できた。記録しました。次の問題に進みます。');toast('◯ できたと記録');quizIdx++;showQ();});
  card.querySelector('#g2').addEventListener('click',()=>{answer(id,true,'easy');srSay('楽勝。間隔を長めにしました。次の問題に進みます。');toast('◎ 楽勝（間隔を長く）');quizIdx++;showQ();});
}
function renderQA(q,meta,id,card){
  card.innerHTML=`<div class="quizcard">${meta}<div class="qtext">${esc(q.q)}</div>
    <button class="btn ghost wide" id="showA">答えを表示</button>
    <div class="reveal ok" id="A"><b>A.</b> ${esc(q.a)}${srcLine(q)}${GRADE3.replace(/id="g0"/,'id="g0" disabled').replace(/id="g1"/,'id="g1" disabled').replace(/id="g2"/,'id="g2" disabled')}${gradeHintHTML()}</div></div>`;
  card.querySelector('#showA').addEventListener('click',()=>{const a=card.querySelector('#A');a.classList.add('show');a.setAttribute('role','status');a.tabIndex=-1;a.focus({preventScroll:true});['#g0','#g1','#g2'].forEach(s=>{const b=card.querySelector(s);if(b)b.disabled=false;});}); // 答えを見てから採点（キー操作の先取りも防止）
  bindGrade3(card,id);
}
function renderMC(q,meta,id,card){
  const ks=['A','B','C','D','E','F'],kl=i=>ks[i]||String(i+1); // 7択以上でもラベルが undefined にならないようフォールバック
  // 選択肢をシャッフル（位置で答えを覚えるのを防ぐ）。orig=元のインデックス、ansPos=正答の表示位置。
  const opts=shuffle(q.choices.map((c,i)=>({c,orig:i})));
  const ansPos=opts.findIndex(o=>o.orig===q.ans);
  card.innerHTML=`<div class="quizcard">${meta}<div class="qtext">${esc(q.q)}</div>
    <div id="ch">${opts.map((o,i)=>`<button class="choice" data-i="${i}"><span class="k">${kl(i)}</span><span>${esc(o.c)}</span></button>`).join('')}</div>
    <div class="reveal" id="R"></div></div>`;
  const wrap=card.querySelector('#ch');
  wrap.querySelectorAll('.choice').forEach(b=>b.addEventListener('click',()=>{
    const snap=snapAnswer(id);   // 採点前の状態を退避（取り消し用）
    const i=+b.dataset.i,ok=i===ansPos;
    wrap.querySelectorAll('.choice').forEach((x,j)=>{x.disabled=true;
      if(j===ansPos){x.classList.add('correct');x.querySelector('.k').textContent='✓';}
      if(j===i&&!ok){x.classList.add('wrong');x.querySelector('.k').textContent='✗';}});
    answer(id,ok);const R=card.querySelector('#R');R.className='reveal show '+(ok?'ok':'ng');
    R.innerHTML=`<b>${ok?'✅ 正解':'❌ 不正解'}</b>　正答：${kl(ansPos)}. ${esc(opts[ansPos].c)}<br>${esc(q.exp)}${srcLine(q)}<button class="btn ghost" id="mcundo" style="margin-top:8px;padding:3px 11px;min-height:auto;font-size:.74rem">← 回答を取り消す</button>${nextBtn()}`;bindNext(card);
    const u=R.querySelector('#mcundo');if(u)u.addEventListener('click',()=>{undoAnswer(snap,id);toast('回答を取り消しました');});
    R.setAttribute('role','status');R.tabIndex=-1;R.focus({preventScroll:true}); // 採点結果をSRへ通知＋フォーカス移動
  }));
}
function renderCloze(q,meta,id,card){
  // 答えは aria-hidden の子に入れ、SRには表示状態を aria-label で伝える（color:transparentだけでは音声で答えが先読みされる対策）
  const html=q.parts.map(p=>typeof p==='string'?esc(p):`<span class="blank" tabindex="0" role="button" aria-label="空欄（タップで答えを表示）" data-ans="${esc(p.b)}"><span aria-hidden="true">${esc(p.b)}</span></span>`).join('');
  card.innerHTML=`<div class="quizcard cloze">${meta}
    <div class="redtoggle"><button class="btn ghost" id="allrev">全部めくる</button><span style="font-size:.72rem;color:var(--sub)">下線部をタップ/Enterで表示</span></div>
    <div class="qtext" style="font-weight:500;font-size:1rem">${html}</div>
    ${GRADE3.replace(/id="g0"/,'id="g0" disabled').replace(/id="g1"/,'id="g1" disabled').replace(/id="g2"/,'id="g2" disabled')}${gradeHintHTML()}${srcLine(q)}</div>`;
  const gbs=[card.querySelector('#g0'),card.querySelector('#g1'),card.querySelector('#g2')];
  const enableGrade=()=>gbs.forEach(b=>{if(b)b.disabled=false;}); // 答えを見てから採点（qaと同様・自己採点の信頼性向上）
  const setLbl=b=>b.setAttribute('aria-label',b.classList.contains('show')?('答え：'+(b.dataset.ans||'')):'空欄（タップで答えを表示）');
  const toggle=b=>{b.classList.toggle('show');setLbl(b);enableGrade();};
  card.querySelectorAll('.blank').forEach(b=>{b.addEventListener('click',()=>toggle(b));b.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle(b);}});});
  card.querySelector('#allrev').addEventListener('click',()=>{card.querySelectorAll('.blank').forEach(b=>{b.classList.add('show');setLbl(b);});enableGrade();});
  bindGrade3(card,id);
}
function renderOrder(q,meta,id,card){
  const sh=shuffle(q.items.map((t,i)=>({t,i})));
  card.innerHTML=`<div class="quizcard">${meta}<div class="qtext">${esc(q.q)}</div>
    <ul class="orderlist" id="ol">${sh.map((o,pos)=>`<li draggable="true" data-i="${o.i}" aria-label="${pos+1}番目：${esc(o.t)}"><span class="num" aria-hidden="true">≡</span><span class="txt">${esc(o.t)}</span><span class="mv"><button class="up" aria-label="上へ">▲</button><button class="dn" aria-label="下へ">▼</button></span></li>`).join('')}</ul>
    <button class="btn wide" id="ck">答え合わせ</button><div class="reveal" id="R"></div></div>`;
  const ul=card.querySelector('#ol');let drag=null,answered=false;
  const renumber=()=>{[...ul.children].forEach((li,i)=>{const t=(li.querySelector('.txt')||{}).textContent||'';li.setAttribute('aria-label',(i+1)+'番目：'+t);});}; // 並び替え後にaria-labelの番号を更新
  const move=(li,dir)=>{if(answered)return;let moved=false;if(dir<0&&li.previousElementSibling){ul.insertBefore(li,li.previousElementSibling);moved=true;}if(dir>0&&li.nextElementSibling){ul.insertBefore(li.nextElementSibling,li);moved=true;}
    if(moved){renumber();const pos=[...ul.children].indexOf(li)+1,t=(li.querySelector('.txt')||{}).textContent||'';srSay(t+' を '+pos+'番目に移動しました');}};
  ul.addEventListener('click',e=>{const li=e.target.closest('li');if(!li)return;if(e.target.classList.contains('up'))move(li,-1);if(e.target.classList.contains('dn'))move(li,1);});
  ul.addEventListener('dragstart',e=>{if(answered)return;drag=e.target.closest('li');drag.classList.add('dragging');});
  ul.addEventListener('dragend',e=>{if(drag)drag.classList.remove('dragging');drag=null;renumber();});
  ul.addEventListener('dragover',e=>{e.preventDefault();if(!drag)return;const a=after(e.clientY);if(a==null)ul.appendChild(drag);else ul.insertBefore(drag,a);});
  ul.addEventListener('touchmove',e=>{if(!drag)return;e.preventDefault();const a=after(e.touches[0].clientY);if(a==null)ul.appendChild(drag);else ul.insertBefore(drag,a);},{passive:false});
  ul.querySelectorAll('.num').forEach(n=>{n.addEventListener('touchstart',e=>{drag=e.target.closest('li');drag.classList.add('dragging');},{passive:true});});
  ul.addEventListener('touchend',()=>{if(drag){drag.classList.remove('dragging');drag=null;renumber();}});
  function after(y){return [...ul.querySelectorAll('li:not(.dragging)')].reduce((c,ch)=>{const box=ch.getBoundingClientRect();const off=y-box.top-box.height/2;return off<0&&off>c.off?{off,el:ch}:c;},{off:-Infinity}).el;}
  card.querySelector('#ck').addEventListener('click',()=>{
    if(answered)return;answered=true;
    const order=[...ul.children].map(li=>+li.dataset.i),ok=order.every((v,i)=>v===i);
    answer(id,ok);ul.querySelectorAll('li').forEach(li=>li.setAttribute('draggable','false'));
    const R=card.querySelector('#R');R.className='reveal show '+(ok?'ok':'ng');
    R.innerHTML=`<b>${ok?'✅ 正しい順です':'❌ 違います'}</b>${ok?'':'　正しい順：<br>'+q.items.map((t,i)=>`${i+1}. ${esc(t)}`).join('<br>')}<br>${esc(q.exp)}${srcLine(q)}${nextBtn()}`;bindNext(card);
    R.setAttribute('role','status');R.tabIndex=-1;R.focus({preventScroll:true});
    card.querySelector('#ck').disabled=true;
  });
}
function renderMatch(q,meta,id,card){
  const left=q.pairs.map((p,i)=>({t:p[0],i})),right=shuffle(q.pairs.map((p,i)=>({t:p[1],i})));
  card.innerHTML=`<div class="quizcard">${meta}<div class="qtext">${esc(q.q)}</div>
    <div class="matchwrap"><div class="matchcol" id="L" aria-label="左の項目（選んでから右を選ぶ）">${left.map(o=>`<button data-i="${o.i}" aria-pressed="false">${esc(o.t)}</button>`).join('')}</div>
      <div class="matchcol" id="R" aria-label="右の項目">${right.map(o=>`<button data-i="${o.i}" aria-pressed="false">${esc(o.t)}</button>`).join('')}</div></div><div class="reveal" id="RR"></div></div>`;
  let selL=null,done=0,miss=false;const L=card.querySelector('#L'),R=card.querySelector('#R');
  L.addEventListener('click',e=>{const b=e.target.closest('button');if(!b||b.classList.contains('done'))return;L.querySelectorAll('button').forEach(x=>{x.classList.remove('sel');x.setAttribute('aria-pressed','false');});b.classList.add('sel');b.setAttribute('aria-pressed','true');selL=b;srSay('「'+b.textContent+'」を選択。対応する右側の項目を選んでください');});
  R.addEventListener('click',e=>{const b=e.target.closest('button');if(!b||b.classList.contains('done')||!selL)return;
    if(+b.dataset.i===+selL.dataset.i){const ltxt=selL.textContent;b.classList.add('done');b.textContent='✓ '+b.textContent;selL.classList.add('done');selL.classList.remove('sel');selL.setAttribute('aria-pressed','true');b.setAttribute('aria-pressed','true');selL=null;done++;
      srSay('「'+ltxt+'」と「'+b.textContent.replace('✓ ','')+'」を対応づけました。残り '+(q.pairs.length-done)+' 組');
      if(done===q.pairs.length){answer(id,!miss);const r=card.querySelector('#RR');r.className='reveal show '+(miss?'ng':'ok');r.innerHTML=`<b>${miss?'クリア（ミスあり→要復習に記録）':'✅ 全問正解！'}</b>${srcLine(q)}${nextBtn()}`;bindNext(card);r.setAttribute('role','status');r.tabIndex=-1;r.focus({preventScroll:true});}
    }else{miss=true;b.classList.add('wrong');setTimeout(()=>b.classList.remove('wrong'),450);srSay('不一致です。別の組み合わせを選んでください');toast('不一致');}
  });
}

function bindUserQ(el){
  const q=s=>el.querySelector(s);const ty=q('#uqType');if(!ty)return;
  uqEditId=null; // フォーム再生成のたびに編集状態をクリア（途中放棄で次の新規追加が誤って既存を置換するのを防ぐ）。編集はこの後 loadUqForEdit で再設定。
  ty.addEventListener('change',()=>{const v=ty.value;
    q('#uqQA').style.display=v==='qa'?'block':'none';
    q('#uqMC').style.display=v==='mc'?'grid':'none';
    q('#uqCloze').style.display=v==='cloze'?'block':'none';
    q('#uqOrder').style.display=v==='order'?'block':'none';
    q('#uqMatch').style.display=v==='match'?'block':'none';
    const qq=q('#uqQ');if(qq)qq.placeholder=v==='cloze'?'問題文（任意・穴埋めは下の欄へ）':'問題文';
  });
  q('#uqAdd').addEventListener('click',()=>{
    const cat=(q('#uqCat').value||'自作').trim(),qt=q('#uqQ').value.trim(),src=(q('#uqSrc').value||'自作問題').trim();
    const v=ty.value;
    if(v!=='cloze'&&!qt){toast('問題文を入力してください');return;}   // clozeは穴埋め文を本体に使うので問題文は任意
    const id=uqEditId||('u'+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36)); // 編集中は同idを維持
    let obj;
    if(v==='qa'){const a=q('#uqA').value.trim();if(!a){toast('答えを入力してください');return;}obj={id,type:'qa',cat,q:qt,a,src};}
    else if(v==='mc'){const raw=[...el.querySelectorAll('.uqChoice')].map(x=>x.value.trim());
      const ansRaw=+(el.querySelector('input[name=uqCorrect]:checked')||{value:0}).value;
      if(!raw[ansRaw]){toast('正解に選んだ選択肢が空です');return;}
      const choices=[];let ans=0;raw.forEach((c,i)=>{if(c){if(i===ansRaw)ans=choices.length;choices.push(c);}});
      if(choices.length<2){toast('選択肢を2つ以上入力してください');return;}
      obj={id,type:'mc',cat,q:qt,choices,ans,exp:(q('#uqExp').value||'').trim(),src};}
    else if(v==='cloze'){const txt=q('#uqClozeText').value;const parts=[];const re=/\[\[(.+?)\]\]/g;let last=0,m,blanks=0;
      while((m=re.exec(txt))){if(m.index>last)parts.push(txt.slice(last,m.index));parts.push({b:m[1].trim()});last=m.index+m[0].length;blanks++;}
      if(last<txt.length)parts.push(txt.slice(last));
      if(!blanks){toast('空欄を [[答え]] の形で1つ以上入れてください');return;}
      obj={id,type:'cloze',cat,parts,src};}
    else if(v==='order'){const items=q('#uqOrderItems').value.split('\n').map(x=>x.trim()).filter(Boolean);
      if(items.length<2){toast('項目を2行以上入力してください（正しい順）');return;}
      obj={id,type:'order',cat,q:qt,items,exp:(q('#uqOrderExp').value||'').trim(),src};}
    else{const pairs=q('#uqMatchPairs').value.split('\n').map(l=>l.split('|').map(x=>x.trim())).filter(p=>p.length===2&&p[0]&&p[1]);
      if(pairs.length<2){toast('「左 | 右」の組を2行以上入力してください');return;}
      obj={id,type:'match',cat,q:qt,pairs,src};}
    if(!validQuestion(obj)){toast('入力内容を確認してください');return;}   // 念のため型検証してから保存
    obj.mtime=Date.now();   // 最終編集時刻（mergeStoreの勝者判定＝端末間で編集が巻き戻らない）
    store.userQuestions=store.userQuestions||[];
    if(uqEditId){store.userQuestions=store.userQuestions.filter(x=>x.id!==uqEditId);} // 編集＝同idで置換（cards進捗を維持）
    store.userQuestions.push(obj);save();rebuildQuestions();
    const wasEdit=!!uqEditId;uqEditId=null;
    if(typeof gSignedIn!=='undefined'&&gSignedIn)cloudSync();
    const share=q('#uqShare');let shared=false;
    if(!wasEdit&&share&&share.checked&&getCommunityUrl()){
      // 初回だけ明示的に同意を取り、以降は確認なし（＝無意識共有を維持）
      if(localStorage.getItem('oki_shareok')==='1'||confirm('この問題を「みんなの問題」として共有します。\n問題文・選択肢・解説・出典が他の利用者にも公開されます（ログイン時は自動公開）。\n実名・校内限りの情報・市販教材の転載は含めないでください。\n\n共有しますか？（今後この確認は表示しません）')){
        localStorage.setItem('oki_shareok','1');shared=true;
        submitCommunity(obj).then(r=>toast(r&&r.status==='approved'?'追加し、みんなに共有しました ✓':'追加し、共有に出しました（承認後に公開）')).catch(err=>{elog({type:'community',msg:'投稿失敗:'+err.message});toast('追加しました（共有の送信は失敗）');});
      }
    }
    if(!shared)toast(wasEdit?'保存しました ✓':'追加しました（自作 '+store.userQuestions.length+'問）');
    renderProg();
    // フォーム再生成後、アコーディオンを開いたまま問題文入力にフォーカスを戻す（連続追加しやすく）
    const box=document.querySelector('#uqBox');if(box){box.open=true;const f=box.querySelector('#uqQ');if(f)f.focus();}
  });
  // 自作問題の編集：フォームに読み込み、保存で同idを置換。削除：1問だけ消す。
  function loadUqForEdit(eid){const u=(store.userQuestions||[]).find(x=>x.id===eid);if(!u)return;
    if(u.type==='mc'&&((u.choices||[]).length>4||u.ans>3)){toast('選択肢が5つ以上の問題はこの画面では編集できません（削除して作り直してください）');return;} // 4入力フォームで表現できず選択肢消失/正解ズレを招くため拒否
    uqEditId=eid;
    ty.value=u.type;ty.dispatchEvent(new Event('change'));
    q('#uqCat').value=u.cat||'';q('#uqSrc').value=u.src||'';q('#uqQ').value=u.q||'';
    if(u.type==='qa')q('#uqA').value=u.a||'';
    else if(u.type==='mc'){const ch=u.choices||[];[...el.querySelectorAll('.uqChoice')].forEach((inp,i)=>inp.value=ch[i]||'');const rs=el.querySelectorAll('input[name=uqCorrect]');if(rs[u.ans])rs[u.ans].checked=true;q('#uqExp').value=u.exp||'';}
    else if(u.type==='cloze')q('#uqClozeText').value=(u.parts||[]).map(p=>typeof p==='string'?p:('[['+(p&&p.b||'')+']]')).join('');
    else if(u.type==='order'){q('#uqOrderItems').value=(u.items||[]).join('\n');q('#uqOrderExp').value=u.exp||'';}
    else if(u.type==='match')q('#uqMatchPairs').value=(u.pairs||[]).map(p=>p[0]+' | '+p[1]).join('\n');
    const ab=q('#uqAdd');if(ab)ab.textContent='✓ 保存（編集中）';
    const box=document.querySelector('#uqBox');if(box)box.open=true;q('#uqQ').scrollIntoView({behavior:'smooth',block:'center'});
    toast('編集モード：直して「保存」を押してください');}
  el.querySelectorAll('.uqedit').forEach(b=>b.addEventListener('click',()=>loadUqForEdit(b.dataset.id)));
  el.querySelectorAll('.uqdel').forEach(b=>b.addEventListener('click',()=>{const u=(store.userQuestions||[]).find(x=>x.id===b.dataset.id);if(!u)return;
    if(!confirm('この自作問題を削除しますか？\n'+uqLabel(u).slice(0,40)))return;
    store.userQuestions=(store.userQuestions||[]).filter(x=>x.id!==b.dataset.id);save();rebuildQuestions();if(typeof gSignedIn!=='undefined'&&gSignedIn)cloudSync();renderProg();toast('削除しました');}));
  const sa=q('#uqShareAll');if(sa)sa.addEventListener('click',async()=>{
    if(!getCommunityUrl())return;if(!confirm('自作問題を「みんなの問題」に出しますか？（承認後に全員へ表示）'))return;

    </div>

    <button class="btn ghost wide" id="toSettings" style="margin-top:16px">⚙️ 同期・自作問題・データ管理・設定へ</button>`;
  // heatmap: 8週間（GitHub風コントリビューショングリッド。曜日=行・週=列）
  const heat=el.querySelector('#heat');
  if(heat){const cnt={};Object.values(store.cards).forEach(c=>Array.isArray(c.hist)&&c.hist.forEach(h=>{const dd=new Date(h.t);const k=dd.getFullYear()+'-'+(dd.getMonth()+1)+'-'+dd.getDate();cnt[k]=(cnt[k]||0)+1;}));

  el.querySelectorAll('.statbox').forEach(b=>{const act=()=>{const a=b.dataset.act;if(a==='due'){go('quiz');startQuiz('daily');}else if(a==='weak'){go('quiz');startQuiz('review');}else{const s=el.querySelector('#catmaster');if(s)s.scrollIntoView({behavior:'smooth',block:'start'});}};b.addEventListener('click',act);b.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();act();}});}); // スタットをドリルダウン導線に
  {const ts=el.querySelector('#toSettings');if(ts)ts.addEventListener('click',()=>go('settings'));}
}

function mergeStore(a,b){if(!b)return a;const out=JSON.parse(JSON.stringify(a));out.cards=out.cards||{};

    const la=lastAct(ca),lb=lastAct(cb);

   out.lastDate=(bD>aD)?b.lastDate:((aD>bD)?a.lastDate:(a.lastDate||b.lastDate||null));
   out.streak=(bD>aD)?(b.streak||0):((aD>bD)?(a.streak||0):Math.max(a.streak||0,b.streak||0));}

  {const by={};[...(a.userQuestions||[]),...(b.userQuestions||[])].forEach(q=>{if(q&&q.id){const ex=by[q.id];if(!ex||(q.mtime||0)>=(ex.mtime||0))by[q.id]=q;}});out.userQuestions=Object.values(by);}

  {const dr=Object.assign({},a.ronbunDrafts||{});const bd=b.ronbunDrafts||{};Object.keys(bd).forEach(k=>{if(!dr[k]||String(bd[k]).length>String(dr[k]).length)dr[k]=bd[k];});out.ronbunDrafts=dr;}

  {const dd=Object.assign({},a.dailyDone||{});const bd=b.dailyDone||{};Object.keys(bd).forEach(k=>{dd[k]=Math.max(dd[k]||0,bd[k]||0);});out.dailyDone=pruneDailyDone(dd);} // 結合後に剪定
  {const ab=Array.isArray(a.bookmarks)?a.bookmarks:[],bb=Array.isArray(b.bookmarks)?b.bookmarks:[];out.bookmarks=[...new Set([...ab,...bb].filter(k=>typeof k==='string'))];} // 付箋は和集合（非配列/非文字列は無視）
  {const seen={},ar=Array.isArray(a.recent)?a.recent:[],br=Array.isArray(b.recent)?b.recent:[];out.recent=[...ar,...br].filter(it=>it&&typeof it==='object'&&it.t&&it.id!=null).sort((x,y)=>(y.ts||0)-(x.ts||0)).filter(it=>{const k=it.t+':'+it.id;return seen[k]?false:(seen[k]=1,true);}).slice(0,12);} // 最近見たは時刻順で結合・上位12（壊れ要素は除外）
  // 論文の自己チェックは深いOR（どちらかでチェック済みなら残す）。設定は「より最近学習した端末」を採用（lastDate勝者）
  {const oc=Object.assign({},a.ronbunChecks||{}),bc=b.ronbunChecks||{};Object.keys(bc).forEach(t=>{oc[t]=Object.assign({},oc[t]||{});Object.keys(bc[t]||{}).forEach(k=>{if(bc[t][k])oc[t][k]=true;});});out.ronbunChecks=oc;}
  {const bWins=ymdNum(b.lastDate||'')>ymdNum(a.lastDate||'');const pick=(ka)=>{const bv=b[ka];if(bWins&&bv!=null)out[ka]=bv;};pick('dailyGoal');pick('theme');pick('fontScale');}
  return out;}
// ファイル復元(信頼できない入力)の浄化：累積統計は信用せずcards履歴から再計算、未来ts履歴を除去、不正フィールドを落とす（巨大値による正答率破綻・乗っ取りを防ぐ）
function sanitizeImport(o){const s={};o=o||{};
  s.cards={};if(o.cards&&typeof o.cards==='object'&&!Array.isArray(o.cards)){const num=(v,d)=>Number.isFinite(v)?v:d;Object.keys(o.cards).forEach(id=>{const c=o.cards[id];if(!c||typeof c!=='object')return;
    const hist=(Array.isArray(c.hist)?c.hist:[]).filter(h=>h&&typeof h.t==='number'&&h.t<=Date.now()+864e5).slice(-200); // 未来ts除去＋巨大hist上限（マージ前の負荷スパイク回避）
    const card={box:Math.min(Math.max(Math.round(num(c.box,1))||1,1),5),reps:Math.max(num(c.reps,0),0),fails:Math.max(num(c.fails,0),0),due:num(c.due,0),ef:Math.min(Math.max(num(c.ef,EF_DEFAULT),EF_MIN),EF_MAX),ivl:Math.min(Math.max(num(c.ivl,0),0),IVL_MAX),hist}; // 数値はホワイトリスト＋範囲チェック（garbageカードの静かな死蔵を防ぐ）
    if(Number.isFinite(c.pli))card.pli=c.pli;s.cards[id]=card;});}
  let ta=0,tc=0;Object.values(s.cards).forEach(c=>(c.hist||[]).forEach(h=>{ta++;if(h.ok)tc++;}));s.totalAnswered=ta;s.totalCorrect=tc; // 統計は履歴から再計算
  if(typeof o.streak==='number'&&o.streak>=0&&o.streak<100000)s.streak=o.streak;
  if(typeof o.lastDate==='string')s.lastDate=o.lastDate;
  if(typeof o.examDate==='string'&&/^\d{4}-\d{1,2}-\d{1,2}$/.test(o.examDate))s.examDate=o.examDate; // 書式厳格化（任意文字列の混入を遮断）
  if(typeof o.examDateT==='number'&&isFinite(o.examDateT))s.examDateT=o.examDateT;
  if(Array.isArray(o.userQuestions))s.userQuestions=o.userQuestions.filter(validQuestion).map(x=>Object.assign({},x,{mtime:typeof x.mtime==='number'?x.mtime:Date.now()})); // 自作問題に mtime 補完
  if(o.ronbunDrafts&&typeof o.ronbunDrafts==='object'&&!Array.isArray(o.ronbunDrafts)){s.ronbunDrafts={};Object.keys(o.ronbunDrafts).slice(0,50).forEach(k=>{s.ronbunDrafts[String(k).slice(0,80)]=String(o.ronbunDrafts[k]||'').slice(0,8000);});} // 下書きはキー/値長をクランプ
  s.dailyDone=pruneDailyDone(o.dailyDone); // 取り込み時も剪定
  if(Array.isArray(o.bookmarks))s.bookmarks=o.bookmarks.filter(k=>typeof k==='string');
  if(Array.isArray(o.recent))s.recent=o.recent.filter(r=>r&&typeof r==='object'&&r.t&&r.id!=null).slice(0,12).map(r=>({t:String(r.t).slice(0,8),id:String(r.id).slice(0,80),label:String(r.label||'').slice(0,40),ts:Number(r.ts)||0})); // 型/長さを正規化
  if(typeof o.dailyGoal==='number'&&o.dailyGoal>0&&o.dailyGoal<1000)s.dailyGoal=o.dailyGoal;
  return s;}
// 同時実行の直列化：背景同期・クイズ終了・付箋などが重なっても driveSave の競合(ロストアップデート)を防ぐ。
// 実行中に来た要求は1回だけ後追い予約（非quietを優先＝失敗トーストを握り潰さない）。最新ローカル状態で必ずもう一度押し上げる。
let _syncing=false,_syncQueued=false,_syncQueuedLoud=false;
async function cloudSync(quiet){if(!accessToken)return;
  if(_syncing){_syncQueued=true;if(!quiet)_syncQueuedLoud=true;return;} // 進行中→後追いを予約
  _syncing=true;
  try{
    await _doSync(quiet);
    while(_syncQueued){_syncQueued=false;const loud=_syncQueuedLoud;_syncQueuedLoud=false;await _doSync(!loud);}
  }finally{_syncing=false;}
}
async function _doSync(quiet){if(!accessToken)return;try{
  const f=await driveFind();const cloud=f?await driveGet(f.id):null;
  const merged=mergeStore(store,cloud);
  await driveSave(merged);          // 先にクラウドへ書込（失敗時は例外でローカル不変＝データ喪失を防ぐ）
  store=merged;save();              // クラウド成功を確認してからローカルを確定
  try{localStorage.setItem('oki_last_sync',String(Date.now()));}catch(e){} // 最終同期時刻（UIの安心材料）
  rebuildQuestions();               // 同期で増えた自作問題を即出題対象に（リロード不要・validQuestionで検証）
  renderHome();mountSync();updateAuthBadge(); // 同期カード/ヘッダーバッジ/ホームの「最終同期」も更新
}catch(e){console.warn(e);
  if(/HTTP 401/.test(String(e&&e.message||e))){accessToken=null;gSignedIn=false;mountSync();updateAuthBadge();trySilentSignIn();return;} // アクセストークン失効→UIを最新化しつつ無音で再取得（次回同期で自動復帰）
  if(!quiet)toast('同期に失敗しました');}}  // 背景同期(quiet)は失敗トーストを出さない
function relTime(ts){if(!ts)return '';const s=Math.max(0,Math.floor((Date.now()-ts)/1000));if(s<60)return 'たった今';const m=Math.floor(s/60);if(m<60)return m+'分前';const h=Math.floor(m/60);if(h<24)return h+'時間前';const d=Math.floor(h/24);return d+'日前';} // 最終同期の相対表示
function mountSync(){
  const mt=document.getElementById('syncMount');if(!mt)return;const cid=getClientId();
  const lastSync=lastSyncMs();
  mt.innerHTML=`<div class="synccard ${gSignedIn?'on':''}">
    <div class="st"><span class="dotg"></span>${gSignedIn?'Googleと同期中':'Google Driveに進捗を保存'}</div>
    <small>${gSignedIn?'進捗はDriveのアプリ専用フォルダに保存され、複数の端末で引き継げます。':'ログインすると、スマホとPCで進捗を共有できます（Driveの隠しアプリフォルダに保存）。'} <a href="privacy.html" target="_blank" rel="noopener noreferrer" aria-label="プライバシーポリシーを新しいタブで開く" style="color:inherit;text-decoration:underline">プライバシーポリシー</a></small>
    ${gSignedIn&&lastSync?`<div class="synclast" style="font-size:.72rem;color:var(--sub);margin-top:6px">最終同期：${relTime(lastSync)}</div>`:''}
    ${cid?'':`<input id="cidIn" placeholder="Google OAuth クライアントIDを貼り付け（…apps.googleusercontent.com）" aria-label="クライアントID">`}
    <div class="syncrow" style="margin-top:10px">
      ${cid?'':'<button class="btn" id="saveCid">IDを保存</button>'}
      ${gSignedIn?'<button class="btn" id="syncNow">今すぐ同期</button><button class="btn ghost" id="signOut">サインアウト</button>'
        :(cid?'<button class="btn" id="signIn">Googleでログイン</button>':'')}
      ${cid&&!hasDefaultClientId()?'<button class="btn ghost" id="clrCid" style="flex:0 0 auto">ID変更</button>':''}
    </div>
    ${hasDefaultClientId()?`<details class="rb" style="margin-top:10px"><summary style="font-size:.74rem;color:var(--sub)">⚙️ 別のGoogleクライアントIDを使う<span class="chev">›</span></summary>
      <small style="display:block;margin:6px 0">このアプリを自分のサイト／フォークで使う方向け。ご自身のOAuthクライアントID（承認済みオリジンを自分のドメインに設定したもの）を入れてください。${customClientId()?'<b>現在：独自IDを使用中</b>':'現在：既定IDを使用中'}。</small>
      <input id="cidIn2" placeholder="…apps.googleusercontent.com" aria-label="独自クライアントID">
      <div class="syncrow" style="margin-top:8px"><button class="btn" id="saveCid2">保存して使う</button>${customClientId()?'<button class="btn ghost" id="clrCid2">既定に戻す</button>':''}</div>
    </details>`:''}
    </div>`;
  const q=s=>mt.querySelector(s);
  if(q('#saveCid'))q('#saveCid').addEventListener('click',()=>{const v=q('#cidIn').value.trim();if(!v){toast('IDを入力してください');return;}localStorage.setItem('gclient',v);tokenClient=null;mountSync();toast('保存しました。ログインできます');});
  if(q('#clrCid'))q('#clrCid').addEventListener('click',()=>{localStorage.removeItem('gclient');tokenClient=null;accessToken=null;gSignedIn=false;mountSync();});
  if(q('#saveCid2'))q('#saveCid2').addEventListener('click',()=>{const v=q('#cidIn2').value.trim();if(!v){toast('IDを入力してください');return;}localStorage.setItem('gclient',v);tokenClient=null;accessToken=null;gSignedIn=false;mountSync();toast('独自IDを保存しました。ログインできます');}); // フォーク利用者：既定IDを上書き
  if(q('#clrCid2'))q('#clrCid2').addEventListener('click',()=>{localStorage.removeItem('gclient');tokenClient=null;accessToken=null;gSignedIn=false;mountSync();toast('既定IDに戻しました');});
  if(q('#signIn'))q('#signIn').addEventListener('click',signInGoogle);
  if(q('#syncNow'))q('#syncNow').addEventListener('click',async(e)=>{const b=e.currentTarget;if(b.disabled)return;b.disabled=true;const o=b.textContent;b.textContent='同期中…';try{await cloudSync();toast('同期しました ✓');}finally{b.disabled=false;b.textContent=o;}}); // 二重押し防止＋進行表示
  if(q('#signOut'))q('#signOut').addEventListener('click',signOutGoogle);
}

//==================== PWA ====================
let _swSkip=false;
// 新しい版が待機中になったら、控えめなトーストで通知（タップで適用）。無視すれば現行のまま使い続けられる。
function swUpdateReady(reg){
  const t=document.getElementById('toast');if(!t||!reg.waiting)return;
  t.textContent='🆕 新しい版があります（タップで更新）';t.style.pointerEvents='auto';t.style.cursor='pointer';t.classList.add('show');
  const reset=()=>{t.style.pointerEvents='';t.style.cursor='';t.removeEventListener('click',apply);};
  function apply(){_swSkip=true;reset();t.classList.remove('show');if(reg.waiting)reg.waiting.postMessage({type:'SKIP_WAITING'});}
  t.addEventListener('click',apply);
  clearTimeout(window._swHideT);window._swHideT=setTimeout(()=>{if(_swSkip)return;reset();t.classList.remove('show');},9000);
}
if('serviceWorker' in navigator){
  // 更新を「適用」した時だけリロード（初回インストールの controllerchange では何もしない＝勝手なリロードを防ぐ）。
  navigator.serviceWorker.addEventListener('controllerchange',()=>{if(_swSkip){_swSkip=false;location.reload();}});
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(reg=>{
      if(reg.waiting&&navigator.serviceWorker.controller)swUpdateReady(reg);   // 既に待機中の更新があれば通知
      reg.addEventListener('updatefound',()=>{const nw=reg.installing;if(!nw)return;
        nw.addEventListener('statechange',()=>{if(nw.state==='installed'&&navigator.serviceWorker.controller)swUpdateReady(reg);});});
    }).catch(()=>{});
  });
}
// ===== PWAインストール促進（ホーム画面に追加）=====
let _a2hsPrompt=null;
function a2hsBar(html,onAdd){
  if(document.getElementById('a2hsBar')||localStorage.getItem('oki_a2hs')==='off')return;
  try{if(matchMedia('(display-mode:standalone)').matches||navigator.standalone)return;}catch(_){} // インストール済みは出さない
  const bar=document.createElement('div');bar.id='a2hsBar';
  bar.style.cssText='position:fixed;left:10px;right:10px;bottom:calc(76px + env(safe-area-inset-bottom));z-index:70;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:10px 12px;display:flex;align-items:center;gap:10px;font-size:.84rem';
  bar.innerHTML=`<span style="flex:1">${html}</span>${onAdd?'<button class="btn" id="a2hsAdd" style="padding:5px 12px;min-height:auto">追加</button>':''}<button class="btn ghost" id="a2hsNo" style="padding:5px 10px;min-height:auto" aria-label="閉じる">✕</button>`;
  document.body.appendChild(bar);
  const add=bar.querySelector('#a2hsAdd');if(add&&onAdd)add.addEventListener('click',onAdd);
  bar.querySelector('#a2hsNo').addEventListener('click',()=>{localStorage.setItem('oki_a2hs','off');bar.remove();});
}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();_a2hsPrompt=e;
  a2hsBar('📲 ホーム画面に追加すると、アプリのように一発で開けます',async()=>{const bar=document.getElementById('a2hsBar');if(!_a2hsPrompt){if(bar)bar.remove();return;}_a2hsPrompt.prompt();try{await _a2hsPrompt.userChoice;}catch(_){}_a2hsPrompt=null;if(bar)bar.remove();});});
window.addEventListener('appinstalled',()=>{_a2hsPrompt=null;const b=document.getElementById('a2hsBar');if(b)b.remove();localStorage.setItem('oki_a2hs','off');});
// iOS Safari は beforeinstallprompt が無いので、初回学習後に一度だけ手順を案内
function maybeIOSInstallHint(){try{
  const iOS=/iP(hone|ad|od)/.test(navigator.platform)||(/Mac/.test(navigator.platform)&&navigator.maxTouchPoints>1);
  const safari=/Safari/.test(navigator.userAgent)&&!/CriOS|FxiOS|EdgiOS/.test(navigator.userAgent);
  if(iOS&&safari&&!navigator.standalone&&localStorage.getItem('oki_a2hs')!=='off'&&(store.totalAnswered||0)>=3){
    a2hsBar('📲 共有ボタン <span aria-hidden="true">⬆️</span> →「ホーム画面に追加」で、アプリのように使えます',null);
  }}catch(_){}}

//==================== UTIL ====================
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let toastT;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1600);}
// クリップボードコピー（非セキュア文脈/旧ブラウザでも例外を出さないよう一元化）
function copyText(txt,okMsg){return (navigator.clipboard?navigator.clipboard.writeText(txt):Promise.reject()).then(()=>toast(okMsg||'コピーしました'),()=>toast('コピーできませんでした'));}
// スクリーンリーダー専用の通知（次問へ即遷移する qa/cloze で採点結果が途切れないよう、永続領域に出す）
function srSay(m){const s=document.getElementById('srlive');if(!s)return;s.textContent='';setTimeout(()=>{s.textContent=m;},30);}

//==================== INIT ====================
// 問題の正本は questions.json（同一オリジン＝CORSなし、SWでオフラインキャッシュ）。
// 起動時に読み込み、ユーザー作成問題(store.userQuestions)を連結して QUESTIONS を構成。
let BASE_QUESTIONS=[];
// 重複idを除いて 公式(questions.json) > みんなの共有 > 自作 の優先で合成
function rebuildQuestions(){const seen={},out=[];
  // 不正な問題（型別フィールド欠落）は除外し、描画/採点クラッシュを防ぐ。優先: 公式>共有>自作。
  [...BASE_QUESTIONS,...COMMUNITY_QUESTIONS,...(store.userQuestions||[])].forEach(q=>{if(q&&q.id&&!seen[q.id]&&validQuestion(q)){seen[q.id]=1;out.push(q);}});
  QUESTIONS=out;
  // 「みんなの問題（未検証）」バッジ用：公式に無い共有問題のidを記録
  const baseIds=new Set(BASE_QUESTIONS.map(q=>q.id));
  COMMUNITY_IDS=new Set(COMMUNITY_QUESTIONS.filter(q=>q&&q.id&&!baseIds.has(q.id)).map(q=>q.id));
  SEARCH_INDEX=null;} // 問題集合が変わったので検索インデックスを作り直す
let _staticRendered=false;
function rerenderAll(){
  renderHome();
  if(!_staticRendered){renderMap();renderRef();renderLookup();_staticRendered=true;} // 静的ビュー(REF/LOOKUP由来)は初回のみ＝二重描画を回避
  const quizBusy=quizMode!=null&&quizPool.length>0&&quizIdx<quizPool.length; // クイズ回答中は #quiz を壊さない
  if(!quizBusy)renderQuiz();
  if(document.getElementById('prog'))try{renderProg();}catch(e){}}
const QJSON_CACHE='okinawa_qjson_cache';
async function boot(){
  pruneNetErrLog();                     // 通信起因の共有問題エラー（旧版が🐞ログに残した誤検知）を一度だけ掃除
  loadCommunityCache();                 // 前回取得した共有問題（オフライン/初速のため）
  // 通算統計の後付けフィールド導入前の履歴をカードのhistからバックフィル（既存ユーザーの過小表示を是正・1回のみ）
  if(!store._statMig){let ta=0,tc=0;Object.values(store.cards||{}).forEach(c=>{(c.hist||[]).forEach(h=>{ta++;if(h&&h.ok)tc++;});});if(ta>(store.totalAnswered||0)){store.totalAnswered=ta;store.totalCorrect=tc;}store._statMig=1;save();}
  if(store.examDate){const dl=examDaysLeft();if(dl!=null&&dl<0){store.examDate=null;store.examDateT=Date.now();save();}} // 試験日翌日に自動解除（当日dl=0は維持＝「試験当日」表示）
  try{
    const res=await fetch('questions.json');
    if(!res.ok)throw new Error('HTTP '+res.status);
    BASE_QUESTIONS=await res.json();
    try{const s=JSON.stringify(BASE_QUESTIONS);if(localStorage.getItem(QJSON_CACHE)!==s)localStorage.setItem(QJSON_CACHE,s);}catch(_){} // 最後に成功した版を保持（内容不変なら書込み省略＝毎起動の大容量同期書込みを回避）
  }catch(e){
    elog({type:'load',msg:'questions.json 読み込み失敗: '+((e&&e.message)||e)});console.warn('questions.json 読み込み失敗',e);
    try{const c=JSON.parse(localStorage.getItem(QJSON_CACHE)||'[]');if(Array.isArray(c)&&c.length){BASE_QUESTIONS=c;console.warn('前回キャッシュの問題で起動');}}catch(_){}  // 読込失敗時は前回版にフォールバック
  }
  rebuildQuestions();
  selfCheck();                          // 整合性チェックは起動時1回
  rerenderAll();
  fetchCommunity();                     // 背景で最新の共有問題を取得（届いたら再描画）
  trySilentSignIn();                    // 前回ログイン済みなら _authBusy=true で「接続中…」を出してから無音再認証（リロードで「未ログイン」が一瞬出るのを防ぐ）
  updateAuthBadge();                    // 上で再接続中になっていなければ（未ログイン）ここで確定描画（gSignedIn初期化後＝TDZ回避）
  setTimeout(maybeIOSInstallHint,1200);  // iOS Safari は beforeinstallprompt が無いので手順を一度だけ案内
}
boot();
