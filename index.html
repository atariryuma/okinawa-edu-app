<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>沖縄県 教育法規・計画 学習＆実務アプリ</title>
<meta name="description" content="沖縄県の管理職試験対策。教育法規・計画の関係図、要点、逆引き、間隔反復クイズ、論文対策を1つに。">
<meta name="theme-color" content="#0e7490">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="教育法規">
<style>
  :root{
    --bg:#eef2f7; --bg2:#e3e9f2; --card:#ffffff; --ink:#16202e; --sub:#566174;
    --line:#e2e8f0; --line2:#c3cedd; --chip:#eef3f9;
    --accent:#0e7490; --accent2:#0891b2; --accent-soft:#cffafe;
    --ok:#15803d; --ok-soft:#dcfce7; --ng:#c2253b; --ng-soft:#fde7ea; --warn:#b45309;
    --law:#5b6b7a; --vision:#0e7490; --plan:#15803d; --doryoku:#b5651d; --proj:#9a2c6e;
    --shadow:0 1px 2px rgba(16,30,54,.06),0 8px 24px rgba(16,30,54,.08);
    --shadow-sm:0 1px 2px rgba(16,30,54,.06),0 2px 8px rgba(16,30,54,.05);
    --r1:12px; --r2:16px; --r3:20px;
  }
  html[data-theme="dark"]{
    --bg:#0c1220; --bg2:#0a0f1a; --card:#161f30; --ink:#e8eef6; --sub:#a6b2c4;
    --line:#243247; --line2:#3a4d68; --chip:#1d2940;
    --accent:#22d3ee; --accent2:#38bdf8; --accent-soft:#0e3a44;
    --ok:#5fd28a; --ok-soft:#10331f; --ng:#f3868f; --ng-soft:#39191d; --warn:#e0a14a;
    --law:#9aa7b8; --vision:#22d3ee; --plan:#5fd28a; --doryoku:#e0a14a; --proj:#e26aae;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.45);
    --shadow-sm:0 1px 2px rgba(0,0,0,.35),0 3px 10px rgba(0,0,0,.3);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{font-size:16px;}
  body{margin:0;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;
    color:var(--ink);background:
      radial-gradient(1200px 600px at 80% -10%, var(--accent-soft) 0%, transparent 55%),
      linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
    background-attachment:fixed;line-height:1.65;font-size:.94rem;-webkit-font-smoothing:antialiased;
    transition:background .4s,color .3s;}
  .app{max-width:960px;margin:0 auto;padding:0 0 calc(40px + env(safe-area-inset-bottom));}
  ::-webkit-scrollbar{height:6px;width:6px;}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px;}
  :focus-visible{outline:3px solid var(--accent2);outline-offset:2px;border-radius:6px;}
  b,strong{color:inherit;font-weight:700;}

  header.top{padding:max(16px,env(safe-area-inset-top)) 16px 0;position:sticky;top:0;z-index:30;
    background:linear-gradient(180deg,var(--bg) 65%,transparent);backdrop-filter:blur(8px);}
  .brand{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .brand h1{margin:0;font-size:1.06rem;font-weight:800;}
  .brand p{margin:1px 0 0;font-size:.72rem;color:var(--sub);}
  .theme{width:44px;height:44px;border-radius:13px;border:1px solid var(--line);background:var(--card);
    color:var(--ink);font-size:1.1rem;cursor:pointer;box-shadow:var(--shadow-sm);transition:.2s;flex:0 0 auto;}
  .theme:active{transform:scale(.92);}
  nav.tabs{display:flex;gap:4px;overflow-x:auto;margin:14px -2px 12px;padding:4px;background:var(--card);
    border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-sm);scrollbar-width:none;}
  nav.tabs::-webkit-scrollbar{display:none;}
  nav.tabs button{flex:1 0 auto;background:transparent;color:var(--sub);border:none;padding:10px 14px;min-height:44px;
    border-radius:12px;font-size:.82rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:.2s;}
  nav.tabs button[aria-selected="true"]{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(14,116,144,.35);}

  main{padding:6px 16px 0;}
  .view{display:none;}
  .view.active{display:block;animation:fade .35s cubic-bezier(.2,.7,.3,1);}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  h3.sec{font-size:.84rem;margin:20px 2px 10px;color:var(--sub);font-weight:800;letter-spacing:.02em;}

  /* HOME */
  .hero{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-radius:var(--r3);
    padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
  .hero::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;
    background:rgba(255,255,255,.12);}
  .hero .row{display:flex;align-items:center;gap:18px;position:relative;}
  .ring{width:96px;height:96px;flex:0 0 auto;}
  .ring text{fill:#fff;font-weight:800;}
  .hero h2{margin:0 0 2px;font-size:1.02rem;}
  .hero p{margin:0;font-size:.78rem;opacity:.94;}
  .hero .streak{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.2);
    padding:3px 11px;border-radius:20px;font-size:.78rem;font-weight:800;margin-top:8px;}
  .hero .mini{display:flex;gap:16px;margin-top:8px;}
  .hero .mini b{display:block;font-size:1.12rem;font-weight:800;}
  .hero .mini span{font-size:.7rem;opacity:.92;}
  .cta{display:block;width:100%;margin-top:14px;background:#fff;color:var(--accent);border:none;border-radius:var(--r2);
    padding:16px;font-size:1rem;font-weight:800;cursor:pointer;box-shadow:var(--shadow);transition:.15s;}
  .cta:active{transform:scale(.99);}
  .cta small{display:block;font-weight:600;color:var(--sub);font-size:.72rem;margin-top:2px;}
  .quickgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
  .quick{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:14px;cursor:pointer;
    box-shadow:var(--shadow-sm);transition:.18s;text-align:left;color:var(--ink);min-height:64px;}
  .quick:active{transform:scale(.98);}
  .quick .ic{font-size:1.25rem;}
  .quick b{display:block;margin-top:4px;font-size:.88rem;}
  .quick span{font-size:.7rem;color:var(--sub);}

  /* layered mastery bar */
  .layers{display:flex;height:14px;border-radius:8px;overflow:hidden;margin:4px 0 8px;background:var(--chip);}
  .layers i{height:100%;}
  .lg-new{background:var(--line2);}.lg-learn{background:var(--warn);}.lg-near{background:var(--accent2);}.lg-mast{background:var(--plan);}
  .legend{display:flex;flex-wrap:wrap;gap:10px;font-size:.7rem;color:var(--sub);}
  .legend span{display:inline-flex;align-items:center;gap:4px;}
  .legend i{width:10px;height:10px;border-radius:3px;display:inline-block;}

  /* NODE / MAP */
  .hint{text-align:center;color:var(--sub);font-size:.74rem;margin:2px 0 12px;}
  .node{border-radius:var(--r2);padding:14px 16px;color:#fff;margin:0 auto;box-shadow:var(--shadow);cursor:pointer;
    transition:transform .15s;position:relative;overflow:hidden;width:100%;text-align:left;border:none;}
  .node::before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,rgba(255,255,255,.14),transparent 60%);}
  .node:active{transform:scale(.99);}
  .node h2{margin:0;font-size:.92rem;display:flex;justify-content:space-between;align-items:center;gap:8px;position:relative;color:#fff;}
  .node .tag{font-size:.64rem;background:rgba(255,255,255,.24);padding:3px 9px;border-radius:20px;font-weight:700;white-space:nowrap;}
  .node .pt{margin:8px 0 0;font-size:.78rem;opacity:.98;display:none;position:relative;}
  .node.open .pt{display:block;animation:fade .25s;}
  .node.law{background:linear-gradient(135deg,#64748b,#475569);}
  .node.vision{background:linear-gradient(135deg,#0e7490,#0891b2);}
  .node.plan{background:linear-gradient(135deg,#15803d,#0e9f6e);}
  .node.doryoku{background:linear-gradient(135deg,#b5651d,#9a5512);}
  .node.proj{background:linear-gradient(135deg,#9a2c6e,#7d2f7d);}
  .node.daikou{background:linear-gradient(135deg,#2b8aa6,#0e7490);}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:600px){.two{grid-template-columns:1fr;}}
  .arrow{text-align:center;color:var(--sub);font-size:1rem;margin:6px 0;line-height:1.2;}
  .arrow small{display:block;font-size:.66rem;opacity:.9;}

  /* REF accordion */
  .acc{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-sm);}
  .acc>summary{padding:15px 16px;font-weight:800;cursor:pointer;font-size:.92rem;display:flex;align-items:center;gap:10px;list-style:none;min-height:44px;}
  .acc>summary::-webkit-details-marker{display:none;}
  .acc>summary .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 0 3px var(--chip);}
  .acc>summary .chev{margin-left:auto;color:var(--sub);transition:.2s;}
  .acc[open]>summary .chev{transform:rotate(90deg);}
  .acc .body{padding:0 16px 15px;}
  .acc ul{margin:6px 0;padding-left:20px;}
  .acc li{margin:5px 0;}
  .src{font-size:.72rem;color:var(--sub);border-top:1px dashed var(--line2);padding-top:9px;margin-top:9px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;}
  .copybtn{font-size:.72rem;border:1px solid var(--line2);background:var(--card);border-radius:10px;padding:8px 12px;cursor:pointer;color:var(--accent);font-weight:700;min-height:40px;}
  .copybtn:active{transform:scale(.94);}
  .tagrow{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
  .filt{border:1px solid var(--line2);background:var(--card);color:var(--ink);border-radius:16px;padding:6px 12px;font-size:.74rem;cursor:pointer;min-height:36px;}
  .filt.on{background:var(--accent);color:#fff;border-color:var(--accent);}

  /* LOOKUP */
  .searchwrap{position:relative;}
  .search{width:100%;padding:14px 14px 14px 42px;border:1px solid var(--line);border-radius:14px;font-size:1rem;background:var(--card);color:var(--ink);box-shadow:var(--shadow-sm);}
  .searchwrap .mag{position:absolute;left:14px;top:13px;color:var(--sub);font-size:1rem;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0;}
  .chips button{border:1px solid var(--line2);background:var(--card);border-radius:20px;padding:8px 13px;font-size:.76rem;cursor:pointer;color:var(--ink);box-shadow:var(--shadow-sm);min-height:40px;}
  .chips button.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .lk{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow-sm);border-left:4px solid var(--accent);animation:fade .25s;}
  .lk h4{margin:0 0 7px;font-size:.92rem;}
  .lk .based{font-size:.8rem;color:var(--sub);margin-top:6px;padding-left:14px;position:relative;}
  .lk .based::before{content:"";position:absolute;left:0;top:9px;width:6px;height:6px;border-radius:50%;background:var(--accent);}
  .lk .based b{color:var(--accent);}

  /* QUIZ */
  .modegrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .mode{padding:15px 13px;border:1px solid var(--line);background:var(--card);border-radius:var(--r2);cursor:pointer;text-align:left;box-shadow:var(--shadow-sm);transition:.18s;color:var(--ink);min-height:74px;}
  .mode:active{transform:scale(.98);}
  .mode .ic{font-size:1.15rem;}
  .mode b{display:block;font-size:.88rem;margin:5px 0 1px;}
  .mode span{font-size:.7rem;color:var(--sub);}
  .mode.daily{grid-column:1/3;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;}
  .mode.daily span{color:rgba(255,255,255,.9);}
  .mode.review{grid-column:1/3;border-color:var(--ng);}
  .mode.review b{color:var(--ng);}
  .catbar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
  .catbar button{border:1px solid var(--line2);background:var(--card);border-radius:16px;padding:7px 12px;font-size:.74rem;cursor:pointer;color:var(--ink);min-height:38px;}
  .catbar button.on{background:var(--proj);color:#fff;border-color:var(--proj);}
  .catbar[hidden]{display:none;}
  .progressbar{height:7px;background:var(--chip);border-radius:6px;overflow:hidden;margin-bottom:14px;}
  .progressbar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s;}
  .quizcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r3);padding:20px 17px;box-shadow:var(--shadow);animation:fade .3s;}
  .qmeta{font-size:.72rem;color:var(--sub);display:flex;justify-content:space-between;margin-bottom:12px;font-weight:700;}
  .badge{background:var(--chip);padding:4px 10px;border-radius:20px;}
  .qtext{font-size:1.06rem;font-weight:700;margin-bottom:16px;line-height:1.55;}
  .choice{display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:1px solid var(--line2);background:var(--card);color:var(--ink);border-radius:13px;padding:14px 13px;margin-bottom:9px;cursor:pointer;font-size:.92rem;transition:.15s;box-shadow:var(--shadow-sm);min-height:52px;}
  .choice .k{width:26px;height:26px;border-radius:8px;background:var(--chip);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:800;flex:0 0 auto;}
  .choice:active{transform:scale(.99);}
  .choice.correct{background:var(--ok-soft);border-color:var(--ok);}
  .choice.correct .k{background:var(--ok);color:#fff;}
  .choice.wrong{background:var(--ng-soft);border-color:var(--ng);}
  .choice.wrong .k{background:var(--ng);color:#fff;}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:13px;padding:13px 18px;font-size:.94rem;cursor:pointer;font-weight:700;transition:.15s;box-shadow:0 4px 12px rgba(14,116,144,.28);min-height:48px;}
  .btn:active{transform:scale(.98);}
  .btn.ghost{background:var(--card);color:var(--accent);border:1px solid var(--accent);box-shadow:var(--shadow-sm);}
  .btn.wide{width:100%;}
  .btn.ok{background:var(--ok);box-shadow:0 4px 12px rgba(21,128,61,.28);}
  .btn.ng{background:var(--ng);box-shadow:0 4px 12px rgba(194,37,59,.28);}
  .reveal{margin-top:14px;padding:13px;border-radius:13px;font-size:.84rem;display:none;animation:fade .25s;}
  .reveal.show{display:block;}
  .reveal.ok{background:var(--ok-soft);border:1px solid var(--ok);}
  .reveal.ng{background:var(--ng-soft);border:1px solid var(--ng);}
  .reveal .src{border:none;padding:0;margin-top:8px;}
  .cloze .blank{background:var(--ng);color:transparent;border-radius:5px;padding:1px 8px;cursor:pointer;transition:.18s;font-weight:800;text-decoration:underline;text-decoration-color:rgba(255,255,255,.5);}
  .cloze .blank.show{background:var(--ok-soft);color:var(--ink);text-decoration:none;}
  .redtoggle{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .orderlist{list-style:none;padding:0;margin:0 0 14px;}
  .orderlist li{background:var(--card);border:1px solid var(--line2);border-radius:13px;padding:11px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-sm);transition:.12s;}
  .orderlist li .num{width:26px;height:26px;border-radius:9px;background:var(--chip);display:flex;align-items:center;justify-content:center;font-size:.86rem;flex:0 0 auto;color:var(--sub);cursor:grab;}
  .orderlist li .txt{flex:1;font-size:.88rem;}
  .orderlist li .mv{display:flex;flex-direction:column;gap:2px;}
  .orderlist li .mv button{width:34px;height:24px;border:1px solid var(--line2);background:var(--card);color:var(--ink);border-radius:7px;font-size:.7rem;cursor:pointer;line-height:1;}
  .orderlist li.dragging{opacity:.4;}
  .matchwrap{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
  .matchcol button{display:block;width:100%;border:1px solid var(--line2);background:var(--card);color:var(--ink);border-radius:11px;padding:13px 10px;margin-bottom:8px;font-size:.8rem;cursor:pointer;box-shadow:var(--shadow-sm);min-height:52px;}
  .matchcol button.sel{background:var(--accent);color:#fff;border-color:var(--accent);}
  .matchcol button.done{background:var(--ok-soft);border-color:var(--ok);color:var(--ok);cursor:default;}
  .matchcol button.wrong{background:var(--ng-soft);border-color:var(--ng);}

  .result{text-align:center;}
  .result .emoji{font-size:2.8rem;}
  .result .big{font-size:2.6rem;font-weight:900;color:var(--accent);margin:6px 0;}
  .result .msg{font-size:.9rem;color:var(--sub);margin-bottom:16px;}

  .stat{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:8px;}
  .stat .box{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:15px 8px;text-align:center;box-shadow:var(--shadow-sm);}
  .stat .box .n{font-size:1.6rem;font-weight:900;}
  .stat .box.a .n{color:var(--accent);}.stat .box.b .n{color:var(--plan);}.stat .box.c .n{color:var(--ng);}
  .stat .box .l{font-size:.68rem;color:var(--sub);}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:16px;box-shadow:var(--shadow-sm);}
  .catrow{margin-bottom:12px;font-size:.78rem;}
  .catrow .top{display:flex;justify-content:space-between;margin-bottom:4px;font-weight:600;}
  .bar{height:9px;background:var(--chip);border-radius:6px;overflow:hidden;}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--plan),var(--accent));border-radius:6px;transition:width .5s;}
  .heat{display:flex;gap:5px;margin-top:4px;}
  .heat div{flex:1;aspect-ratio:1;border-radius:5px;background:var(--chip);display:flex;align-items:center;justify-content:center;font-size:.6rem;color:var(--sub);}
  .heat div.done{background:var(--plan);color:#fff;}
  .wrongitem{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--ng);border-radius:11px;padding:11px 13px;margin-bottom:8px;font-size:.78rem;box-shadow:var(--shadow-sm);}
  /* RONBUN */
  .rb{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-sm);}
  .rb>summary{padding:15px 16px;font-weight:800;cursor:pointer;font-size:.92rem;display:flex;align-items:center;gap:10px;list-style:none;min-height:44px;}
  .rb>summary::-webkit-details-marker{display:none;}
  .rb>summary .chev{margin-left:auto;color:var(--sub);transition:.2s;}
  .rb[open]>summary .chev{transform:rotate(90deg);}
  .rb .body{padding:0 16px 16px;}
  .rb .qx{background:var(--chip);border-radius:10px;padding:10px 12px;font-size:.84rem;margin-bottom:12px;}
  .rb h5{margin:14px 0 5px;font-size:.82rem;color:var(--accent);display:flex;align-items:center;gap:7px;}
  .rb h5::before{content:"";width:4px;height:14px;background:var(--accent);border-radius:2px;}
  .rb p{margin:4px 0;font-size:.85rem;}
  .rb ul{margin:4px 0;padding-left:18px;font-size:.85rem;}
  .rb .konkyo{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
  .rb .konkyo span{background:var(--accent-soft);color:var(--accent);border-radius:14px;padding:3px 10px;font-size:.74rem;font-weight:700;}
  .rb .ng{background:var(--ng-soft);border:1px solid var(--ng);border-radius:9px;padding:8px 11px;font-size:.8rem;}
  .synccard{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:16px;box-shadow:var(--shadow-sm);margin-bottom:14px;}
  .synccard .st{display:flex;align-items:center;gap:8px;font-weight:700;font-size:.88rem;margin-bottom:4px;}
  .synccard .dotg{width:9px;height:9px;border-radius:50%;background:var(--line2);}
  .synccard.on .dotg{background:var(--ok);}
  .synccard small{color:var(--sub);font-size:.72rem;}
  .synccard input{width:100%;margin:8px 0;padding:10px 12px;border:1px solid var(--line2);border-radius:10px;background:var(--bg);color:var(--ink);font-size:.82rem;}
  .syncrow{display:flex;gap:8px;flex-wrap:wrap;}
  .syncrow .btn{flex:1;min-width:120px;}

  footer{text-align:center;color:var(--sub);font-size:.66rem;margin-top:26px;padding:0 16px;line-height:1.7;}
  .toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);padding:12px 20px;border-radius:24px;font-size:.82rem;font-weight:700;opacity:0;transition:.3s;z-index:60;box-shadow:var(--shadow);pointer-events:none;max-width:90%;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

//==================== STATE / SRS ====================
const KEY='okinawa_edu_app_v3';
const DAY=86400000;
// ===== 学習スケジューラ OkiSRS v2 ====================================
// SM-2(Woźniak 1990) を基礎に、間隔反復研究の知見で調整。
//  ・カードごとの ease factor（個別難易度）  … SM-2
//  ・失敗時は間隔を「一部だけ」引き継ぐ（全消去しない＝ease hell回避） … FSRS/DSRモデル
//  ・復習時の目標保持率≒90%（最適域85-90%） … Karpicke&Smith(2012)/FSRS
//  ・試験日を越えて先送りしない（最適間隔比） … Cepeda et al.(2008)
//  ・復習日のばらつき(fuzz)で“同日集中”を緩和 … Anki実装知見
//  ・採点＝検索練習(testing effect) … Roediger&Karpicke(2006)
// 互換: KEYは据え置き。ef/ivl/pli を加算するだけ。box(1-5)は定着度表示として維持。
const EF_DEFAULT=2.5, EF_MIN=1.3, EF_MAX=2.7;   // ease factor の初期値と範囲
const IVL_MAX=180;                               // 1カードの最長間隔(日)
const LAPSE_KEEP=0.4, LAPSE_PENALTY=0.2;         // 失敗時：間隔の保持率 / ease の減点
const OLD_BOX_IVL={1:0,2:1,3:3,4:7,5:16};        // 旧Leitner box→間隔(日) 移行用
let store=load();
function load(){const def={cards:{},streak:0,lastDate:null,theme:'light',dailyDate:null,examDate:null,examDateT:0,userQuestions:[],totalAnswered:0,totalCorrect:0,dailyDone:{},session:null,fontScale:'m'};try{return Object.assign(def,JSON.parse(localStorage.getItem(KEY))||{});}catch(e){return Object.assign({},def);}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(store));}catch(e){elog({type:'quota',msg:'進捗の保存に失敗（localStorage容量超過の可能性）: '+((e&&e.name)||e)});try{toast('保存できませんでした（容量超過）');}catch(_){}}}
// ===== クライアントサイド診断（バグ先回り検知） =====================
// バックエンドが無い静的アプリなので、不具合は端末内のリングバッファに記録し、
// 進捗タブから開発者へコピー送付できる。プライバシー：外部送信は一切しない。
const ELOG_KEY='okinawa_edu_errlog';
function elog(o){try{const a=JSON.parse(localStorage.getItem(ELOG_KEY)||'[]');a.push(Object.assign({t:Date.now()},o));while(a.length>20)a.shift();localStorage.setItem(ELOG_KEY,JSON.stringify(a));}catch(e){}}
function getElog(){try{return JSON.parse(localStorage.getItem(ELOG_KEY)||'[]');}catch(e){return[];}}
function clearElog(){try{localStorage.removeItem(ELOG_KEY);}catch(e){}}
window.addEventListener('error',e=>{elog({type:'error',msg:String((e&&(e.message||e.error))||e),at:(e&&e.filename?e.filename.split('/').pop():'')+':'+((e&&e.lineno)||'')});});
window.addEventListener('unhandledrejection',e=>{elog({type:'promise',msg:String((e&&e.reason&&(e.reason.message||e.reason))||'unhandledrejection')});});
// 起動時のコンテンツ整合性チェック（id重複/出典欠落/mc範囲/cloze空欄 等を先回りで検出）
function selfCheck(){const issues=[],ids=new Set();
  QUESTIONS.forEach(q=>{if(ids.has(q.id))issues.push('重複id:'+q.id);ids.add(q.id);if(!q.src)issues.push('出典なし:'+q.id);
    if(q.type==='mc'&&(typeof q.ans!=='number'||q.ans<0||q.ans>=(q.choices||[]).length))issues.push('mc ans範囲外:'+q.id);
    if(q.type==='cloze'&&!(q.parts||[]).some(p=>p&&p.b))issues.push('cloze空欄なし:'+q.id);
    if(q.type==='order'&&!(q.items||[]).length)issues.push('order項目なし:'+q.id);
    if(q.type==='match'&&!(q.pairs||[]).length)issues.push('match対なし:'+q.id);});
  if(issues.length){console.warn('[selfCheck] 問題データに不整合:',issues);elog({type:'selfcheck',msg:issues.join(' / ')});}
  return issues;}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function getCard(id){return store.cards[id];}
function boxFromIvl(ivl){if(ivl>=30)return 5;if(ivl>=10)return 4;if(ivl>=3)return 3;if(ivl>=1)return 2;return 1;}
function examDaysLeft(){if(!store.examDate)return null;return Math.ceil((new Date(store.examDate+'T23:59:59').getTime()-Date.now())/DAY);}
function clampIvl(ivl){ivl=Math.min(IVL_MAX,Math.max(1,Math.round(ivl)));const dl=examDaysLeft();if(dl!=null&&dl>0)ivl=Math.min(ivl,dl);return ivl;}
function isMastered(id){const c=getCard(id);return c&&c.box>=4;}
function stateOf(id){const c=getCard(id);if(!c)return'new';if(c.box>=4)return'mast';if(c.box===3)return'near';return'learn';}
function isDue(id){const c=getCard(id);return !c||c.due<=Date.now();}
function isWeak(id){const c=getCard(id);return c&&c.box<=2;}
function review(id,ok){
  let c=store.cards[id];
  if(!c)c=store.cards[id]={box:1,reps:0,fails:0,due:0,last:null,hist:[],ef:EF_DEFAULT,ivl:0};
  if(c.ef==null)c.ef=EF_DEFAULT;                 // 旧スキーマ移行：ease を補完
  if(c.ivl==null)c.ivl=OLD_BOX_IVL[c.box]||0;    // 旧スキーマ移行：間隔を box から推定
  if(ok){
    let ivl,recovered=false;
    if(c.pli!=null){ivl=c.pli;c.pli=null;recovered=true;} // 失敗からの復帰：以前の間隔を一部引き継ぐ
    else if(c.reps<=0)ivl=1;                       // 初回正解 → 翌日
    else if(c.reps===1)ivl=3;                      // 2回目 → 3日後
    else ivl=c.ivl*c.ef;                           // 3回目以降 → 間隔×ease（指数的に拡大）
    if(ivl>=4)ivl=ivl*(1+(Math.random()*0.1-0.05));// fuzz ±5%（復習日の集中を緩和）
    c.reps++;c.ef=Math.min(EF_MAX,c.ef+0.03);
    c.ivl=clampIvl(ivl);c.due=Date.now()+c.ivl*DAY;c.last='pass';
    // 失敗復帰直後は定着(mast=box4+)に跳ねさせない（弱点克服の誤表示を防ぐ）
    c.box=recovered?Math.min(boxFromIvl(c.ivl),3):boxFromIvl(c.ivl);
  }else{
    c.fails++;c.ef=Math.max(EF_MIN,c.ef-LAPSE_PENALTY);
    c.pli=Math.max(1,Math.min(30,Math.round((c.ivl||1)*LAPSE_KEEP))); // 復帰時の種間隔
    c.reps=0;c.ivl=0;c.due=Date.now();c.last='fail';c.box=Math.min(c.box,2); // 当日中に再出題・弱点へ
  }
  c.hist.push({t:Date.now(),ok});
  if(c.hist.length>30)c.hist=c.hist.slice(-30); // 履歴を直近30件に制限（localStorage肥大を防ぐ）
  touchStreak();save();
}
function touchStreak(){const t=todayStr();if(store.lastDate===t)return;
  const y=(()=>{const d=new Date(Date.now()-DAY);return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();})();
  store.streak=store.lastDate===y?(store.streak||0)+1:1;store.lastDate=t;}
function dueList(){return QUESTIONS.filter(q=>isDue(q.id)).sort((a,b)=>((getCard(a.id)?.due)||0)-((getCard(b.id)?.due)||0));}

//==================== 安全・検証ヘルパ ====================
// HTMLエスケープ：第三者由来（みんなの問題／インポート）の問題文を innerHTML に出す際に必ず通す。
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
// 型別の必須フィールド検証。不正（欠落・型違い）は出題プールから除外して描画/採点クラッシュを防ぐ。
function validQuestion(q){
  if(!q||typeof q!=='object'||typeof q.id!=='string'||!q.id)return false;
  if(['qa','mc','cloze','order','match'].indexOf(q.type)<0)return false;
  switch(q.type){
    case'qa':return typeof q.q==='string'&&typeof q.a==='string';
    case'mc':return typeof q.q==='string'&&Array.isArray(q.choices)&&q.choices.length>=2&&typeof q.ans==='number'&&q.ans>=0&&q.ans<q.choices.length;
    case'cloze':return Array.isArray(q.parts)&&q.parts.length>0&&q.parts.some(p=>p&&typeof p==='object'&&typeof p.b==='string'&&p.b);
    case'order':return typeof q.q==='string'&&Array.isArray(q.items)&&q.items.length>=2;
    case'match':return typeof q.q==='string'&&Array.isArray(q.pairs)&&q.pairs.length>=1&&q.pairs.every(p=>Array.isArray(p)&&p.length===2);
  }
  return false;
}
function ymdNum(s){const m=String(s||'').split('-');return (+m[0]||0)*10000+(+m[1]||0)*100+(+m[2]||0);} // 'YYYY-M-D' を数値化（非ゼロ詰めでも正しく比較）

themeBtn.addEventListener('click',()=>{store.theme=store.theme==='dark'?'light':'dark';save();applyTheme();});
applyTheme();
// 文字サイズ（標準→大→特大→小 を循環）。ルート font-size を変えると rem 基準の全体が比例拡大。
const FONT_SIZES={s:'14px',m:'16px',l:'18px',xl:'20.5px'},FONT_ORDER=['m','l','xl','s'],FONT_LABEL={s:'小',m:'標準',l:'大',xl:'特大'};
const fontBtn=document.getElementById('fontBtn');
function applyFontScale(){document.documentElement.style.fontSize=FONT_SIZES[store.fontScale]||FONT_SIZES.m;}
fontBtn.addEventListener('click',()=>{const i=FONT_ORDER.indexOf(store.fontScale||'m');store.fontScale=FONT_ORDER[(i+1)%FONT_ORDER.length];save();applyFontScale();toast('文字サイズ：'+FONT_LABEL[store.fontScale]);});
applyFontScale();

//==================== TABS ====================
const tabs=document.getElementById('tabs');
tabs.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;go(b.dataset.v,true);});
// 矢印キーでのタブ移動（WCAGの tablist 要件）
tabs.addEventListener('keydown',e=>{
  const btns=[...tabs.children],i=btns.indexOf(document.activeElement);if(i<0)return;
  let j=-1;
  if(e.key==='ArrowRight'||e.key==='ArrowDown')j=(i+1)%btns.length;
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp')j=(i-1+btns.length)%btns.length;
  else if(e.key==='Home')j=0;else if(e.key==='End')j=btns.length-1;
  if(j>=0){e.preventDefault();btns[j].focus();go(btns[j].dataset.v,true);}
});
function go(v,focusPanel){
  [...tabs.children].forEach(x=>{const sel=x.dataset.v===v;x.setAttribute('aria-selected',sel);x.tabIndex=sel?0:-1;});
  document.querySelectorAll('.view').forEach(s=>s.classList.toggle('active',s.id===v));
  if(v==='home')renderHome();
  if(v==='prog')renderProg();
  if(v==='quiz')renderQuiz();
  if(v==='ronbun')renderRonbun();
  const rm=matchMedia('(prefers-reduced-motion:reduce)').matches;
  window.scrollTo({top:0,behavior:rm?'auto':'smooth'});
  if(focusPanel){const p=document.getElementById(v);if(p){p.setAttribute('tabindex','-1');p.focus({preventScroll:true});}} // タブ操作時はパネル先頭へフォーカス移動
}

//==================== HOME ====================
function renderHome(){
  const el=document.getElementById('home');
  const total=QUESTIONS.length;
  const counts={new:0,learn:0,near:0,mast:0};
  QUESTIONS.forEach(q=>counts[stateOf(q.id)]++);
  const pct=Math.round(counts.mast/total*100);
  const due=dueList().length;
  const r=42,c=2*Math.PI*r,off=c*(1-pct/100);
  const hour=new Date().getHours();
  const greet=hour<11?'おはようございます':hour<18?'おつかれさまです':'こんばんは';
  const seen=QUESTIONS.filter(q=>getCard(q.id)).length;                 // 学習に着手した問題数
  const todayDone=(store.dailyDone&&store.dailyDone[todayStr()])||0;     // 今日解いた数
  const dl=examDaysLeft();
  const examChip=dl!=null?(dl>0?`<span class="streak" style="background:var(--accent);color:#fff">🎯 試験まであと${dl}日</span>`:`<span class="streak" style="background:var(--accent);color:#fff">🎯 試験当日</span>`):'';
  const studiedToday=store.lastDate===todayStr();

  const sess=store.session;
  const resuming=sess&&Array.isArray(sess.ids)&&sess.idx>0&&sess.idx<sess.ids.length;
  const resumeBar=resuming?`<button class="cta" id="ctaResume" style="background:var(--accent)">⏯ 前回の続きから（${sess.idx} / ${sess.ids.length}問）<small>中断したところから再開します</small></button>`:'';
  const ctaLabel=seen===0?'▶ まず解いてみる（数分）':(due>0?`今日の学習をはじめる（${Math.min(due,12)}問）`:'今日のぶんは完了 🎉 追加で解く');
  const aiNotice=localStorage.getItem('okinawa_ai_notice')==='off'?'':`
    <div class="card" id="aiNotice" style="border-left:4px solid var(--warn)">
      <small style="color:var(--sub)">⚠️ <b>問題はAIで作成</b>しています。誤りの可能性があるため、各問題の解説の <b>🔍 出典を確認</b> でご自身でも確かめてください。</small>
      <div style="margin-top:7px"><button class="btn ghost" id="aiNoticeOk" style="padding:4px 12px;min-height:auto">了解（次回から非表示）</button></div>
    </div>`;
  el.innerHTML=`
    ${resumeBar?`<div style="margin-bottom:8px">${resumeBar}</div>`:''}
    ${nudge}
    <div class="hero">
      <div class="row">
        <svg class="ring" viewBox="0 0 100 100" aria-hidden="true">
          <circle cx="50" cy="50" r="${r}" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="9"/>
          <circle cx="50" cy="50" r="${r}" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round"
            stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 50 50)"/>
          <text x="50" y="50" text-anchor="middle" font-size="22">${pct}%</text>
          <text x="50" y="64" text-anchor="middle" font-size="9" opacity=".85">定着</text>
        </svg>
        <div>
          <h2>${greet} 👋</h2>
          <p>定着＝しっかり覚えた状態。続けるほど増えます。</p>
          <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:4px">
            <span class="streak">🔥 ${store.streak||0}日連続</span>${examChip}
          </div>
          <div class="mini">
            <div><b>${due}</b><span>今日の復習</span></div>
            <div><b>${todayDone}</b><span>今日解いた</span></div>
            <div><b>${counts.mast}/${total}</b><span>定着</span></div>
          </div>
        </div>
      </div>
      <button class="cta" id="ctaDaily">${ctaLabel}<small>忘れた頃の問題が自動で戻ってきます</small></button>
    </div>
    ${aiNotice}
    <h3 class="sec">習得の内訳</h3>
    <div class="card">
      <div class="layers" role="img" aria-label="しっかり覚えた ${counts.mast}問、もう少し ${counts.near}問、学習中 ${counts.learn}問、未学習 ${counts.new}問">
        <i class="lg-mast" style="width:${counts.mast/total*100}%"></i>
        <i class="lg-near" style="width:${counts.near/total*100}%"></i>
        <i class="lg-learn" style="width:${counts.learn/total*100}%"></i>
        <i class="lg-new" style="width:${counts.new/total*100}%"></i>
      </div>
      <div class="legend">
        <span><i class="lg-mast"></i>しっかり覚えた ${counts.mast}</span>
        <span><i class="lg-near"></i>もう少し ${counts.near}</span>
        <span><i class="lg-learn"></i>学習中 ${counts.learn}</span>
        <span><i class="lg-new"></i>未学習 ${counts.new}</span>
      </div>
    </div>
    <div class="quickgrid">
      <button class="quick" data-act="review"><span class="ic">🎯</span><b>弱点を復習</b><span>${QUESTIONS.filter(q=>isWeak(q.id)).length}問が対象</span></button>
      <button class="quick" data-act="lookup"><span class="ic">🔎</span><b>こんな時は</b><span>状況→根拠を逆引き</span></button>
      <button class="quick" data-act="map"><span class="ic">🗺️</span><b>関係図</b><span>資料のつながり</span></button>
      <button class="quick" data-act="ref"><span class="ic">📚</span><b>要点</b><span>13資料・出典付き</span></button>
    </div>`;
  el.querySelector('#ctaDaily').addEventListener('click',()=>{go('quiz');startQuiz('daily');});
  const rs=el.querySelector('#ctaResume');if(rs)rs.addEventListener('click',resumeSession);
  const an=el.querySelector('#aiNoticeOk');if(an)an.addEventListener('click',()=>{localStorage.setItem('okinawa_ai_notice','off');const n=el.querySelector('#aiNotice');if(n)n.remove();});
  el.querySelectorAll('.quick').forEach(b=>b.addEventListener('click',()=>{const a=b.dataset.act;if(a==='review'){go('quiz');startQuiz('review');}else go(a);}));
}

  const el=document.getElementById('ref');
  const cats=['all',...new Set(REF.map(r=>r.cat))];
  el.innerHTML=`<div class="tagrow">${cats.map(c=>`<button class="filt ${c===refFilter?'on':''}" data-c="${c}">${c==='all'?'すべて':c}</button>`).join('')}</div><div id="refList"></div>`;
  el.querySelectorAll('.filt').forEach(b=>b.addEventListener('click',()=>{refFilter=b.dataset.c;renderRef();}));
  const list=REF.filter(r=>refFilter==='all'||r.cat===refFilter);
  document.getElementById('refList').innerHTML=list.map(r=>`
   <details class="acc" id="acc-${r.id}">
     <summary><span class="dot" style="background:${COLORS[r.cls]}"></span>${r.name}<span class="chev">›</span></summary>
     <div class="body"><ul>${r.points.map(p=>`<li>${p}</li>`).join('')}</ul>

//==================== QUIZ ====================
let quizCat='all',quizMode=null,quizPool=[],quizIdx=0,sCorrect=0,sAnswered=0;
function renderQuiz(){
  const el=document.getElementById('quiz');
  const due=dueList().length,weak=QUESTIONS.filter(q=>isWeak(q.id)).length;
  el.innerHTML=`
   <div class="modegrid" id="modes">
     <button class="mode daily" data-m="daily"><span class="ic">⚡</span><b>今日の学習（${Math.min(due,12)||'+'}問）</b><span>期日が来た問題を優先・間隔反復</span></button>
     <button class="mode review" data-m="review"><span class="ic">🎯</span><b>弱点だけ復習（${weak}）</b><span>box1〜2の不安定な問題</span></button>
     <button class="mode" data-m="qa"><span class="ic">💬</span><b>一問一答</b><span>答えを想起→自己評価</span></button>
     <button class="mode" data-m="mc"><span class="ic">🔠</span><b>4択選択</b><span>本番に近い形式</span></button>
     <button class="mode" data-m="cloze"><span class="ic">🟥</span><b>穴埋め（赤シート）</b><span>キーワードを想起</span></button>
     <button class="mode" data-m="order"><span class="ic">🔀</span><b>並べ替え</b><span>体系・手順</span></button>
     <button class="mode" data-m="match"><span class="ic">🔗</span><b>関係づけ</b><span>用語と意味</span></button>
     <button class="mode" data-m="__create"><span class="ic">✍️</span><b>問題を作る・共有</b><span>自作／みんなの問題</span></button>
   </div>
   <div class="catbar" id="cats" aria-label="分野で絞り込み"></div>
   <div id="quizarea"></div>`;
  const cats=['all',...new Set(QUESTIONS.map(q=>q.cat))];
  const cb=el.querySelector('#cats');
  cats.forEach(c=>{const b=document.createElement('button');b.textContent=c==='all'?'全分野':c;if(c===quizCat)b.classList.add('on');
    b.addEventListener('click',()=>{quizCat=c;[...cb.children].forEach(x=>x.classList.remove('on'));b.classList.add('on');});cb.appendChild(b);});
  el.querySelector('#modes').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;if(b.dataset.m==='__create'){openCreate();return;}startQuiz(b.dataset.m);});
  quizMode=null;
}
function quizarea(){return document.getElementById('quizarea');}
function startQuiz(mode){
  quizMode=mode;quizIdx=0;sCorrect=0;sAnswered=0;
  const cats=document.getElementById('cats');
  const typeMode=['qa','mc','cloze','order','match'].includes(mode);
  if(cats)cats.hidden=!typeMode;
  if(mode==='daily'){quizPool=dueList().slice(0,12);if(!quizPool.length)quizPool=shuffle(QUESTIONS.filter(q=>!isMastered(q.id))).slice(0,8);if(!quizPool.length)quizPool=shuffle(QUESTIONS).slice(0,8);}
  else if(mode==='review'){quizPool=shuffle(QUESTIONS.filter(q=>isWeak(q.id)));
    if(!quizPool.length){quizarea().innerHTML=`<div class="quizcard result"><div class="emoji">✨</div><div class="msg">弱点はありません。「今日の学習」で新しい問題に挑戦しましょう。</div></div>`;return;}}
  else{quizPool=shuffle(QUESTIONS.filter(q=>q.type===mode&&(quizCat==='all'||q.cat===quizCat)));
    if(!quizPool.length){quizarea().innerHTML=`<div class="quizcard"><p class="hint">この分野×形式の問題はありません。分野を「全分野」に。</p></div>`;return;}}
  store.session={mode,ids:quizPool.map(q=>q.id),idx:0,cat:quizCat};save(); // 中断復帰用にセッションを保存
  showQ();
}
function resumeSession(){const s=store.session;if(!s||!Array.isArray(s.ids)){return;}
  go('quiz');                                        // #quizarea を用意（renderQuiz が quizMode=null にする）
  quizMode=s.mode;quizCat=s.cat||'all';
  quizPool=s.ids.map(id=>QUESTIONS.find(q=>q.id===id)).filter(Boolean);
  quizIdx=Math.min(s.idx||0,quizPool.length);sCorrect=0;sAnswered=0;
  const cats=document.getElementById('cats');if(cats)cats.hidden=!['qa','mc','cloze','order','match'].includes(quizMode);
  if(!quizPool.length){store.session=null;save();return;}
  showQ();
}
function openCreate(){go('prog');setTimeout(()=>{const b=document.querySelector('#uqBox');if(b){b.open=true;b.scrollIntoView({behavior:'smooth',block:'start'});const f=b.querySelector('#uqQ');if(f)f.focus({preventScroll:true});}},60);}
function showQ(){
  const area=quizarea();
  if(quizIdx>=quizPool.length){
    store.session=null;save();                       // セッション完走＝中断状態をクリア
    const pct=sAnswered?Math.round(sCorrect/sAnswered*100):0;
    const e=pct>=80?'🏆':pct>=50?'👍':'📚';
    const msg=pct>=80?'お見事。定着が進みました。':pct>=50?'いい調子。弱点を復習しましょう。':'反復が力に。忘れた頃に自動で戻ってきます。';
    area.innerHTML=`<div class="quizcard result"><div class="emoji">${e}</div><div class="big">${sCorrect}/${sAnswered}</div>
      <div class="msg">正答率 ${pct}%　—　${msg}</div>
      <button class="btn wide" id="again">続けて次のセット</button>
      <button class="btn ghost wide" id="back" style="margin-top:9px">モード選択へ</button></div>`;
    area.querySelector('#again').addEventListener('click',()=>startQuiz(quizMode));
    area.querySelector('#back').addEventListener('click',()=>renderQuiz());
    renderHome();if(gSignedIn)cloudSync();return;
  }
  if(store.session){store.session.idx=quizIdx;save();} // 中断復帰用に現在位置を保存
  const q=quizPool[quizIdx];
  const prog=`<div class="progressbar" role="progressbar" aria-valuemin="0" aria-valuemax="${quizPool.length}" aria-valuenow="${quizIdx+1}" aria-label="${quizPool.length}問中 ${quizIdx+1}問目"><i style="width:${quizIdx/quizPool.length*100}%"></i></div>`;
  const meta=`<div class="qmeta"><span class="badge">${esc(q.cat)}・${typeName(q.type)}</span><span>${quizIdx+1} / ${quizPool.length}</span></div>`;
  area.innerHTML=prog;const card=document.createElement('div');area.appendChild(card);
  const r={qa:renderQA,mc:renderMC,cloze:renderCloze,order:renderOrder,match:renderMatch}[q.type];
  if(!r){quizIdx++;return showQ();}
  r(q,meta,q.id,card);
  const h=card.querySelector('h2,.qtext');if(h){h.setAttribute('tabindex','-1');h.focus({preventScroll:true});}
}
function typeName(t){return{qa:'一問一答',mc:'4択',cloze:'穴埋め',order:'並べ替え',match:'関係づけ'}[t];}
function nextBtn(){return `<button class="btn wide" style="margin-top:14px" id="nextQ">次へ →</button>`;}
function bindNext(s){const n=s.querySelector('#nextQ');if(n)n.addEventListener('click',()=>{quizIdx++;showQ();});}
function srcLine(q){return `<div class="src"><span>出典：${esc(q.src)}</span><a class="srcchk" href="https://www.google.com/search?q=${encodeURIComponent(q.src||'')}" target="_blank" rel="noopener noreferrer" aria-label="出典を新しいタブで検索して確認" style="margin-left:10px;color:var(--accent);text-decoration:underline;white-space:nowrap">🔍 出典を確認</a></div>`;}
function answer(id,ok){review(id,ok);sAnswered++;if(ok)sCorrect++;
  store.totalAnswered=(store.totalAnswered||0)+1;if(ok)store.totalCorrect=(store.totalCorrect||0)+1;
  const d=todayStr();store.dailyDone=store.dailyDone||{};store.dailyDone[d]=(store.dailyDone[d]||0)+1;save();}

function renderQA(q,meta,id,card){
  card.innerHTML=`<div class="quizcard">${meta}<div class="qtext">${esc(q.q)}</div>
    <button class="btn ghost wide" id="showA">答えを表示</button>
    <div class="reveal ok" id="A"><b>A.</b> ${esc(q.a)}${srcLine(q)}
      <div style="margin-top:11px;display:flex;gap:9px">
        <button class="btn ok" style="flex:1" id="g1">✓ 言えた</button>
        <button class="btn ng" style="flex:1" id="g0">✗ あいまい</button></div></div></div>`;
  card.querySelector('#showA').addEventListener('click',()=>{const a=card.querySelector('#A');a.classList.add('show');a.setAttribute('role','status');a.tabIndex=-1;a.focus({preventScroll:true});});
  card.querySelector('#g1').addEventListener('click',()=>{answer(id,true);toast('✓ 正解として記録');quizIdx++;showQ();});
  card.querySelector('#g0').addEventListener('click',()=>{answer(id,false);toast('🎯 弱点として記録（また戻します）');quizIdx++;showQ();});
}
function renderMC(q,meta,id,card){
  const ks=['A','B','C','D','E','F'];
  // 選択肢をシャッフル（位置で答えを覚えるのを防ぐ）。orig=元のインデックス、ansPos=正答の表示位置。
  const opts=shuffle(q.choices.map((c,i)=>({c,orig:i})));
  const ansPos=opts.findIndex(o=>o.orig===q.ans);
  card.innerHTML=`<div class="quizcard">${meta}<div class="qtext">${esc(q.q)}</div>
    <div id="ch">${opts.map((o,i)=>`<button class="choice" data-i="${i}"><span class="k">${ks[i]}</span><span>${esc(o.c)}</span></button>`).join('')}</div>
    <div class="reveal" id="R"></div></div>`;
  const wrap=card.querySelector('#ch');
  wrap.querySelectorAll('.choice').forEach(b=>b.addEventListener('click',()=>{
    const i=+b.dataset.i,ok=i===ansPos;
    wrap.querySelectorAll('.choice').forEach((x,j)=>{x.disabled=true;
      if(j===ansPos){x.classList.add('correct');x.querySelector('.k').textContent='✓';}
      if(j===i&&!ok){x.classList.add('wrong');x.querySelector('.k').textContent='✗';}});
    answer(id,ok);const R=card.querySelector('#R');R.className='reveal show '+(ok?'ok':'ng');
    R.innerHTML=`<b>${ok?'✅ 正解':'❌ 不正解'}</b>　正答：${ks[ansPos]}. ${esc(opts[ansPos].c)}<br>${esc(q.exp)}${srcLine(q)}${nextBtn()}`;bindNext(card);
    R.setAttribute('role','status');R.tabIndex=-1;R.focus({preventScroll:true}); // 採点結果をSRへ通知＋フォーカス移動
  }));
}
function renderCloze(q,meta,id,card){
  const html=q.parts.map(p=>typeof p==='string'?esc(p):`<span class="blank" tabindex="0" role="button" aria-label="空欄をめくる">${esc(p.b)}</span>`).join('');
  card.innerHTML=`<div class="quizcard cloze">${meta}
    <div class="redtoggle"><button class="btn ghost" id="allrev">全部めくる</button><span style="font-size:.72rem;color:var(--sub)">赤い部分をタップ/Enterで表示</span></div>
    <div class="qtext" style="font-weight:500;font-size:1rem">${html}</div>
    <div style="margin-top:14px;display:flex;gap:9px"><button class="btn ok" style="flex:1" id="g1">✓ 言えた</button><button class="btn ng" style="flex:1" id="g0">✗ あいまい</button></div>${srcLine(q)}</div>`;
  const toggle=b=>b.classList.toggle('show');
  card.querySelectorAll('.blank').forEach(b=>{b.addEventListener('click',()=>toggle(b));b.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle(b);}});});
  card.querySelector('#allrev').addEventListener('click',()=>card.querySelectorAll('.blank').forEach(b=>b.classList.add('show')));
  card.querySelector('#g1').addEventListener('click',()=>{answer(id,true);toast('✓ 正解として記録');quizIdx++;showQ();});
  card.querySelector('#g0').addEventListener('click',()=>{answer(id,false);toast('🎯 弱点として記録');quizIdx++;showQ();});
}
function renderOrder(q,meta,id,card){
  const sh=shuffle(q.items.map((t,i)=>({t,i})));
  card.innerHTML=`<div class="quizcard">${meta}<div class="qtext">${esc(q.q)}</div>
    <ul class="orderlist" id="ol">${sh.map((o,pos)=>`<li draggable="true" data-i="${o.i}" aria-label="${pos+1}番目：${esc(o.t)}"><span class="num" aria-hidden="true">≡</span><span class="txt">${esc(o.t)}</span><span class="mv"><button class="up" aria-label="上へ">▲</button><button class="dn" aria-label="下へ">▼</button></span></li>`).join('')}</ul>
    <button class="btn wide" id="ck">答え合わせ</button><div class="reveal" id="R"></div></div>`;
  const ul=card.querySelector('#ol');let drag=null,answered=false;
  const move=(li,dir)=>{if(answered)return;if(dir<0&&li.previousElementSibling)ul.insertBefore(li,li.previousElementSibling);if(dir>0&&li.nextElementSibling)ul.insertBefore(li.nextElementSibling,li);};
  ul.addEventListener('click',e=>{const li=e.target.closest('li');if(!li)return;if(e.target.classList.contains('up'))move(li,-1);if(e.target.classList.contains('dn'))move(li,1);});
  ul.addEventListener('dragstart',e=>{if(answered)return;drag=e.target.closest('li');drag.classList.add('dragging');});
  ul.addEventListener('dragend',e=>{if(drag)drag.classList.remove('dragging');drag=null;});
  ul.addEventListener('dragover',e=>{e.preventDefault();if(!drag)return;const a=after(e.clientY);if(a==null)ul.appendChild(drag);else ul.insertBefore(drag,a);});
  ul.addEventListener('touchmove',e=>{if(!drag)return;e.preventDefault();const a=after(e.touches[0].clientY);if(a==null)ul.appendChild(drag);else ul.insertBefore(drag,a);},{passive:false});
  ul.querySelectorAll('.num').forEach(n=>{n.addEventListener('touchstart',e=>{drag=e.target.closest('li');drag.classList.add('dragging');},{passive:true});});
  ul.addEventListener('touchend',()=>{if(drag){drag.classList.remove('dragging');drag=null;}});
  function after(y){return [...ul.querySelectorAll('li:not(.dragging)')].reduce((c,ch)=>{const box=ch.getBoundingClientRect();const off=y-box.top-box.height/2;return off<0&&off>c.off?{off,el:ch}:c;},{off:-Infinity}).el;}
  card.querySelector('#ck').addEventListener('click',()=>{
    if(answered)return;answered=true;
    const order=[...ul.children].map(li=>+li.dataset.i),ok=order.every((v,i)=>v===i);
    answer(id,ok);ul.querySelectorAll('li').forEach(li=>li.setAttribute('draggable','false'));
    const R=card.querySelector('#R');R.className='reveal show '+(ok?'ok':'ng');
    R.innerHTML=`<b>${ok?'✅ 正しい順です':'❌ 違います'}</b>${ok?'':'　正しい順：<br>'+q.items.map((t,i)=>`${i+1}. ${esc(t)}`).join('<br>')}<br>${esc(q.exp)}${srcLine(q)}${nextBtn()}`;bindNext(card);
    R.setAttribute('role','status');R.tabIndex=-1;R.focus({preventScroll:true});
    card.querySelector('#ck').disabled=true;
  });
}
function renderMatch(q,meta,id,card){
  const left=q.pairs.map((p,i)=>({t:p[0],i})),right=shuffle(q.pairs.map((p,i)=>({t:p[1],i})));
  card.innerHTML=`<div class="quizcard">${meta}<div class="qtext">${esc(q.q)}</div>
    <div class="matchwrap"><div class="matchcol" id="L">${left.map(o=>`<button data-i="${o.i}">${esc(o.t)}</button>`).join('')}</div>
      <div class="matchcol" id="R">${right.map(o=>`<button data-i="${o.i}">${esc(o.t)}</button>`).join('')}</div></div><div class="reveal" id="RR"></div></div>`;
  let selL=null,done=0,miss=false;const L=card.querySelector('#L'),R=card.querySelector('#R');
  L.addEventListener('click',e=>{const b=e.target.closest('button');if(!b||b.classList.contains('done'))return;L.querySelectorAll('button').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');selL=b;});
  R.addEventListener('click',e=>{const b=e.target.closest('button');if(!b||b.classList.contains('done')||!selL)return;
    if(+b.dataset.i===+selL.dataset.i){b.classList.add('done');b.textContent='✓ '+b.textContent;selL.classList.add('done');selL.classList.remove('sel');selL=null;done++;
      b.setAttribute('aria-pressed','true');
      if(done===q.pairs.length){answer(id,!miss);const r=card.querySelector('#RR');r.className='reveal show '+(miss?'ng':'ok');r.innerHTML=`<b>${miss?'クリア（ミスあり→要復習に記録）':'✅ 全問正解！'}</b>${srcLine(q)}${nextBtn()}`;bindNext(card);r.setAttribute('role','status');r.tabIndex=-1;r.focus({preventScroll:true});}
    }else{miss=true;b.classList.add('wrong');setTimeout(()=>b.classList.remove('wrong'),450);toast('不一致');}
  });
}

//==================== ユーザー作成問題（作成・共有：エクスポート/インポート） ====================
const UQ_INPUT='width:100%;padding:8px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);font:inherit';

  const n=(store.userQuestions||[]).length;
  const cu=getCommunityUrl(),cn=COMMUNITY_QUESTIONS.length;
  return `<details class="rb" id="uqBox" style="margin-top:14px"><summary>✍️ 問題の作成・共有（自作 ${n}問${cu?` ／ みんなの問題 ${cn}問`:''}）<span class="chev">›</span></summary>
    <div class="body">
      <p class="hint" style="margin-top:0">自作の問題を追加できます。${cu?'<b>「みんなの問題」に出す</b>と、承認後に全員へ自動で配信されます（受け取りは全自動）。':'<b>エクスポート</b>でファイルにして仲間に共有、<b>インポート</b>で受け取れます（端末内＋ログイン時はDrive同期）。'}</p>
      <div style="display:grid;gap:8px">
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <select id="uqType" aria-label="問題の形式" style="flex:1;min-width:110px;${UQ_INPUT}"><option value="qa">一問一答</option><option value="mc">4択</option></select>
          <input id="uqCat" aria-label="分野" placeholder="分野（例：法規）" style="flex:1;min-width:110px;${UQ_INPUT}">
        </div>
        <textarea id="uqQ" aria-label="問題文" placeholder="問題文" rows="2" style="${UQ_INPUT}"></textarea>
        <div id="uqQA"><input id="uqA" aria-label="答え" placeholder="答え" style="${UQ_INPUT}"></div>
        <div id="uqMC" style="display:none;grid-template-columns:auto 1fr;gap:7px;align-items:center">
          ${[0,1,2,3].map(i=>`<label style="display:flex;align-items:center;gap:5px;white-space:nowrap"><input type="radio" name="uqCorrect" value="${i}" ${i===0?'checked':''} aria-label="選択肢${i+1}を正解にする"><span style="font-size:.78rem;color:var(--sub)">正解</span></label><input class="uqChoice" data-i="${i}" aria-label="選択肢${i+1}" placeholder="選択肢${i+1}" style="${UQ_INPUT}">`).join('')}
          <div style="grid-column:1/3"><input id="uqExp" aria-label="解説（任意）" placeholder="解説（任意）" style="${UQ_INPUT}"></div>
        </div>
        <input id="uqSrc" aria-label="出典" placeholder="出典（例：学校教育法第37条）" style="${UQ_INPUT}">
        ${cu?`<label style="display:flex;align-items:center;gap:7px;font-size:.82rem;color:var(--sub)"><input type="checkbox" id="uqShare"> 作成後に「みんなの問題」に出す（承認後に全員へ／任意）</label>`:''}
        <button class="btn wide" id="uqAdd">＋ 問題を追加</button>
      </div>
      <div class="syncrow" style="margin-top:12px">
        ${cu&&n?`<button class="btn ghost" id="uqShareAll">📣 自作を共有に出す</button>`:''}
        <button class="btn ghost" id="uqExport">📤 エクスポート</button>
        <button class="btn ghost" id="uqImport">📥 インポート</button>
        ${n?`<button class="btn ghost" id="uqClear" style="flex:0 0 auto">自作を全削除</button>`:''}
      </div>
      <input type="file" id="uqFile" accept="application/json,.json" style="display:none">
    </div></details>`;
}
function bindUserQ(el){
  const q=s=>el.querySelector(s);const ty=q('#uqType');if(!ty)return;
  ty.addEventListener('change',()=>{const mc=ty.value==='mc';q('#uqMC').style.display=mc?'grid':'none';q('#uqQA').style.display=mc?'none':'block';});
  q('#uqAdd').addEventListener('click',()=>{
    const cat=(q('#uqCat').value||'自作').trim(),qt=q('#uqQ').value.trim(),src=(q('#uqSrc').value||'自作問題').trim();
    if(!qt){toast('問題文を入力してください');return;}
    const id='u'+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36);
    let obj;
    if(ty.value==='qa'){const a=q('#uqA').value.trim();if(!a){toast('答えを入力してください');return;}obj={id,type:'qa',cat,q:qt,a,src};}
    else{const raw=[...el.querySelectorAll('.uqChoice')].map(x=>x.value.trim());
      const ansRaw=+(el.querySelector('input[name=uqCorrect]:checked')||{value:0}).value;
      if(!raw[ansRaw]){toast('正解に選んだ選択肢が空です');return;}
      const choices=[];let ans=0;raw.forEach((c,i)=>{if(c){if(i===ansRaw)ans=choices.length;choices.push(c);}});
      if(choices.length<2){toast('選択肢を2つ以上入力してください');return;}
      obj={id,type:'mc',cat,q:qt,choices,ans,exp:(q('#uqExp').value||'').trim(),src};}
    store.userQuestions=store.userQuestions||[];store.userQuestions.push(obj);save();rebuildQuestions();
    if(typeof gSignedIn!=='undefined'&&gSignedIn)cloudSync();
    const share=q('#uqShare');
    if(share&&share.checked&&getCommunityUrl()){
      submitCommunity(obj).then(()=>toast('追加し、みんなの問題に出しました（承認待ち）')).catch(err=>{elog({type:'community',msg:'投稿失敗:'+err.message});toast('追加（共有の送信は失敗）');});
    }else{toast('追加しました（自作 '+store.userQuestions.length+'問）');}
    renderProg();
    // フォーム再生成後、アコーディオンを開いたまま問題文入力にフォーカスを戻す（連続追加しやすく）
    const box=document.querySelector('#uqBox');if(box){box.open=true;const f=box.querySelector('#uqQ');if(f)f.focus();}
  });
  const sa=q('#uqShareAll');if(sa)sa.addEventListener('click',async()=>{
    if(!getCommunityUrl())return;if(!confirm('自作問題を「みんなの問題」に出しますか？（承認後に全員へ表示）'))return;
    let ok=0,ng=0;for(const obj of (store.userQuestions||[])){try{await submitCommunity(obj);ok++;}catch(e){ng++;}}
    toast(ok+'問を共有に出しました'+(ng?`（${ng}問は失敗/既出）`:''));
  });
  q('#uqExport').addEventListener('click',()=>{
    const data=JSON.stringify(store.userQuestions||[],null,1);
    const blob=new Blob([data],{type:'application/json'}),url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='okinawa-questions.json';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1500);
    toast('エクスポートしました');
  });
  q('#uqImport').addEventListener('click',()=>q('#uqFile').click());
  q('#uqFile').addEventListener('change',e=>{
    const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{try{const arr=JSON.parse(r.result);if(!Array.isArray(arr))throw 0;
      store.userQuestions=store.userQuestions||[];const seen={};store.userQuestions.forEach(x=>seen[x.id]=1);let added=0;
      let skipped=0;arr.forEach(x=>{if(x&&x.id&&!seen[x.id]&&validQuestion(x)){seen[x.id]=1;store.userQuestions.push(x);added++;}else if(x&&x.id&&!validQuestion(x))skipped++;});
      save();rebuildQuestions();if(typeof gSignedIn!=='undefined'&&gSignedIn)cloudSync();renderProg();toast(added+'問インポートしました'+(skipped?`（不正 ${skipped}問は除外）`:''));
    }catch(err){toast('読み込めないファイル形式です');}};
    r.readAsText(f);e.target.value='';
  });
  const cl=q('#uqClear');if(cl)cl.addEventListener('click',()=>{if(confirm('自作問題をすべて削除しますか？')){store.userQuestions=[];save();rebuildQuestions();renderProg();toast('削除しました');}});
}

//==================== PROGRESS ====================
function renderProg(){
  const el=document.getElementById('prog');
  const total=QUESTIONS.length;
  const mast=QUESTIONS.filter(q=>isMastered(q.id)).length;
  const seen=QUESTIONS.filter(q=>getCard(q.id)).length;
  const weak=QUESTIONS.filter(q=>isWeak(q.id));
  const due=dueList().length;
  const cats=[...new Set(QUESTIONS.map(q=>q.cat))];
  const acc=store.totalAnswered||0,accC=store.totalCorrect||0,accPct=acc?Math.round(accC/acc*100):0;
  const todayDone=(store.dailyDone&&store.dailyDone[todayStr()])||0;
  el.innerHTML=`
    <div class="stat">
      <div class="box a"><div class="n">${due}</div><div class="l">今日の復習</div></div>
      <div class="box b"><div class="n">${mast}</div><div class="l">定着</div></div>
      <div class="box c"><div class="n">${weak.length}</div><div class="l">要復習</div></div>
    </div>
    <div class="card" style="display:flex;justify-content:space-around;text-align:center;gap:8px;flex-wrap:wrap">
      <div><b style="font-size:1.25rem">🔥 ${store.streak||0}</b><div style="font-size:.72rem;color:var(--sub)">連続日数</div></div>
      <div><b style="font-size:1.25rem">${todayDone}</b><div style="font-size:.72rem;color:var(--sub)">今日解いた</div></div>
      <div><b style="font-size:1.25rem">${acc}</b><div style="font-size:.72rem;color:var(--sub)">通算（正答率 ${accPct}%）</div></div>
    </div>
    <div class="card" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <label for="examIn" style="font-size:.9rem;font-weight:700">🎯 試験日</label>
      <input type="date" id="examIn" value="${store.examDate||''}" style="padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);font:inherit">
      <span style="font-size:.78rem;color:var(--sub)">${(()=>{const d=examDaysLeft();return d==null?'設定すると試験日に向けて復習間隔を自動調整します。':(d>0?'あと '+d+' 日。これを越えて復習は先送りしません。':'本番当日／経過');})()}</span>
    </div>
    <h3 class="sec">要復習リスト（${weak.length}）</h3>
    ${weak.length?weak.map(q=>{const c=getCard(q.id);const nd=Math.max(0,Math.ceil((c.due-Date.now())/DAY));return `<div class="wrongitem">[${esc(q.cat)}] ${esc((q.q||(q.parts?'穴埋め：'+q.parts.filter(p=>p.b).map(p=>p.b).join('／'):'')).replace(/<[^>]+>/g,''))}<br><span style="color:var(--sub);font-size:.72rem">あやふや・次回 ${nd===0?'今日':nd+'日後'}</span></div>`;}).join(''):`<div class="card"><p class="hint" style="margin:0">${seen===0?'まだ学習履歴がありません。「クイズ」から始めましょう。':'要復習はありません。素晴らしい！'}</p></div>`}
    ${weak.length?`<button class="btn wide" style="margin-top:12px" id="revBtn">要復習をまとめて復習</button>`:''}
    <h3 class="sec">分野別の定着</h3><div class="card">${cats.map(c=>{
      const qs=QUESTIONS.filter(q=>q.cat===c),m=qs.filter(q=>isMastered(q.id)).length,p=Math.round(m/qs.length*100);
      return `<div class="catrow"><div class="top"><span>${esc(c)}</span><span>${m}/${qs.length}</span></div><div class="bar" role="progressbar" aria-valuemin="0" aria-valuemax="${qs.length}" aria-valuenow="${m}" aria-label="${esc(c)} ${m}/${qs.length}定着"><i style="width:${p}%"></i></div></div>`;}).join('')}</div>
    <h3 class="sec">直近7日の学習</h3><div class="card"><div class="heat" id="heat"></div></div>
    ${userQSection()}
    <details class="rb" style="margin-top:14px"><summary>⚙️ 同期・データ管理<span class="chev">›</span></summary>
      <div class="body">
        <div id="syncMount"></div>
        ${(()=>{const elg=getElog();return elg.length?`<h4 style="margin:16px 0 6px">🐞 エラーログ（${elg.length}）</h4><small style="color:var(--sub)">不具合を自動記録（外部送信なし）。コピーして開発者に送ると修正に役立ちます。</small><pre id="elogPre" style="white-space:pre-wrap;font-size:.7rem;max-height:160px;overflow:auto;margin:8px 0;color:var(--ng)">${elg.map(e=>new Date(e.t).toLocaleString()+' ['+(e.type||'?')+'] '+String(e.msg||'').replace(/[<>&]/g,'')).join('\n')}</pre><div class="syncrow"><button class="btn" id="elogCopy">コピー</button><button class="btn ghost" id="elogClr">消去</button></div>`:'';})()}
        <button class="btn ghost wide" style="margin-top:16px;border-color:var(--ng);color:var(--ng)" id="resetBtn">学習の記録を消す</button>
      </div>
    </details>`;
  // heatmap: 直近7日（その日の学習量で濃淡）
  const heat=el.querySelector('#heat');const days=['日','月','火','水','木','金','土'];
  const allHist=[];Object.values(store.cards).forEach(c=>c.hist&&c.hist.forEach(h=>allHist.push(h.t)));
  for(let i=6;i>=0;i--){const d=new Date(Date.now()-i*DAY);const key=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
    const n=allHist.filter(t=>{const dd=new Date(t);return dd.getFullYear()+'-'+(dd.getMonth()+1)+'-'+dd.getDate()===key;}).length;
    const div=document.createElement('div');if(n>0){div.className='done';div.style.opacity=n>=10?'1':n>=4?'.72':'.42';}
    div.title=key+'：'+n+'問';div.setAttribute('aria-label',(d.getMonth()+1)+'月'+d.getDate()+'日 '+n+'問学習');div.textContent=days[d.getDay()];heat.appendChild(div);}
  const ex=el.querySelector('#examIn');if(ex)ex.addEventListener('change',e=>{store.examDate=e.target.value||null;store.examDateT=Date.now();save();if(gSignedIn)cloudSync();renderProg();toast(store.examDate?'試験日を設定しました':'試験日を解除しました');});
  const ecp=el.querySelector('#elogCopy');if(ecp)ecp.addEventListener('click',()=>{const t=el.querySelector('#elogPre').textContent;(navigator.clipboard?navigator.clipboard.writeText(t):Promise.reject()).then(()=>toast('コピーしました'),()=>toast('コピーできませんでした'));});
  const ecl=el.querySelector('#elogClr');if(ecl)ecl.addEventListener('click',()=>{clearElog();renderProg();toast('エラーログを消去しました');});
  const rv=el.querySelector('#revBtn');if(rv)rv.addEventListener('click',()=>{go('quiz');startQuiz('review');});
  bindUserQ(el);
  el.querySelector('#resetBtn').addEventListener('click',()=>{if(confirm('学習の記録（正誤・定着・連続日数・統計）をすべて消去します。よろしいですか？\n※作成した問題と各種設定は残ります。')){const keep={theme:store.theme,examDate:store.examDate,examDateT:store.examDateT||0,userQuestions:store.userQuestions,fontScale:store.fontScale};store=Object.assign({cards:{},streak:0,lastDate:null,dailyDate:null,totalAnswered:0,totalCorrect:0,dailyDone:{},session:null},keep);save();if(gSignedIn&&accessToken)driveSave(store).catch(()=>{});renderProg();toast('学習の記録を消去しました');}});
  mountSync();
}

//==================== GOOGLE DRIVE 同期 ====================
const GSCOPE='https://www.googleapis.com/auth/drive.appdata';
// ★ここに一度だけOAuthクライアントIDを貼ると、利用者は「Googleでログイン」だけでOK（貼り付け欄は消えます）。
//   取得手順は README 手順2。空のままだと、各端末で手動入力にフォールバックします。
//   例: const DEFAULT_CLIENT_ID='1234567890-abcde.apps.googleusercontent.com';
const DEFAULT_CLIENT_ID='773737222519-k2gpp483dqmnghfiuuv48kde10c2khog.apps.googleusercontent.com';
let tokenClient=null,accessToken=null,gSignedIn=false;
function usingDefaultClientId(){return !!(typeof DEFAULT_CLIENT_ID!=='undefined'&&DEFAULT_CLIENT_ID);}
function getClientId(){return usingDefaultClientId()?DEFAULT_CLIENT_ID:(localStorage.getItem('gclient')||'');}

// ===== みんなの問題（コミュニティ共有：GAS Web App＋スプレッドシート） =====
// DEFAULT_COMMUNITY_URL に GAS の /exec を入れると、自作問題を承認制で全員に自動共有できる。
//  受け取り＝全自動（起動時にGETして合成）／投稿＝ワンタップ（POST, text/plainでCORSプリフライト回避）。
//  承認はあなたがスプレッドシートの status を approved にした問題だけがGETで配信される。
const DEFAULT_COMMUNITY_URL='https://script.google.com/macros/s/AKfycbyUGWaoklT0PvPB-uhBvsoSquQHKRGxIsUjg9BuivheJhpxw-XE-TtFx-xh02FjR3Yy9g/exec';
function getCommunityUrl(){return (typeof DEFAULT_COMMUNITY_URL!=='undefined'&&DEFAULT_COMMUNITY_URL)?DEFAULT_COMMUNITY_URL:(localStorage.getItem('community_url')||'');}
const COMMUNITY_CACHE='okinawa_community_cache';
let COMMUNITY_QUESTIONS=[];
function loadCommunityCache(){try{const a=JSON.parse(localStorage.getItem(COMMUNITY_CACHE)||'[]');COMMUNITY_QUESTIONS=Array.isArray(a)?a.filter(validQuestion):[];}catch(e){COMMUNITY_QUESTIONS=[];}}
const COMMUNITY_MAX=1000; // 取り込み上限（localStorage肥大の歯止め）
async function fetchCommunity(){const url=getCommunityUrl();if(!url)return;
  try{const r=await fetch(url);if(!r.ok)throw new Error('HTTP '+r.status);const j=await r.json();const arr=Array.isArray(j)?j:((j&&j.questions)||[]);
    if(Array.isArray(arr)){COMMUNITY_QUESTIONS=arr.filter(validQuestion).slice(0,COMMUNITY_MAX);localStorage.setItem(COMMUNITY_CACHE,JSON.stringify(COMMUNITY_QUESTIONS));rebuildQuestions();rerenderAll();}
  }catch(e){elog({type:'community',msg:'共有問題の取得に失敗: '+((e&&e.message)||e)});}}
async function submitCommunity(qObj){const url=getCommunityUrl();if(!url)throw new Error('共有先が未設定です');
  const res=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(qObj)});
  let j;try{j=await res.json();}catch(e){j={ok:res.ok};}
  if(!j.ok)throw new Error(j.error||'送信に失敗しました');return j;}
function gReady(){return window.google&&google.accounts&&google.accounts.oauth2;}
function initGoogle(){
  if(!gReady()||!getClientId())return false;
  tokenClient=google.accounts.oauth2.initTokenClient({client_id:getClientId(),scope:GSCOPE,
    callback:async(resp)=>{if(resp&&resp.access_token){accessToken=resp.access_token;gSignedIn=true;await cloudSync();toast('Googleと同期しました ✓');renderProg();}else{toast('ログインできませんでした');}}});
  return true;
}
function signInGoogle(){if(!tokenClient&&!initGoogle()){toast('先にClient IDを設定してください');return;}tokenClient.requestAccessToken({prompt:gSignedIn?'':'consent'});}
function signOutGoogle(){if(accessToken&&gReady())google.accounts.oauth2.revoke(accessToken,()=>{});accessToken=null;gSignedIn=false;renderProg();toast('サインアウトしました');}
async function driveFind(){const r=await fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,name)&q="+encodeURIComponent("name='progress.json'"),{headers:{Authorization:'Bearer '+accessToken}});if(!r.ok)throw new Error('driveFind HTTP '+r.status);const j=await r.json();return j.files&&j.files[0];}
async function driveGet(id){const r=await fetch('https://www.googleapis.com/drive/v3/files/'+id+'?alt=media',{headers:{Authorization:'Bearer '+accessToken}});if(!r.ok)throw new Error('driveGet HTTP '+r.status);return await r.json();}
async function driveSave(obj){const file=await driveFind();const meta=file?{}:{name:'progress.json',parents:['appDataFolder']};const b='----edu'+Date.now();
  const body=`--${b}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(meta)}\r\n--${b}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(obj)}\r\n--${b}--`;
  const url=file?`https://www.googleapis.com/upload/drive/v3/files/${file.id}?uploadType=multipart`:`https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
  const r=await fetch(url,{method:file?'PATCH':'POST',headers:{Authorization:'Bearer '+accessToken,'Content-Type':'multipart/related; boundary='+b},body});if(!r.ok)throw new Error('driveSave HTTP '+r.status);}
function lastAct(c){return c&&c.hist&&c.hist.length?c.hist[c.hist.length-1].t:0;} // 「最終操作時刻」。hist無しは due を使わず劣後
function mergeStore(a,b){if(!b)return a;const out=JSON.parse(JSON.stringify(a));out.cards=out.cards||{};
  const ids=new Set([...Object.keys(a.cards||{}),...Object.keys(b.cards||{})]);
  ids.forEach(id=>{const ca=(a.cards||{})[id],cb=(b.cards||{})[id];if(!ca){out.cards[id]=cb;return;}if(!cb){out.cards[id]=ca;return;}out.cards[id]=lastAct(cb)>lastAct(ca)?cb:ca;});
  out.streak=Math.max(a.streak||0,b.streak||0);
  out.lastDate=[a.lastDate,b.lastDate].filter(Boolean).sort((x,y)=>ymdNum(x)-ymdNum(y)).pop()||null; // 日付は数値比較（文字列ソートの誤りを回避）
  // examDate は最後に変更した方を採用（設定も解除も端末間で伝播）
  if((b.examDateT||0)>(a.examDateT||0))out.examDate=b.examDate;
  out.examDateT=Math.max(a.examDateT||0,b.examDateT||0);
  // ユーザー作成問題は id で和集合（両端末で作った問題を統合）
  {const seen={},merged=[];[...(a.userQuestions||[]),...(b.userQuestions||[])].forEach(q=>{if(q&&q.id&&!seen[q.id]){seen[q.id]=1;merged.push(q);}});out.userQuestions=merged;}
  // 累積統計は端末間で大きい方を採用（同一行動の同期による二重計上を避ける近似）
  out.totalAnswered=Math.max(a.totalAnswered||0,b.totalAnswered||0);
  out.totalCorrect=Math.max(a.totalCorrect||0,b.totalCorrect||0);
  {const dd=Object.assign({},a.dailyDone||{});const bd=b.dailyDone||{};Object.keys(bd).forEach(k=>{dd[k]=Math.max(dd[k]||0,bd[k]||0);});out.dailyDone=dd;}
  return out;}
async function cloudSync(){if(!accessToken)return;try{const f=await driveFind();const cloud=f?await driveGet(f.id):null;store=mergeStore(store,cloud);save();await driveSave(store);renderHome();}catch(e){console.warn(e);toast('同期に失敗しました');}}
function mountSync(){
  const mt=document.getElementById('syncMount');if(!mt)return;const cid=getClientId();
  mt.innerHTML=`<div class="synccard ${gSignedIn?'on':''}">
    <div class="st"><span class="dotg"></span>${gSignedIn?'Googleと同期中':'Google Driveに進捗を保存'}</div>
    <small>${gSignedIn?'進捗はDriveのアプリ専用フォルダに保存され、複数の端末で引き継げます。':'ログインすると、スマホとPCで進捗を共有できます（Driveの隠しアプリフォルダに保存）。'} <a href="privacy.html" target="_blank" rel="noopener noreferrer" aria-label="プライバシーポリシーを新しいタブで開く" style="color:inherit;text-decoration:underline">プライバシーポリシー</a></small>
    ${cid?'':`<input id="cidIn" placeholder="Google OAuth クライアントIDを貼り付け（…apps.googleusercontent.com）" aria-label="クライアントID">`}
    <div class="syncrow" style="margin-top:10px">
      ${cid?'':'<button class="btn" id="saveCid">IDを保存</button>'}
      ${gSignedIn?'<button class="btn" id="syncNow">今すぐ同期</button><button class="btn ghost" id="signOut">サインアウト</button>'
        :(cid?'<button class="btn" id="signIn">Googleでログイン</button>':'')}
      ${cid&&!usingDefaultClientId()?'<button class="btn ghost" id="clrCid" style="flex:0 0 auto">ID変更</button>':''}
    </div></div>`;
  const q=s=>mt.querySelector(s);
  if(q('#saveCid'))q('#saveCid').addEventListener('click',()=>{const v=q('#cidIn').value.trim();if(!v){toast('IDを入力してください');return;}localStorage.setItem('gclient',v);tokenClient=null;mountSync();toast('保存しました。ログインできます');});
  if(q('#clrCid'))q('#clrCid').addEventListener('click',()=>{localStorage.removeItem('gclient');tokenClient=null;accessToken=null;gSignedIn=false;mountSync();});
  if(q('#signIn'))q('#signIn').addEventListener('click',signInGoogle);
  if(q('#syncNow'))q('#syncNow').addEventListener('click',async()=>{await cloudSync();toast('同期しました ✓');});
  if(q('#signOut'))q('#signOut').addEventListener('click',signOutGoogle);
}

if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}

//==================== UTIL ====================
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let toastT;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1600);}

//==================== INIT ====================
// 問題の正本は questions.json（同一オリジン＝CORSなし、SWでオフラインキャッシュ）。
// 起動時に読み込み、ユーザー作成問題(store.userQuestions)を連結して QUESTIONS を構成。
let BASE_QUESTIONS=[];
// 重複idを除いて 公式(questions.json) > みんなの共有 > 自作 の優先で合成
function rebuildQuestions(){const seen={},out=[];
  // 不正な問題（型別フィールド欠落）は除外し、描画/採点クラッシュを防ぐ。優先: 公式>共有>自作。
  [...BASE_QUESTIONS,...COMMUNITY_QUESTIONS,...(store.userQuestions||[])].forEach(q=>{if(q&&q.id&&!seen[q.id]&&validQuestion(q)){seen[q.id]=1;out.push(q);}});
  QUESTIONS=out;}
function rerenderAll(){selfCheck();renderHome();renderMap();renderRef();renderLookup();
  // クイズ回答中（背景の共有取得が解決した等）は #quiz を作り直さない＝進行中セッションを壊さない
  const quizBusy=quizMode!=null&&quizPool.length>0&&quizIdx<quizPool.length;
  if(!quizBusy)renderQuiz();
  if(document.getElementById('prog'))try{renderProg();}catch(e){}}
async function boot(){
  loadCommunityCache();                 // 前回取得した共有問題（オフライン/初速のため）
  if(store.examDate){const dl=examDaysLeft();if(dl!=null&&dl<=0){store.examDate=null;store.examDateT=Date.now();save();}} // 試験日を過ぎたら自動解除（通常SRSへ）
  try{
    const res=await fetch('questions.json');
    if(!res.ok)throw new Error('HTTP '+res.status);
    BASE_QUESTIONS=await res.json();
  }catch(e){elog({type:'load',msg:'questions.json 読み込み失敗: '+((e&&e.message)||e)});console.warn('questions.json 読み込み失敗',e);}
  rebuildQuestions();
  rerenderAll();
  fetchCommunity();                     // 背景で最新の共有問題を取得（届いたら再描画）
}
boot();
</script>
