<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

     ※frame-ancestors/X-Frame-Options は <meta> では効かない（HTTPヘッダ専用）ため GitHub Pages では適用不可。 -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.googleusercontent.com https://www.gstatic.com; font-src 'self'; connect-src 'self' https://accounts.google.com https://oauth2.googleapis.com https://www.googleapis.com https://script.google.com https://script.googleusercontent.com https://www.gstatic.com; frame-src https://accounts.google.com https://*.googleusercontent.com; base-uri 'none'; object-src 'none'; form-action 'none'">
<title>沖縄 教育法規ナビ — 管理職試験＆学校経営の判断の根拠</title>
<meta name="description" content="沖縄県の教頭・校長試験の対策と、日々の学校経営で“判断の根拠”を出典つきで引けるアプリ。間隔反復クイズ・要点・関係図・逆引き・論文/面接、条文への直リンク。">
<meta property="og:title" content="沖縄 教育法規ナビ — 管理職試験＆学校経営">
<meta property="og:description" content="教頭・校長試験の対策と、日々の学校経営の“判断の根拠”を出典つきで。">
<meta property="og:type" content="website">
<meta name="theme-color" content="#0e7490">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="教育法規">
<style>
  :root{
    --bg:#eef2f7; --bg2:#e3e9f2; --card:#ffffff; --ink:#16202e; --sub:#566174;
    --line:#e2e8f0; --line2:#c3cedd; --chip:#eef3f9;
    --accent:#0e7490; --accent2:#0891b2; --accent-soft:#cffafe;
    --ok:#15803d; --ok-soft:#dcfce7; --ng:#c2253b; --ng-soft:#fde7ea; --warn:#b45309;
    --ok-btn:#15803d; --ng-btn:#c2253b; /* 白文字ソリッドボタン用＝両テーマで十分濃く（ダークの淡い--ok/--ngは背景/バッジ用） */
    --law:#5b6b7a; --vision:#0e7490; --plan:#15803d; --doryoku:#b5651d; --proj:#9a2c6e;
    --shadow:0 1px 2px rgba(16,30,54,.06),0 8px 24px rgba(16,30,54,.08);
    --shadow-sm:0 1px 2px rgba(16,30,54,.06),0 2px 8px rgba(16,30,54,.05);
    --r1:12px; --r2:16px; --r3:20px;
  }
  html[data-theme="dark"]{
    --bg:#0c1220; --bg2:#0a0f1a; --card:#161f30; --ink:#e8eef6; --sub:#a6b2c4;
    --line:#243247; --line2:#3a4d68; --chip:#1d2940;
    --accent:#22d3ee; --accent2:#38bdf8; --accent-soft:#0e3a44;
    --ok:#5fd28a; --ok-soft:#10331f; --ng:#f3868f; --ng-soft:#39191d; --warn:#e0a14a;
    --law:#9aa7b8; --vision:#22d3ee; --plan:#5fd28a; --doryoku:#e0a14a; --proj:#e26aae;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.45);
    --shadow-sm:0 1px 2px rgba(0,0,0,.35),0 3px 10px rgba(0,0,0,.3);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{font-size:16px;}
  body{margin:0;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;
    color:var(--ink);background:
      radial-gradient(1200px 600px at 80% -10%, var(--accent-soft) 0%, transparent 55%),
      linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
    background-attachment:fixed;line-height:1.65;font-size:.94rem;-webkit-font-smoothing:antialiased;
    transition:background .4s,color .3s;}
  .app{max-width:960px;margin:0 auto;padding:0 0 calc(40px + env(safe-area-inset-bottom));}
  ::-webkit-scrollbar{height:6px;width:6px;}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px;}
  :focus-visible{outline:3px solid var(--accent2);outline-offset:2px;border-radius:6px;}
  b,strong{color:inherit;font-weight:700;}

  header.top{padding:max(16px,env(safe-area-inset-top)) 16px 0;position:sticky;top:0;z-index:30;
    background:linear-gradient(180deg,var(--bg) 65%,transparent);backdrop-filter:blur(8px);}
  .brand{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .brand h1{margin:0;font-size:1.06rem;font-weight:800;}
  .brand p{margin:1px 0 0;font-size:.72rem;color:var(--sub);}
  .theme{width:44px;height:44px;border-radius:13px;border:1px solid var(--line);background:var(--card);
    color:var(--ink);font-size:1.1rem;cursor:pointer;box-shadow:var(--shadow-sm);transition:.2s;flex:0 0 auto;}
  .theme:active{transform:scale(.92);}
  /* ヘッダー常設のログイン/同期バッジ（全画面でログイン状態が一目で分かる＝レビュー最重要対応。色だけでなくアイコン＋文言で示す） */
  .authbadge{display:inline-flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--line);color:var(--sub);border-radius:13px;padding:0 10px;height:44px;font:inherit;font-size:.72rem;font-weight:700;cursor:pointer;white-space:nowrap;box-shadow:var(--shadow-sm);transition:.2s;flex:0 0 auto;}
  .authbadge .ab-ic{font-size:.9rem;filter:grayscale(1);opacity:.65;position:relative;}
  .authbadge .ab-mk{position:absolute;right:-5px;bottom:-3px;font-size:.62rem;font-weight:900;color:var(--sub);}
  .authbadge.on{border-color:var(--ok-btn);color:var(--ok-btn);background:rgba(21,128,61,.09);}
  .authbadge.on .ab-ic{filter:none;opacity:1;}
  .authbadge.on .ab-mk{color:var(--ok-btn);}
  .authbadge.busy{border-color:var(--line);color:var(--sub);}        /* 再接続中（中立色＋↻） */
  .authbadge.busy .ab-ic{filter:none;opacity:.85;}
  .authbadge.stale{border-color:#b45309;color:#b45309;background:rgba(180,83,9,.08);} /* 要再接続（橙＋!） */
  .authbadge.stale .ab-ic{filter:none;opacity:.9;}
  .authbadge.stale .ab-mk{color:#b45309;}
  .authbadge:active{transform:scale(.94);}
  .authbadge:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  @media(max-width:380px){.authbadge .ab-tx{display:none;} .authbadge{padding:0 11px;}} /* 極小幅はアイコンのみ（aria-labelで状態は伝わる） */
  /* ホーム常設の同期ステータス行（ログイン有無を問わず状態と入口を常時表示。未ログイン時は端末保存の安心も明示） */
  .homesync{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:12px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--sub);font-size:.78rem;cursor:pointer;}
  .homesync.on{border-color:var(--ok-btn);color:var(--ink);background:rgba(21,128,61,.06);}
  .homesync.stale{border-color:#b45309;color:var(--ink);background:rgba(180,83,9,.06);}
  .homesync .hs-act{font-weight:700;white-space:nowrap;color:var(--accent);}
  .homesync.on .hs-act{color:var(--ok-btn);}
  .homesync.stale .hs-act{color:#b45309;}
  .homesync:active{transform:scale(.99);}
  .homesync:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  nav.tabs{display:flex;gap:4px;overflow-x:auto;margin:14px -2px 12px;padding:4px;background:var(--card);
    border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-sm);scrollbar-width:none;}
  nav.tabs::-webkit-scrollbar{display:none;}
  nav.tabs button{flex:1 0 auto;background:transparent;color:var(--sub);border:none;padding:10px 14px;min-height:44px;
    border-radius:12px;font-size:.82rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:.2s;}
  nav.tabs button[aria-selected="true"]{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(14,116,144,.35);}
  /* 右端のフェード＝横スクロールで隠れたタブがあることのアフォーダンス（末尾の「論文・面接／進捗」への気づき） */
  nav.tabs::after{content:"";position:sticky;right:0;flex:0 0 22px;align-self:stretch;margin-left:-22px;background:linear-gradient(to right,transparent,var(--card));pointer-events:none;border-radius:0 12px 12px 0;}
  /* 下部ナビ（モバイルの定番）：スマホでは上部タブを隠してこちらを主役に。デスクトップは上部タブのまま。 */
  .bnav{display:none;position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--card);border-top:1px solid var(--line);
    padding:6px 4px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -2px 12px rgba(0,0,0,.07);}
  .bnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;
    color:var(--sub);font-size:.66rem;font-weight:700;padding:4px 2px;min-height:48px;border-radius:10px;transition:color .15s;}
  .bnav button .bic{font-size:1.3rem;line-height:1;}
  .bnav button[aria-current="page"]{color:var(--accent);}
  @media(max-width:719px){ nav.tabs{display:none;} .bnav{display:flex;} main{padding-bottom:calc(66px + env(safe-area-inset-bottom));} .qstick{bottom:calc(72px + env(safe-area-inset-bottom));} }

  main{padding:6px 16px 0;}
  .view{display:none;}
  .view.active{display:block;animation:fade .35s cubic-bezier(.2,.7,.3,1);}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  h3.sec{font-size:.84rem;margin:18px 2px 8px;color:var(--sub);font-weight:800;letter-spacing:.02em;}

  /* HOME */
  .hero{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-radius:var(--r3);
    padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
  .hero::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;
    background:rgba(255,255,255,.12);pointer-events:none;} /* 装飾円がクリックを奪わないよう無効化 */
  .hero .row{display:flex;align-items:center;gap:18px;position:relative;}
  .ring{width:96px;height:96px;flex:0 0 auto;}
  .ring text{fill:#fff;font-weight:800;}
  .hero h2{margin:0 0 2px;font-size:1.02rem;}
  .hero p{margin:0;font-size:.78rem;opacity:.94;}
  .hero .streak{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.2);
    padding:3px 11px;border-radius:20px;font-size:.78rem;font-weight:800;margin-top:8px;}
  .hero .mini{display:flex;gap:16px;margin-top:8px;}
  .hero .mini b{display:block;font-size:1.12rem;font-weight:800;}
  .hero .mini span{font-size:.7rem;opacity:.92;}
  .cta{display:block;width:100%;margin-top:14px;background:#fff;color:var(--accent);border:none;border-radius:var(--r2);
    padding:16px;font-size:1rem;font-weight:800;cursor:pointer;box-shadow:var(--shadow);transition:.15s;}
  .cta:active{transform:scale(.99);}
  .cta small{display:block;font-weight:600;color:var(--sub);font-size:.72rem;margin-top:2px;}
  .quickgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
  .quick{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:14px;cursor:pointer;
    box-shadow:var(--shadow-sm);transition:.18s;text-align:left;color:var(--ink);min-height:64px;}
  .quick:active{transform:scale(.98);}
  .quick .ic{font-size:1.25rem;}
  .quick b{display:block;margin-top:4px;font-size:.88rem;}
  .quick span{font-size:.7rem;color:var(--sub);}

  /* layered mastery bar */
  .layers{display:flex;height:14px;border-radius:8px;overflow:hidden;margin:4px 0 8px;background:var(--chip);}
  .layers i{height:100%;}
  .lg-new{background:var(--line2);}.lg-learn{background:var(--warn);}.lg-near{background:var(--accent2);}.lg-mast{background:var(--plan);}
  .legend{display:flex;flex-wrap:wrap;gap:10px;font-size:.7rem;color:var(--sub);}
  .legend span{display:inline-flex;align-items:center;gap:4px;}
  .legend i{width:10px;height:10px;border-radius:3px;display:inline-block;}

  /* NODE / MAP */
  .hint{text-align:center;color:var(--sub);font-size:.74rem;margin:2px 0 12px;}
  .node{border-radius:var(--r2);padding:14px 16px;color:#fff;margin:0 auto;box-shadow:var(--shadow);
    transition:transform .15s;position:relative;overflow:hidden;width:100%;text-align:left;border:none;}
  .node::before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,rgba(255,255,255,.14),transparent 60%);pointer-events:none;} /* 装飾オーバーレイがクリックを奪わないよう無効化（reflinkボタンの操作を妨げない） */
  .node .reflink{position:relative;} /* 装飾オーバーレイより前面に＝唯一の深掘り口を確実にクリックできる。本体は表示専用（cursor/押下演出なし） */
  .node h2{margin:0;font-size:.92rem;display:flex;justify-content:space-between;align-items:center;gap:8px;position:relative;color:#fff;}
  .node .tag{font-size:.64rem;background:rgba(255,255,255,.24);padding:3px 9px;border-radius:20px;font-weight:700;white-space:nowrap;}
  .node .pt{margin:8px 0 0;font-size:.78rem;opacity:.98;display:none;position:relative;}
  .node.open .pt{display:block;animation:fade .25s;}
  .node.law{background:linear-gradient(135deg,#64748b,#475569);}
  .node.vision{background:linear-gradient(135deg,#0e7490,#0891b2);}
  .node.plan{background:linear-gradient(135deg,#15803d,#0e9f6e);}
  .node.doryoku{background:linear-gradient(135deg,#b5651d,#9a5512);}
  .node.proj{background:linear-gradient(135deg,#9a2c6e,#7d2f7d);}
  .node.daikou{background:linear-gradient(135deg,#2b8aa6,#0e7490);}
  .reflink{margin-top:8px;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.55);color:#fff;padding:6px 12px;border-radius:8px;font:inherit;font-size:.76rem;font-weight:700;cursor:pointer;min-height:36px;}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:600px){.two{grid-template-columns:1fr;}}
  .arrow{text-align:center;color:var(--sub);font-size:1rem;margin:6px 0;line-height:1.2;}
  .arrow small{display:block;font-size:.66rem;opacity:.9;}

  /* REF accordion */
  .acc{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-sm);}
  .acc>summary{padding:15px 16px;font-weight:800;cursor:pointer;font-size:.92rem;display:flex;align-items:center;gap:10px;list-style:none;min-height:44px;}
  .acc>summary::-webkit-details-marker{display:none;}
  .acc>summary .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 0 3px var(--chip);}
  .acc>summary .chev{margin-left:auto;color:var(--sub);transition:.2s;}
  .acc[open]>summary .chev{transform:rotate(90deg);}
  .acc .body{padding:0 16px 15px;}
  .acc ul{margin:6px 0;padding-left:20px;}
  .acc li{margin:5px 0;}
  .src{font-size:.72rem;color:var(--sub);border-top:1px dashed var(--line2);padding-top:9px;margin-top:9px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;}
  .copybtn{font-size:.72rem;border:1px solid var(--line2);background:var(--card);border-radius:10px;padding:8px 12px;cursor:pointer;color:var(--accent);font-weight:700;min-height:40px;}
  .copybtn:active{transform:scale(.94);}
  .tagrow{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
  .filt{border:1px solid var(--line2);background:var(--card);color:var(--ink);border-radius:16px;padding:6px 12px;font-size:.74rem;cursor:pointer;min-height:36px;}
  .filt.on{background:var(--accent);color:#fff;border-color:var(--accent);}

  /* LOOKUP */
  .searchwrap{position:relative;}
  .search{width:100%;padding:14px 14px 14px 42px;border:1px solid var(--line);border-radius:14px;font-size:1rem;background:var(--card);color:var(--ink);box-shadow:var(--shadow-sm);}
  .searchwrap .mag{position:absolute;left:14px;top:13px;color:var(--sub);font-size:1rem;pointer-events:none;} /* 🔎アイコン上のタップを入力欄へ通す */
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0;}
  /* 汎用ピル（最近見たチップ等）＝インラインstyleの重複を排除 */
  .chip{font-size:.74rem;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:14px;padding:3px 10px;cursor:pointer;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .recentrow{display:flex;gap:6px;flex-wrap:wrap;}
  .recenthd{font-size:.72rem;color:var(--sub);font-weight:700;margin-bottom:4px;}
  .chips button{border:1px solid var(--line2);background:var(--card);border-radius:20px;padding:8px 13px;font-size:.76rem;cursor:pointer;color:var(--ink);box-shadow:var(--shadow-sm);min-height:40px;}
  .chips button.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .lk{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow-sm);border-left:4px solid var(--accent);animation:fade .25s;}
  .lk h4{margin:0 0 7px;font-size:.92rem;}
  .lk .based{font-size:.8rem;color:var(--sub);margin-top:6px;padding-left:14px;position:relative;}
  .lk .based::before{content:"";position:absolute;left:0;top:9px;width:6px;height:6px;border-radius:50%;background:var(--accent);pointer-events:none;} /* 装飾ドットがリンクのタップを奪わない */
  .lk .based b{color:var(--accent);}

  /* QUIZ */
  .modegrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .mode{padding:15px 13px;border:1px solid var(--line);background:var(--card);border-radius:var(--r2);cursor:pointer;text-align:left;box-shadow:var(--shadow-sm);transition:.18s;color:var(--ink);min-height:74px;}
  .mode:active{transform:scale(.98);}
  .mode .ic{font-size:1.15rem;}
  .mode b{display:block;font-size:.88rem;margin:5px 0 1px;}
  .mode span{font-size:.7rem;color:var(--sub);}
  .mode.daily{grid-column:1/3;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;}
  .mode.daily span{color:rgba(255,255,255,.9);}
  .mode.review{grid-column:1/3;border-color:var(--ng);}
  .mode.review b{color:var(--ng);}
  #modesAuto .mode.review{grid-column:auto;} /* おまかせ群では弱点＋模試を2列に並べる（今日の学習だけ全幅バナー） */
  .seg{display:inline-flex;flex-wrap:wrap;gap:6px;}
  .segbtn{border:1px solid var(--line2);background:var(--card);color:var(--ink);border-radius:10px;padding:8px 14px;font:inherit;font-size:.82rem;cursor:pointer;min-height:40px;}
  .segbtn.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700;}
  .segbtn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .catbar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
  .catbar button{border:1px solid var(--line2);background:var(--card);border-radius:16px;padding:7px 12px;font-size:.74rem;cursor:pointer;color:var(--ink);min-height:38px;}
  .catbar button.on{background:var(--proj);color:#fff;border-color:var(--proj);}
  .catbar[hidden]{display:none;}
  .progressbar{height:7px;background:var(--chip);border-radius:6px;overflow:hidden;margin-bottom:14px;}
  .progressbar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s;}
  .quizcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r3);padding:20px 17px;box-shadow:var(--shadow);animation:fade .3s;}
  .qmeta{font-size:.72rem;color:var(--sub);display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:12px;font-weight:700;}
  .badge{background:var(--chip);padding:4px 10px;border-radius:20px;}
  .qtext{font-size:1.06rem;font-weight:700;margin-bottom:16px;line-height:1.55;}
  .choice{display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:1px solid var(--line2);background:var(--card);color:var(--ink);border-radius:13px;padding:14px 13px;margin-bottom:9px;cursor:pointer;font-size:.92rem;transition:.15s;box-shadow:var(--shadow-sm);min-height:52px;}
  .choice .k{width:26px;height:26px;border-radius:8px;background:var(--chip);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:800;flex:0 0 auto;}
  .choice:active{transform:scale(.99);}
  .choice.correct{background:var(--ok-soft);border-color:var(--ok);}
  .choice.correct .k{background:var(--ok);color:#fff;}
  .choice.wrong{background:var(--ng-soft);border-color:var(--ng);}
  .choice.wrong .k{background:var(--ng);color:#fff;}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:13px;padding:13px 18px;font-size:.94rem;cursor:pointer;font-weight:700;transition:.15s;box-shadow:0 4px 12px rgba(14,116,144,.28);min-height:48px;}
  .btn:active{transform:scale(.98);}
  .choice:active,.quick:active,.mode:active{transform:scale(.985);}
  /* 節目のお祝い（軽量confetti） */
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;}
  .confetti i{position:absolute;top:-14px;width:9px;height:9px;border-radius:2px;animation:cfall 1.5s linear forwards;}
  @keyframes cfall{to{transform:translateY(110vh) rotate(600deg);opacity:.15;}}
  /* クイズの主要操作を親指圏（下部）へ */
  .qstick{position:sticky;bottom:calc(10px + env(safe-area-inset-bottom));z-index:5;box-shadow:0 4px 16px rgba(0,0,0,.18);}
  /* 横断検索の結果 */
  .gsres h5{margin:13px 0 1px;font-size:.74rem;color:var(--sub);}
  .gsitem{display:block;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-top:6px;cursor:pointer;font:inherit;color:var(--ink);}
  .gsitem:active{transform:scale(.99);}
  .gsk{display:inline-block;font-size:.66rem;color:#fff;background:var(--sub);border-radius:5px;padding:1px 6px;margin-right:7px;vertical-align:middle;}
  .btn.ghost{background:var(--card);color:var(--accent);border:1px solid var(--accent);box-shadow:var(--shadow-sm);}
  .btn.wide{width:100%;}
  .btn.ok{background:var(--ok-btn);color:#fff;box-shadow:0 4px 12px rgba(21,128,61,.28);}
  .btn.ng{background:var(--ng-btn);color:#fff;box-shadow:0 4px 12px rgba(194,37,59,.28);}
  .reveal{margin-top:14px;padding:13px;border-radius:13px;font-size:.84rem;display:none;animation:fade .25s;}
  .reveal.show{display:block;}
  .reveal.ok{background:var(--ok-soft);border:1px solid var(--ok);}
  .reveal.ng{background:var(--ng-soft);border:1px solid var(--ng);}
  .reveal .src{border:none;padding:0;margin-top:8px;}
  .cloze .blank{background:var(--ng);color:transparent;border-radius:5px;padding:1px 8px;cursor:pointer;transition:.18s;font-weight:800;text-decoration:underline;text-decoration-color:#fff;text-decoration-thickness:2px;text-underline-offset:2px;box-shadow:0 0 0 1.5px rgba(0,0,0,.22);}
  .cloze .blank.show{background:var(--ok-soft);color:var(--ink);text-decoration:none;}
  .redtoggle{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .orderlist{list-style:none;padding:0;margin:0 0 14px;}
  .orderlist li{background:var(--card);border:1px solid var(--line2);border-radius:13px;padding:11px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-sm);transition:.12s;}
  .orderlist li .num{width:26px;height:26px;border-radius:9px;background:var(--chip);display:flex;align-items:center;justify-content:center;font-size:.86rem;flex:0 0 auto;color:var(--sub);cursor:grab;}
  .orderlist li .txt{flex:1;font-size:.88rem;}
  .orderlist li .mv{display:flex;flex-direction:column;gap:2px;}
  .orderlist li .mv button{width:42px;height:36px;border:1px solid var(--line2);background:var(--card);color:var(--ink);border-radius:8px;font-size:.82rem;cursor:pointer;line-height:1;}
  .orderlist li.dragging{opacity:.4;}
  .matchwrap{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
  .matchcol button{display:block;width:100%;border:1px solid var(--line2);background:var(--card);color:var(--ink);border-radius:11px;padding:13px 10px;margin-bottom:8px;font-size:.8rem;cursor:pointer;box-shadow:var(--shadow-sm);min-height:52px;}
  .matchcol button.sel{background:var(--accent);color:#fff;border-color:var(--accent);}
  .matchcol button.done{background:var(--ok-soft);border-color:var(--ok);color:var(--ok);cursor:default;}
  .matchcol button.wrong{background:var(--ng-soft);border-color:var(--ng);}

  .result{text-align:center;}
  .result .emoji{font-size:2.8rem;}
  .result .big{font-size:2.6rem;font-weight:900;color:var(--accent);margin:6px 0;}
  .result .msg{font-size:.9rem;color:var(--sub);margin-bottom:16px;}

  .stat{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:8px;}
  .stat .box{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:15px 8px;text-align:center;box-shadow:var(--shadow-sm);}
  .stat .box .n{font-size:1.6rem;font-weight:900;}
  .stat .box.a .n{color:var(--accent);}.stat .box.b .n{color:var(--plan);}.stat .box.c .n{color:var(--ng);}
  .stat .box .l{font-size:.68rem;color:var(--sub);}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:16px;box-shadow:var(--shadow-sm);margin-top:12px;}
  .catrow{margin-bottom:12px;font-size:.78rem;}
  .catrow .top{display:flex;justify-content:space-between;margin-bottom:4px;font-weight:600;}
  .bar{height:9px;background:var(--chip);border-radius:6px;overflow:hidden;}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--plan),var(--accent));border-radius:6px;transition:width .5s;}
  .wrongitem{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--ng);border-radius:11px;padding:11px 13px;margin-bottom:8px;font-size:.78rem;box-shadow:var(--shadow-sm);}
  /* RONBUN */
  .rb{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow-sm);}
  .rb>summary{padding:15px 16px;font-weight:800;cursor:pointer;font-size:.92rem;display:flex;align-items:center;gap:10px;list-style:none;min-height:44px;}
  .rb>summary::-webkit-details-marker{display:none;}
  .rb>summary .chev{margin-left:auto;color:var(--sub);transition:.2s;}
  .rb[open]>summary .chev{transform:rotate(90deg);}
  .rb .body{padding:0 16px 16px;}
  .rb .qx{background:var(--chip);border-radius:10px;padding:10px 12px;font-size:.84rem;margin-bottom:12px;}
  .rb h5{margin:14px 0 5px;font-size:.82rem;color:var(--accent);display:flex;align-items:center;gap:7px;}
  .rb h5::before{content:"";width:4px;height:14px;background:var(--accent);border-radius:2px;}
  .rb p{margin:4px 0;font-size:.85rem;}
  .rb ul{margin:4px 0;padding-left:18px;font-size:.85rem;}
  .rb .konkyo{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
  .rb .konkyo span{background:var(--accent-soft);color:var(--accent);border-radius:14px;padding:3px 10px;font-size:.74rem;font-weight:700;}
  .rb .ng{background:var(--ng-soft);border:1px solid var(--ng);border-radius:9px;padding:8px 11px;font-size:.8rem;}
  .synccard{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:16px;box-shadow:var(--shadow-sm);margin-bottom:14px;}
  .synccard .st{display:flex;align-items:center;gap:8px;font-weight:700;font-size:.88rem;margin-bottom:4px;}
  .synccard .dotg{width:9px;height:9px;border-radius:50%;background:var(--line2);}
  .synccard.on .dotg{background:var(--ok);}
  .synccard small{color:var(--sub);font-size:.72rem;}
  .synccard input{width:100%;margin:8px 0;padding:10px 12px;border:1px solid var(--line2);border-radius:10px;background:var(--bg);color:var(--ink);font-size:.82rem;}
  .syncrow{display:flex;gap:8px;flex-wrap:wrap;}
  .syncrow .btn{flex:1;min-width:120px;}

  footer{text-align:center;color:var(--sub);font-size:.66rem;margin-top:26px;padding:0 16px;line-height:1.7;}
  .toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);padding:12px 20px;border-radius:24px;font-size:.82rem;font-weight:700;opacity:0;transition:.3s;z-index:60;box-shadow:var(--shadow);pointer-events:none;max-width:90%;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0;}
  @media(prefers-reduced-motion:reduce){*{animation-duration:.001s!important;transition-duration:.001s!important;}}
</style>

 {id:'law',cls:'law',map:1,name:'教育関係法規',tag:'国・全国共通',cat:'法規',

const LOOKUP=[{sit:"体罰・不適切な指導が起きたとき",kw:"体罰 不適切な指導 懲戒 線引き 暴言 有形力 部活動 報告 事実確認 児童生徒理解 戒告 懲戒処分",based:[["学校教育法第11条","校長・教員は教育上必要なとき児童生徒を懲戒できるが、体罰は禁止。叱責や別室指導等の「懲戒」は可、殴る蹴る・長時間正座等の身体的苦痛は不可で、ここが現場の線引きの起点。"],["体罰の禁止及び児童生徒理解に基づく指導の徹底について（24文科初第1269号・平成25年3月13日通知）","文科省通知。別紙で「懲戒・体罰・正当行為（防衛・制止のための有形力）」を具体例で区分。体罰か否かは児童の年齢・状況等から個別に判断する、と示す指導側の根拠資料。"],["地方公務員法第29条","体罰を行った教員への懲戒処分（戒告・減給・停職・免職）の根拠。任命権者（県教委）が行う処分であり、校長の校内「懲戒（指導）」とは主体も性質も別物である点に注意。"],["地方公務員法第34条","事実確認の聞き取りで知った児童・保護者・教員の情報は守秘義務（職務上知り得た秘密）の対象。事案の報告・公表の範囲は設置者と協議し、個人が独断で外部に話さないこと。"]]},{sit:"児童虐待を発見・疑ったとき",kw:"児童虐待 虐待 通告 通報 児童相談所 児相 市町村 福祉事務所 守秘義務 ネグレクト 早期発見 あざ",based:[["児童虐待の防止等に関する法律第6条","虐待を受けたと「思われる」児童を発見した者（教職員含む）は、確証がなくても速やかに市町村・都道府県の設置する福祉事務所・児童相談所へ通告する義務がある（第6条第1項）。同条第3項で、刑法の秘密漏示罪その他の守秘義務に関する法律の規定は通告義務の遵守を妨げると解釈してはならないと明記され、通告が守秘義務に優先する。"],["児童虐待の防止等に関する法律第5条","学校・教職員は児童虐待を発見しやすい立場として、早期発見に努める努力義務を負う（第5条第1項）。判断は学校長個人でなく組織として行い、疑いの段階で抱え込まず通告・連携する。"],["児童福祉法第25条","要保護児童を発見した者の通告義務を定める一般規定。児童虐待防止法第6条の通告は本条による通告とみなされ（第6条第2項）、通告先は市町村・福祉事務所・児童相談所。"],["学校・教育委員会等向け虐待対応の手引き（文部科学省）","通告は校長判断を待たず疑った時点で行う、緊急時は躊躇なく児相全国共通ダイヤル189へ、通告者・通告内容は保護者に漏らさない等、現場の具体的対応手順を示す公式指針。"]]},{sit:"教職員の不祥事・わいせつ事案への対応",kw:"不祥事 わいせつ 性暴力 懲戒 分限 服務 信用失墜 報告 DBS 免許失効 飲酒運転 セクハラ",based:[["地方公務員法第29条","義務違反（わいせつ・体罰・飲酒運転・個人情報漏えい等）への制裁としての懲戒処分（戒告・減給・停職・免職）。処分権者は校長ではなく任命権者（県教委）。校長は事実確認と報告を担う。"],["地方公務員法第28条","公務能率維持のための身分上の措置（降任・免職・休職・降給）。第29条の懲戒（制裁）とは目的が異なる点に注意。心身故障や適格性欠如時の措置で、本人の義務違反を要件としない。"],["教育職員等による児童生徒性暴力等の防止等に関する法律","児童生徒性暴力等を行った教員は懲戒免職等で免許失効、再授与は都道府県教委が審査（特定免許状失効者等）。データベース照会で採用前確認。校長は事案把握時に速やかに任命権者へ報告する義務を負う。"],["児童虐待の防止等に関する法律第6条","教職員が職務上わいせつ等で児童虐待を発見した場合、速やかに市町村・児相等へ通告する義務。守秘義務より通告義務が優先する点を全教職員に周知。"]]},{sit:"感染症で出席停止・臨時休業を判断するとき",kw:"感染症 出席停止 臨時休業 学級閉鎖 学校閉鎖 休校 インフルエンザ 麻しん 校長 設置者 教育委員会 出席停止期間 保健",based:[["学校保健安全法第19条","感染症にかかっている等の児童生徒に対し、出席停止を命じるのは『校長』。学級閉鎖等とは別で、個人に対する措置。"],["学校保健安全法第20条","臨時休業（学級・学年閉鎖、休校）を行うのは『学校の設置者』。校長ではなく教育委員会等が決定する点が要注意。"],["学校保健安全法施行規則第18条・第19条","予防すべき感染症の種類（第18条）と出席停止の期間の基準（第19条）。例:インフルエンザは発症後5日かつ解熱後2日、麻しんは解熱後3日。"],["学校教育法第35条","『性行不良』等を理由とする出席停止は市町村教育委員会が保護者に命じる別制度（中学校は第49条で準用）。感染症（保健安全法19条=校長）と権限者・根拠が異なるので混同しない。"]]},{sit:"いじめの重大事態が疑われるとき",kw:"いじめ 重大事態 調査 いじめ防止対策推進法 第28条 第23条 重大事態 ガイドライン 不登校 自殺 設置者 重大事態調査委員会 第三者委員会 報告",based:[["いじめ防止対策推進法第28条","学校設置者またはその設置する学校は、重大事態（生命・心身・財産に重大な被害が生じた疑い／相当の期間=目安30日の欠席の疑い）と認めるとき、組織を設けて事実関係を調査し、いじめを受けた児童生徒・保護者に必要な情報を適切に提供する。調査主体（学校か設置者か）は設置者が判断する。"],["いじめ防止対策推進法第23条","校長・教員はいじめの通報・相談を受けたら速やかに事実確認し、設置者へ報告。いじめをやめさせ再発を防ぐため、複数の教職員で被害児童生徒・保護者を支援し、加害児童生徒を指導・助言する。必要に応じ加害者を別教室で学習させる等の措置をとる。"],["いじめ防止対策推進法第2条","いじめの定義＝当該児童生徒と一定の人的関係にある他の児童生徒の行為（インターネット含む）で、対象児童生徒が心身の苦痛を感じているもの。被害者の主観を起点に幅広く認知する点が現場で取り違えやすい。"],["いじめの重大事態の調査に関するガイドライン","重大事態の認知・調査組織の構成・被害者側への情報提供・調査結果の地方公共団体の長への報告（法第30条等）など、設置者・学校がとるべき具体手順を示した文科省指針。被害者・保護者が要望した時点で調査着手すべき場合がある点に留意。"]]},{sit:"学校事故・児童生徒のけがが起きたとき",kw:"学校事故 けが 負傷 事故対応 けが対応 学校安全 危機管理マニュアル 災害共済給付 スポーツ振興センター 基本調査 詳細調査 第一報 救急 応急手当",based:[["学校保健安全法第29条","学校は危険等発生時対処要領（危機管理マニュアル）を作成する義務があり、校長は職員への周知・訓練の実施その他必要な措置を講ずる。事故発生時はこの要領に沿って役割分担し、救急要請・応急手当・初期対応にあたる。"],["学校保健安全法第26条・第28条","第26条は設置者が事故等を防止し安全を確保する責務（学校安全の総則）。第28条は校長が施設・設備に安全上の支障を認めたとき遅滞なく改善措置を講じ、できないときは設置者に申し出る義務を定める。"],["文科省「学校事故対応に関する指針【改訂版】」（令和6年3月）","管理下の死亡・重篤事故では、まず学校が設置者の指導支援のもと基本調査（聴き取りは着手から3日以内目途）を行い、詳細調査は設置者が実施主体となり中立な外部専門家で構成する委員会を設置。被害者・保護者への第一報と継続的な情報提供を重視。"],["独立行政法人日本スポーツ振興センター法","学校管理下の負傷・疾病等は災害共済給付（医療費・障害見舞金・死亡見舞金）の対象。給付請求は学校設置者を通じて行うため、受診記録・事故発生状況の記録を確実に残す。"]]},{sit:"児童生徒・保護者の個人情報の漏えい・情報管理（USB紛失/誤送信/SNS）",kw:"個人情報 漏えい 流出 USB 紛失 誤送信 名簿 成績 SNS 守秘義務 報告 暗号化",based:[["個人情報の保護に関する法律（令和3年改正・令和5年4月1日完全施行）","公立学校は地方公共団体の機関として、従来の各自治体条例から全国共通ルールに一元化された同法の適用を受ける。漏えい等が生じた場合、安全管理措置義務を負う行政機関等として本人通知や対応が求められる。"],["個人情報の保護に関する法律第68条","行政機関等（公立学校を含む）に保有個人情報の漏えい・滅失・毀損が生じ、本人の権利利益を害するおそれが大きい事態のときは、設置者（教育委員会＝行政機関の長等）が個人情報保護委員会へ報告し本人へ通知する義務を負う（公的部門は本人100人超等が報告対象）。学校現場は速やかに設置者へ第一報を上げるのが起点。"],["地方公務員法第34条","教職員（公立学校の地方公務員）は職務上知り得た秘密を守る義務を負い、退職後も継続する。USB紛失・名簿のSNS投稿・誤送信による漏えいは、過失であっても守秘義務違反として懲戒処分の対象となり得る（量定は態様・件数・故意過失を考慮）。"],["地方公務員法第29条","守秘義務違反等で漏えいを起こした職員に対する懲戒（戒告・減給・停職・免職）の根拠。処分権者は任命権者（県費負担教職員は都道府県教育委員会）であり、校長は事実確認・報告と再発防止の管理責任を負う。"]]},{sit:"授業で著作物(教材・資料)を使うとき",kw:"著作権 教材 コピー 複製 授業 プリント 配布 引用 公衆送信 オンライン授業 SARTRAS 補償金 著作権法",based:[["著作権法第35条第1項","学校その他の教育機関(営利目的を除く)で、教育を担任する者と授業を受ける者は、授業の過程での利用に必要と認められる限度で、公表された著作物を無許諾で複製・公衆送信・公の伝達ができる。ただし著作権者の利益を不当に害する場合(問題集を生徒人数分コピー、市販ワークの代替等)は不可。判断は『授業に必要な範囲か』が基準。"],["著作権法第35条第2項","第1項で公衆送信(対面授業の資料のオンライン遠隔配信等)を行う場合は、教育機関の設置者が相当な額の補償金を著作権者に支払う(授業目的公衆送信補償金=SARTRAS制度)。設置者が補償金を支払えば個別許諾なしで送信可能(無許諾だが有償)。複製は無償だが公衆送信は補償金が必要、という区別に注意。"],["著作権法第32条","公表された著作物は、公正な慣行に合致し、引用の目的上正当な範囲内であれば許諾なく引用できる(授業に限らず適用)。実務上の要件は『主従関係(自分の文章が主)』『明瞭区別(かぎ括弧等)』『出所明示(出所明示義務は第48条)』。第35条の範囲を超える利用でも引用要件を満たせば適法。"],["授業目的公衆送信補償金制度(SARTRAS)","著作権法第35条第2項に基づき、指定管理団体SARTRAS(一般社団法人授業目的公衆送信補償金等管理協会)に学校設置者(県・市町村)が補償金を支払う制度で、個々の教員ではなく設置者が手続主体。教員はオンライン送信時の補償金支払いの有無を設置者の契約状況で確認する。"]]},{sit:"出席停止(性行不良)と懲戒の違い／主体はどちらか",kw:"出席停止 懲戒 性行不良 主体 校長 市町村教育委員会 保護者 命令 学校教育法35条 11条 違い",based:[["学校教育法第35条","市町村教育委員会が主体。性行不良で他の児童生徒の教育を妨げると認める児童に対し、その保護者へ出席停止を命じる（児童本人への懲戒処分ではなく、他の子の学習権を守る秩序維持措置）。中学校は第49条で準用。"],["学校教育法第11条","校長・教員が主体。教育上必要があるとき児童生徒を懲戒できるが、体罰は禁止。第35条の出席停止が市町村教委による行政措置である点と、主体・性質が根本的に異なる。"],["学校教育法施行規則第26条","懲戒の手続規定。退学・停学等の処分懲戒は校長が行い、義務教育段階の公立校では停学・退学は原則できない等の制約を定める（事実行為としての叱責等の懲戒と区別）。"],["学校教育法第35条第2項","出席停止を命じる際、市町村教委はあらかじめ保護者の意見を聴取し、理由・期間を記載した文書を交付しなければならない（手続要件）。"]]},{sit:"保護者からの苦情・開示請求への組織対応（記録・情報公開/個人情報開示・説明責任）",kw:"苦情 保護者対応 開示請求 情報公開 個人情報 記録 説明責任 学校評価 スクールロイヤー 組織的対応 不当要求 漏えい",based:[["文部科学省「保護者等からの過剰な苦情や不当な要求への対応に関する取組について」","担任の抱え込みを避け管理職を中心に複数で対応する組織的対応が基本。日時・要求内容・対応者・経過を客観的事実として記録・共有し、正当な要望には誠実に、不当・過剰な要求には毅然と対応する。"],["個人情報の保護に関する法律第76条以下（行政機関等の開示請求）","公立学校（地方公共団体の機関）は本人（児童生徒は通常その保護者）から保有個人情報の開示請求を受ける（法第76条）。開示・不開示の決定権者は行政機関の長等（公立学校では教育委員会）であり、評価・所見等は法第78条の不開示情報該当性を条文に沿って個別判断する。担当教員の独断で応否を決めない。"],["個人情報の保護に関する法律第68条（漏えい等の報告・行政機関等）","成績・名簿等の漏えい等で個人の権利利益を害するおそれがある場合、報告先は首長や所管省庁ではなく個人情報保護委員会。本人への通知も義務。要配慮個人情報・不正利用による財産的被害のおそれ・不正の目的による漏えいは1人でも対象、件数では公的部門（行政機関等）は本人100人超が対象（規則第43条第4号。民間事業者の1000人超とは別基準）。"],["学校教育法第42条・第43条／同施行規則第66〜68条（学校評価）","自己評価（教職員が実施・公表＝規則第66条）／学校関係者評価（保護者等が行い結果を公表＝規則第67条）／設置者への報告（規則第68条）という体系で、保護者の意見を学校運営に反映し説明責任を果たす制度的回路。学校教育法第42条が評価・改善、第43条が情報提供を定める。個別苦情への即応とは別に、組織的な改善・公表の仕組みとして機能する。"]]},{sit:"食物アレルギー事故に備える（給食・エピペン・緊急対応）",kw:"食物アレルギー アナフィラキシー エピペン アドレナリン 給食 誤食 緊急対応 救急 校長 設置者 出席停止 学校給食法 学校保健安全法 アレルギー対応 危機管理マニュアル 主治医 学校生活管理指導表",based:[["学校給食における食物アレルギー対応指針","文科省の指針。学校給食の原因食物の完全除去対応を原則とし、設置者・学校が組織で対応体制（献立・調理・配膳のチェック、緊急時対応）を整備する。校長は校内委員会を中心に役割分担と研修を主導する。"],["学校保健安全法第29条","校長（学校）は危機管理マニュアル（危険等発生時対処要領）を作成し職員に周知・訓練する義務を負う。アナフィラキシー発生時のエピペン使用・救急要請・役割分担をこのマニュアルに具体的に位置づける。"],["学校給食法第9条","この条に基づく学校給食衛生管理基準により、設置者・校長は給食の衛生・安全管理体制を確保する。食物アレルギーの誤配・混入を防ぐ調理・配食管理は設置者と学校の責任で行う。"],["学校保健安全法第19条","出席停止を命じるのは校長（感染症等の場合）。アレルギー児への配慮で誤りやすいが、給食を一時停止する判断や対応方針は校長の保健管理権限であり、学級閉鎖等の臨時休業（第20条）は設置者の権限と区別する。"]]},{sit:"教職員の勤務時間・働き方を管理するとき",kw:"勤務時間 働き方改革 在校等時間 上限 月45時間 年360時間 教職調整額 給特法 超勤4項目 残業 時間外 労働時間把握 タイムカード 客観的方法 過労 健康確保 服務監督 タイムマネジメント",based:[["給特法（公立の義務教育諸学校等の教育職員の給与等に関する特別措置法）第3条","教育職員には給料月額4%の教職調整額を支給する代わりに、時間外勤務手当・休日勤務手当を支給しない。よって時間外勤務は本来命じない建前で、命じられるのは政令の限定事由（超勤4項目）のみ。"],["公立の義務教育諸学校等の教育職員を正規の勤務時間を超えて勤務させる場合等の基準を定める政令","時間外勤務を命じられるのは校外実習等の実習・学校行事・職員会議・非常災害等の「超勤4項目」かつ臨時・緊急のやむを得ない場合に限る。これ以外の業務は校長が命令できず、在校等時間の縮減で管理する。"],["公立学校の教育職員の業務量の適切な管理等に関する指針（給特法第7条）","文科大臣が定める指針で、在校等時間の上限を原則「月45時間・年360時間」と規定。実際の上限管理・業務削減を担うのは服務監督権者である市町村教育委員会で、校長は所属職員の在校等時間を把握し縮減する責務を負う。"],["労働安全衛生法第66条の8の3","事業者（校長・教委）はタイムカード等の客観的な方法で労働時間の状況を把握しなければならない。把握は給与計算のためでなく、医師の面接指導（長時間労働者の健康確保）の前提として全教職員に義務付けられる点に注意。"]]},

//==================== STATE / SRS ====================
const KEY='okinawa_edu_app_v3';
const DAY=86400000;
// ===== 学習スケジューラ OkiSRS v2 ====================================
// SM-2(Woźniak 1990) を基礎に、間隔反復研究の知見で調整。
//  ・カードごとの ease factor（個別難易度）  … SM-2
//  ・失敗時は間隔を「一部だけ」引き継ぐ（全消去しない＝ease hell回避） … FSRS/DSRモデル
//  ・復習時の目標保持率≒90%（最適域85-90%） … Karpicke&Smith(2012)/FSRS
//  ・試験日を越えて先送りしない（最適間隔比） … Cepeda et al.(2008)
//  ・復習日のばらつき(fuzz)で“同日集中”を緩和 … Anki実装知見
//  ・採点＝検索練習(testing effect) … Roediger&Karpicke(2006)
// 互換: KEYは据え置き。ef/ivl/pli を加算するだけ。box(1-5)は定着度表示として維持。
const EF_DEFAULT=2.5, EF_MIN=1.3, EF_MAX=2.7;   // ease factor の初期値と範囲
const IVL_MAX=180;                               // 1カードの最長間隔(日)
const LAPSE_KEEP=0.4, LAPSE_PENALTY=0.2;         // 失敗時：間隔の保持率 / ease の減点
const OLD_BOX_IVL={1:0,2:1,3:3,4:7,5:16};        // 旧Leitner box→間隔(日) 移行用
let store=load();
function load(){const def={cards:{},streak:0,lastDate:null,theme:'light',dailyDate:null,examDate:null,examDateT:0,userQuestions:[],totalAnswered:0,totalCorrect:0,dailyDone:{},session:null,fontScale:'m',dailyGoal:10,ronbunDrafts:{},bookmarks:[],recent:[]};
  let s;try{s=Object.assign(def,JSON.parse(localStorage.getItem(KEY))||{});}catch(e){s=Object.assign({},def);}
  // 壊れた/改竄された値（非配列・null要素）でも描画・マージが落ちないよう正規化
  if(!Array.isArray(s.bookmarks))s.bookmarks=[];s.bookmarks=s.bookmarks.filter(k=>typeof k==='string');
  if(!Array.isArray(s.recent))s.recent=[];s.recent=s.recent.filter(r=>r&&typeof r==='object'&&r.t&&r.id!=null).slice(0,12);
  if(!s.cards||typeof s.cards!=='object'||Array.isArray(s.cards))s.cards={};
  return s;}
function save(){try{localStorage.setItem(KEY,JSON.stringify(store));}catch(e){elog({type:'quota',msg:'進捗の保存に失敗（localStorage容量超過の可能性）: '+((e&&e.name)||e)});try{toast('保存できませんでした（容量超過）');}catch(_){}}}
// ===== クライアントサイド診断（バグ先回り検知） =====================
// バックエンドが無い静的アプリなので、不具合は端末内のリングバッファに記録し、
// 進捗タブから開発者へコピー送付できる。プライバシー：外部送信は一切しない。
const ELOG_KEY='okinawa_edu_errlog';
function elog(o){try{const a=JSON.parse(localStorage.getItem(ELOG_KEY)||'[]');a.push(Object.assign({t:Date.now()},o));while(a.length>20)a.shift();localStorage.setItem(ELOG_KEY,JSON.stringify(a));}catch(e){}}
// 通信起因の共有問題エラー（Failed to fetch / HTTP / オフライン）は不具合ではないので🐞ログから除外する純粋関数
function filterNetErr(a){return Array.isArray(a)?a.filter(e=>!(e&&e.type==='community'&&/failed to fetch|networkerror|load failed|ネットワーク|オフライン|取得に失敗|HTTP\s+\d/i.test(String(e.msg||'')))):[];}
function pruneNetErrLog(){try{const a=JSON.parse(localStorage.getItem(ELOG_KEY)||'[]');const b=filterNetErr(a);if(b.length!==(Array.isArray(a)?a.length:0))localStorage.setItem(ELOG_KEY,JSON.stringify(b));}catch(e){}} // 既存の誤検知エントリを一度だけ掃除
function getElog(){try{return JSON.parse(localStorage.getItem(ELOG_KEY)||'[]');}catch(e){return[];}}
function clearElog(){try{localStorage.removeItem(ELOG_KEY);}catch(e){}}
window.addEventListener('error',e=>{elog({type:'error',msg:String((e&&(e.message||e.error))||e),at:(e&&e.filename?e.filename.split('/').pop():'')+':'+((e&&e.lineno)||'')});});
window.addEventListener('unhandledrejection',e=>{elog({type:'promise',msg:String((e&&e.reason&&(e.reason.message||e.reason))||'unhandledrejection')});});
// 起動時のコンテンツ整合性チェック（id重複/出典欠落/mc範囲/cloze空欄 等を先回りで検出）
function selfCheck(){const issues=[],ids=new Set();
  QUESTIONS.forEach(q=>{if(ids.has(q.id))issues.push('重複id:'+q.id);ids.add(q.id);if(!q.src)issues.push('出典なし:'+q.id);
    if(q.type==='mc'&&(typeof q.ans!=='number'||q.ans<0||q.ans>=(q.choices||[]).length))issues.push('mc ans範囲外:'+q.id);
    if(q.type==='cloze'&&!(q.parts||[]).some(p=>p&&p.b))issues.push('cloze空欄なし:'+q.id);
    if(q.type==='order'&&!(q.items||[]).length)issues.push('order項目なし:'+q.id);
    if(q.type==='match'&&!(q.pairs||[]).length)issues.push('match対なし:'+q.id);});
  if(issues.length){console.warn('[selfCheck] 問題データに不整合:',issues);elog({type:'selfcheck',msg:issues.join(' / ')});}
  return issues;}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function todayISO(){const d=new Date(),p=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());} // <input type=date min=...> 用のゼロ埋めISO
function norm(s){return String(s==null?'':s).replace(/[ァ-ン]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60)).normalize('NFKC').toLowerCase();} // 検索の表記ゆれ吸収（カタ→ひら・全半角NFKC・小文字）
function getCard(id){return store.cards[id];}
function boxFromIvl(ivl){if(ivl>=30)return 5;if(ivl>=10)return 4;if(ivl>=3)return 3;if(ivl>=1)return 2;return 1;}
function examDaysLeft(){if(!store.examDate)return null;const p=String(store.examDate).split('-');const ex=new Date(+p[0],(+p[1]||1)-1,(+p[2]||1));ex.setHours(0,0,0,0);const now=new Date();now.setHours(0,0,0,0);return Math.round((ex.getTime()-now.getTime())/DAY);} // 暦日ベースの残日数（当日=0／翌日=1）。表示・キャップ・自動解除で同一定義を共有
function clampIvl(ivl){ivl=Math.min(IVL_MAX,Math.max(1,Math.round(ivl)));const dl=examDaysLeft();if(dl!=null&&dl>=0)ivl=Math.min(ivl,Math.max(1,dl));return ivl;} // 試験当日(dl=0)も1日にクランプ（dl>0条件だと当日キャップが外れていた）
function isMastered(id){const c=getCard(id);return c&&c.box>=4;}
function stateOf(id){const c=getCard(id);if(!c)return'new';if(c.box>=4)return'mast';if(c.box===3)return'near';return'learn';}
function isDue(id){const c=getCard(id);return !c||c.due<=Date.now();}
function isWeak(id){const c=getCard(id);return c&&c.box<=2;}
// ===== 付箋（ブックマーク）／最近見た（いずれも加算フィールド・Drive同期対象） =====
function bmKey(t,id){return t+':'+id;}
function isBM(t,id){return (store.bookmarks||[]).indexOf(bmKey(t,id))>=0;}
function toggleBM(t,id){store.bookmarks=store.bookmarks||[];const k=bmKey(t,id),i=store.bookmarks.indexOf(k);if(i>=0)store.bookmarks.splice(i,1);else store.bookmarks.push(k);save();if(typeof gSignedIn!=='undefined'&&gSignedIn&&accessToken)cloudSync(true);return i<0;}
function bmCount(t){const arr=(store.bookmarks||[]).filter(k=>k.indexOf(t+':')===0);if(t!=='q')return arr.length;const qids=new Set(QUESTIONS.map(q=>q.id));return arr.filter(k=>qids.has(k.slice(2))).length;} // q: は削除済み孤児を数えない（モード件数と実出題を一致）
function pushRecent(t,id,label){if(id==null||id==='')return;store.recent=(store.recent||[]).filter(r=>!(r.t===t&&String(r.id)===String(id)));store.recent.unshift({t,id:String(id),label:String(label||'').slice(0,40),ts:Date.now()});store.recent=store.recent.slice(0,12);save();}
function review(id,ok,grade){   // grade='easy'(楽勝)で間隔を更に伸ばす（Anki Easy相当）。未指定は従来挙動＝後方互換
  let c=store.cards[id];
  if(!c)c=store.cards[id]={box:1,reps:0,fails:0,due:0,last:null,hist:[],ef:EF_DEFAULT,ivl:0};
  if(!Array.isArray(c.hist))c.hist=[];           // hist欠落/非配列(改竄・片側マージ由来)でも採点が落ちない多層防御
  if(c.ef==null)c.ef=EF_DEFAULT;                 // 旧スキーマ移行：ease を補完
  if(c.ivl==null)c.ivl=OLD_BOX_IVL[c.box]||0;    // 旧スキーマ移行：間隔を box から推定
  if(ok){
    let ivl,recovered=false;
    if(c.pli!=null){ivl=c.pli;c.pli=null;recovered=true;} // 失敗からの復帰：以前の間隔を一部引き継ぐ
    else if(c.reps<=0)ivl=1;                       // 初回正解 → 翌日
    else if(c.reps===1)ivl=3;                      // 2回目 → 3日後
    else ivl=c.ivl*c.ef;                           // 3回目以降 → 間隔×ease（指数的に拡大）
    if(grade==='easy')ivl*=1.3;                    // 楽勝＝間隔を更に伸ばし復習負荷を減らす
    if(ivl>=4)ivl=ivl*(1+(Math.random()*0.1-0.05));// fuzz ±5%（復習日の集中を緩和）
    c.reps++;c.ef=Math.min(EF_MAX,c.ef+(grade==='easy'?0.09:0.03));
    if(recovered)c.reps=Math.max(c.reps,2);        // 復帰後の次回正解は固定3日でなく指数拡大(ivl×ef)経路へ＝間隔の逆行を防ぐ
    c.ivl=clampIvl(ivl);c.due=Date.now()+c.ivl*DAY;
    // 失敗復帰直後は定着(mast=box4+)に跳ねさせない（弱点克服の誤表示を防ぐ）
    c.box=recovered?Math.min(boxFromIvl(c.ivl),3):boxFromIvl(c.ivl);
  }else{
    c.fails++;c.ef=Math.max(EF_MIN,c.ef-LAPSE_PENALTY);
    c.pli=Math.max(1,Math.min(30,Math.round((c.ivl||1)*LAPSE_KEEP))); // 復帰時の種間隔
    c.reps=0;c.ivl=0;c.due=Date.now();c.box=Math.min(c.box,2); // 当日中に再出題・弱点へ
  }
  c.hist.push({t:Date.now(),ok});
  if(c.hist.length>30)c.hist=c.hist.slice(-30); // 履歴を直近30件に制限（localStorage肥大を防ぐ）
  touchStreak();save();
}
function touchStreak(){const t=todayStr();if(store.lastDate===t)return;
  const ymd=ms=>{const d=new Date(ms);return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();};
  const y=ymd(Date.now()-DAY),y2=ymd(Date.now()-2*DAY);
  // 1日のグレースを許容（昨日 or 一昨日に学習していれば連続を継続）＝社会人の離脱防止
  const prev=store.streak||0;
  store.streak=(store.lastDate===y||store.lastDate===y2)?prev+1:1;store.lastDate=t;
  if(store.streak>prev&&[7,14,30,50,100,200].indexOf(store.streak)>=0)celebrate('🔥 '+store.streak+'日連続！素晴らしい継続です');}
function dueList(){return QUESTIONS.filter(q=>isDue(q.id)).sort((a,b)=>((getCard(a.id)?.due)||0)-((getCard(b.id)?.due)||0));}
function bucketShuffle(arr){const b={};arr.forEach(q=>{const d=Math.floor((((getCard(q.id)||{}).due)||0)/DAY);(b[d]=b[d]||[]).push(q);});return Object.keys(b).map(Number).sort((x,y)=>x-y).flatMap(k=>shuffle(b[k]));} // due日単位のバケット間は昇順、バケット内はシャッフル
function dailyCount(){const due=dueList();const nw=Math.min(due.filter(q=>!getCard(q.id)).length,6);const reserve=Math.min(2,nw);const rev=Math.min(due.filter(q=>getCard(q.id)).length,12-reserve);return Math.min(rev+nw,12);} // 実際にデイリーで出る問題数（ラベル整合用）

// HTMLエスケープ：第三者由来（みんなの問題／インポート）の問題文を innerHTML に出す際に必ず通す。
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
// 型別の必須フィールド検証。不正（欠落・型違い）は出題プールから除外して描画/採点クラッシュを防ぐ。
function validQuestion(q){
  if(!q||typeof q!=='object'||typeof q.id!=='string'||!q.id)return false;
  if(!/^[A-Za-z0-9_\-]{1,64}$/.test(q.id))return false;   // id形式ゲート（GASのID_REと同水準＝制御文字/HTML混入を排除・多層防御）
  if(['qa','mc','cloze','order','match'].indexOf(q.type)<0)return false;
  switch(q.type){
    case'qa':return typeof q.q==='string'&&typeof q.a==='string';
    case'mc':return typeof q.q==='string'&&Array.isArray(q.choices)&&q.choices.length>=2&&q.choices.length<=6&&typeof q.ans==='number'&&q.ans>=0&&q.ans<q.choices.length;
    case'cloze':return Array.isArray(q.parts)&&q.parts.length>0&&q.parts.some(p=>p&&typeof p==='object'&&typeof p.b==='string'&&p.b);
    case'order':return typeof q.q==='string'&&Array.isArray(q.items)&&q.items.length>=2;
    case'match':return typeof q.q==='string'&&Array.isArray(q.pairs)&&q.pairs.length>=1&&q.pairs.every(p=>Array.isArray(p)&&p.length===2);
  }
  return false;
}
function ymdNum(s){const m=String(s||'').split('-');return (+m[0]||0)*10000+(+m[1]||0)*100+(+m[2]||0);} // 'YYYY-M-D' を数値化（非ゼロ詰めでも正しく比較）
function pruneDailyDone(dd){if(!dd||typeof dd!=='object'||Array.isArray(dd))return {};const keys=Object.keys(dd);if(keys.length<=140)return dd;const cut=ymdNum(todayStr())-10000;const o={};keys.forEach(k=>{if(ymdNum(k)>=cut)o[k]=dd[k];});return o;} // 日次記録の上限剪定（localStorage肥大防止・answer/merge/importで共有）

function buildSearchIndex(){const idx=[];
  REF.forEach(r=>idx.push({k:'要点',t:r.name,b:(r.points||[]).join(' ')+' '+(r.tag||'')+' '+(r.cat||'')+' '+(r.src||''),go:()=>openRef(r.id)}));
  LOOKUP.forEach(l=>idx.push({k:'逆引き',t:l.sit,b:(l.kw||'')+' '+(l.based||[]).map(x=>x.join(' ')).join(' '),go:()=>{go('lookup');setTimeout(()=>{const i=document.querySelector('#lkin');if(i){i.value=l.sit;i.dispatchEvent(new Event('input'));i.scrollIntoView({block:'start'});}},70);}}));
  RONBUN.forEach((r,i)=>idx.push({k:'論文',t:r.t,b:(r.q||'')+' '+(r.hon||[]).join(' ')+' '+(r.konkyo||[]).join(' '),go:()=>{go('ronbun');setTimeout(()=>{const ds=document.querySelectorAll('#ronbun details');if(ds[i]){ds[i].open=true;ds[i].scrollIntoView({behavior:'smooth',block:'start'});}},70);}}));
  QUESTIONS.forEach(q=>{const title=q.q||(q.parts?q.parts.map(p=>typeof p==='string'?p:'＿＿').join(''):'')||('['+(q.cat||'')+'の問題]');idx.push({k:'問題',t:title,b:(q.a||'')+' '+(q.exp||'')+' '+(q.cat||'')+' '+(q.src||'')+' '+(q.choices?q.choices.join(' '):''),_up:q.up||0,ans:()=>qPreviewHTML(q),go:()=>{quizPool=[q];quizIdx=0;sCorrect=0;sAnswered=0;sWrongIds=[];sStreak=0;store.session=null;go('quiz');setTimeout(()=>{quizMode=q.type;enterQuizView();showQ();},50);}});});
  idx.forEach(it=>{it._hay=norm(it.t+' '+it.b);it._ht=norm(it.t);}); // 表記ゆれ吸収(norm)で事前計算（カタ/ひら・全半角を区別しない）
  return idx;}
let _searchTimer=null;
function runSearchDebounced(qstr){clearTimeout(_searchTimer);_searchTimer=setTimeout(()=>runSearch(qstr),130);} // IME・連打対策のデバウンス
function runSearch(qstr){
  const res=document.getElementById('gsres');if(!res)return;
  const s=norm(qstr).trim();
  if(!s){res.innerHTML='';return;}
  if(!SEARCH_INDEX)SEARCH_INDEX=buildSearchIndex();
  const terms=s.split(/\s+/).filter(Boolean);                                   // 空白区切りは複数語AND
  const hits=SEARCH_INDEX.filter(it=>terms.every(t=>it._hay.indexOf(t)>=0));
  if(!hits.length){res.innerHTML=`<p class="hint" style="margin:8px 2px">「${esc(qstr)}」に一致なし。別の語で試してください。</p>`;return;}
  // 関連度スコア：タイトル一致＞本文一致、一致位置が前ほど高い、短いタイトルを微優遇
  const score=it=>{let sc=0;const ht=it._ht,hay=it._hay;
    const tp=ht.indexOf(s);if(tp>=0)sc+=1000-Math.min(tp,300);                  // タイトルにクエリ全体
    else terms.forEach(t=>{const p=ht.indexOf(t);if(p>=0)sc+=300-Math.min(p,200);}); // タイトルに各語
    if(hay.indexOf(s)>=0)sc+=120;                                               // 連続一致ボーナス
    terms.forEach(t=>{if(hay.indexOf(t)>=0)sc+=20;});                           // 本文に各語
    sc+=Math.min((it._up||0)*15,150);                                           // みんなの👍が多い良問を上位へ
    return sc+Math.max(0,40-ht.length/4);};                                     // 短いタイトル微優遇
  const order=['要点','逆引き','問題','論文'],groups={};hits.forEach(h=>{(groups[h.k]=groups[h.k]||[]).push(h);});
  Object.keys(groups).forEach(k=>groups[k].sort((a,b)=>score(b)-score(a)));      // 各グループ内を関連度順に並べ替え
  const flat=[];let html='';
  order.forEach(k=>{const g=groups[k];if(!g)return;html+=`<h5>${k}（${g.length}）</h5>`;g.slice(0,5).forEach(h=>{const gi=flat.length;flat.push(h);html+=`<button class="gsitem" data-gi="${gi}"><span class="gsk">${k}</span>${esc(h.t).slice(0,80)}</button>`;if(h.ans)html+=`<div class="gsans" id="gsans-${gi}" hidden style="border:1px solid var(--line);border-top:none;border-radius:0 0 10px 10px;padding:8px 10px;margin:-4px 0 6px;background:var(--card)"></div>`;});if(g.length>5)html+=`<div class="hint" style="margin:4px 2px;font-size:.7rem">他 ${g.length-5} 件…語を足すと絞れます</div>`;});
  res.innerHTML=html;
  res.querySelectorAll('.gsitem').forEach(btn=>btn.addEventListener('click',()=>{
    const gi=+btn.dataset.gi,h=flat[gi];if(!h)return;
    if(h.ans){ // 問題ヒットは「答え＋出典」をその場で開く（実務＝即引き）。クイズへは副ボタンで
      const panel=res.querySelector('#gsans-'+gi);if(!panel)return;
      if(panel.hidden){if(!panel.dataset.filled){panel.innerHTML=h.ans()+`<button type="button" class="btn ghost gsquiz" style="padding:3px 10px;min-height:auto;font-size:.74rem;margin-top:4px">クイズで解く →</button>`;panel.dataset.filled='1';const qz=panel.querySelector('.gsquiz');if(qz)qz.addEventListener('click',()=>h.go());}panel.hidden=false;}else panel.hidden=true;
    } else if(h.go) h.go();
  }));
}
// 検索の問題ヒットを「答え＋出典」で即表示するためのプレビューHTML（第三者由来は esc 必須）
function qPreviewHTML(q){let a='';
  if(q.type==='qa')a=esc(q.a||'');
  else if(q.type==='mc')a=esc((q.choices&&q.choices[q.ans])||'')+(q.exp?`<br><span style="color:var(--sub)">${esc(q.exp)}</span>`:'');
  else if(q.type==='cloze')a=esc((q.parts||[]).map(p=>typeof p==='string'?p:('〔'+(p&&p.b||'')+'〕')).join(''));
  else if(q.type==='order')a=esc((q.items||[]).join(' → '));
  else if(q.type==='match')a=esc((q.pairs||[]).map(p=>p[0]+'＝'+p[1]).join(' ／ '));
  return `<div style="font-size:.82rem;line-height:1.6"><b>答え：</b>${a}<div class="src" style="margin-top:5px"><span>出典：${esc(q.src||'')}</span>${srcChk(q.src)}</div></div>`;}

function renderHome(){
  const el=document.getElementById('home');
  const total=QUESTIONS.length;
  const counts={new:0,learn:0,near:0,mast:0};
  QUESTIONS.forEach(q=>counts[stateOf(q.id)]++);
  const pct=Math.round(counts.mast/total*100);

  const resumeBar=resuming?`<button class="cta" id="ctaResume" style="background:var(--accent);color:#fff">⏯ 前回の続きから（${sess.idx} / ${sess.ids.length}問）<small style="color:rgba(255,255,255,.9)">中断したところから再開します</small></button>`:'';

  const goalDots=Array.from({length:Math.min(goal,14)},(_,i)=>`<span style="width:8px;height:8px;border-radius:50%;display:inline-block;background:${i<todayDone?'#fff':'rgba(255,255,255,.32)'}"></span>`).join(' ');
  const firstRun=(seen===0&&localStorage.getItem('oki_welcome')!=='off');     // 初回（未学習＋ようこそ未閉じ）

  // 初回はファーストビューを「ようこそ＋1問」に集中させ、空の検索欄は出さない（2回目以降に表示）
  const searchBlock=firstRun?'':`
    <div class="searchwrap" style="margin-bottom:4px"><span class="mag" aria-hidden="true">🔎</span><input type="search" class="search" id="globalSearch" placeholder="要点・逆引き・問題・論文を横断検索" aria-label="アプリ内を横断検索" enterkeyhint="search"></div>
    <div class="gsres" id="gsres" aria-live="polite"></div>`;
  const recentHTML=(!firstRun&&(store.recent||[]).length)?`<div style="margin:2px 2px 8px"><div class="recenthd">🕘 最近見た</div><div class="recentrow">${store.recent.slice(0,8).map(rc=>`<button class="rchip chip" data-t="${esc(rc.t)}" data-id="${esc(String(rc.id))}">${rc.t==='ref'?'📚':'🔎'} ${esc(rc.label)}</button>`).join('')}</div></div>`:'';
  const examPrompt=(!store.examDate&&localStorage.getItem('oki_exam_skip')!=='1')?`

    </div>`;
  el.innerHTML=`
    ${welcome}
    ${searchBlock}
    ${recentHTML}
    ${examPrompt}
    ${resumeBar?`<div style="margin-bottom:8px">${resumeBar}</div>`:''}
    ${nudge}
    <div class="hero">
      <div class="row">
        <svg class="ring" viewBox="0 0 100 100" aria-hidden="true">
          <circle cx="50" cy="50" r="${r}" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="9"/>

    </div>
    ${aiNotice}
    ${(()=>{const st=authState(),ls=lastSyncMs(),lst=ls?relTime(ls):'';
      if(st==='in')return `<div class="homesync on" id="homeSync" role="button" tabindex="0" aria-label="Googleにログイン中${lst?'・最終同期'+lst:''}。タップで同期設定"><span>☁️ 同期中${lst?'・最終同期 '+lst:''}</span><span class="hs-act">管理 ›</span></div>`;
      if(st==='reconnecting')return `<div class="homesync" id="homeSync" role="button" tabindex="0" aria-label="Googleに再接続しています"><span>☁️ Googleに再接続中…</span><span class="hs-act">　</span></div>`;
      if(st==='stale')return `<div class="homesync stale" id="homeSync" role="button" tabindex="0" aria-label="ログインが切れました。進捗はこの端末に保存済み。タップして再接続"><span>⚠️ ログインが切れました（進捗は端末に保存済み）</span><span class="hs-act">再接続 ›</span></div>`;

    ${seen>0?`<h3 class="sec">習得の内訳</h3>

        <span><i class="lg-new"></i>未学習 ${counts.new}</span>

    <div class="quickgrid">

      <button class="quick" data-act="map"><span class="ic">🗺️</span><b>関係図</b><span>資料のつながり</span></button>

  el.querySelectorAll('.rchip').forEach(b=>b.addEventListener('click',()=>{const t=b.dataset.t,id=b.dataset.id;if(t==='ref')openRef(id);else openLk(id);})); // 最近見た→再オープン
  const gs=el.querySelector('#globalSearch');if(gs){gs.addEventListener('input',e=>runSearchDebounced(e.target.value));

  const an=el.querySelector('#aiNoticeOk');if(an)an.addEventListener('click',()=>{localStorage.setItem('okinawa_ai_notice','off');const n=el.querySelector('#aiNotice');if(n)n.remove();});
  const wk=el.querySelector('#welcomeStart');if(wk)wk.addEventListener('click',()=>{localStorage.setItem('oki_welcome','off');go('quiz');startQuiz('daily');}); // ラベル通り押下で即クイズ開始（挙動一致）
  const exi=el.querySelector('#examPromptIn');if(exi)exi.addEventListener('change',e=>{if(e.target.value){store.examDate=e.target.value;store.examDateT=Date.now();save();if(gSignedIn)cloudSync();renderHome();toast('試験日を設定しました 🎯');}});
  const exs=el.querySelector('#examSkip');if(exs)exs.addEventListener('click',()=>{localStorage.setItem('oki_exam_skip','1');const n=el.querySelector('#examPrompt');if(n)n.remove();});
  const hs=el.querySelector('#homeSync');if(hs){hs.addEventListener('click',authPrimaryAction);hs.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();authPrimaryAction();}});}
  const esChip=el.querySelector('#examSetChip');if(esChip){esChip.addEventListener('click',openExamSetting);esChip.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openExamSetting();}});}
  el.querySelectorAll('.quick').forEach(b=>b.addEventListener('click',()=>{const a=b.dataset.act;if(a==='review'){go('quiz');startQuiz('review');}else go(a);}));
  el.querySelectorAll('.ministat').forEach(b=>{const act=()=>{if(b.dataset.go==='due'){go('quiz');startQuiz('daily');}else go('prog');};b.addEventListener('click',act);b.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();act();}});}); // 数字を導線化
  // 定着リングの充填アニメ＋%カウントアップ（達成感の核。reduced-motionは即時表示）
  {const rm=matchMedia('(prefers-reduced-motion:reduce)').matches,rp=el.querySelector('#ringProg'),pe=el.querySelector('#ringPct');
   if(rp)requestAnimationFrame(()=>{rp.style.strokeDashoffset=off;});
   if(pe){if(rm||pct<=0){pe.textContent=pct+'%';}else{let cur=0;const step=()=>{cur+=Math.max(1,Math.ceil(pct/28));if(cur>=pct){pe.textContent=pct+'%';return;}pe.textContent=cur+'%';requestAnimationFrame(step);};requestAnimationFrame(step);}}}
}

const MAP_LEG={law:'国の法令・要領',vision:'県のビジョン/大綱',plan:'教育振興基本計画',doryoku:'指導の努力点',proj:'重点プロジェクト',extra:'その他'};
function renderMap(){
  const m=document.getElementById('map');
  const get=id=>REF.find(x=>x.id===id);
  const LEAD='font-size:.76rem;line-height:1.65;margin-top:6px;opacity:.96';
  const node=r=>`<div class="node ${r.cls}" data-id="${r.id}"><h2>${r.name}<span class="tag">${r.tag}</span></h2><div style="${LEAD}">${r.points[0]}</div><button class="reflink" data-ref="${r.id}" style="margin-top:8px" aria-label="${esc(r.name)}の要点を開く">→ 要点で詳しく</button></div>`;
  // 凡例（6色の意味を明示）

  let h=`<p class="hint">法令→ビジョン→計画→努力点→プロジェクトの体系。各ノードの「→ 要点で詳しく」で全文へ。</p>`+legend;
  h+=`<div class="two">${node(get('law'))}${node(get('cs'))}</div>`;
  h+=`<div class="arrow">▼<small>法令・要領を踏まえて県の計画を策定</small></div>`;
  h+=`<div class="two">${node(get('vision'))}<div class="node daikou" data-id="_d"><h2>沖縄県教育大綱<span class="tag">地教行法・首長</span></h2><div style="${LEAD}">首長が定める教育の方向性。ビジョンと教育振興基本計画を橋渡し。</div></div></div>`;
  h+=`<div class="arrow">▼<small>ビジョン・大綱・教育基本法を踏まえた教育分野の基本計画</small></div>`;
  h+=node(get('plan'));
  h+=`<div class="arrow">▼<small>基本計画を毎年度の学校現場の指針に具体化</small></div>`;
  h+=node(get('doryoku'));
  h+=`<div class="arrow">▼<small>「確かな学力」を授業改善で実現する中核施策</small></div>`;
  h+=node(get('proj'));
  m.innerHTML=h;
  m.querySelectorAll('.reflink').forEach(b=>b.addEventListener('click',()=>openRef(b.dataset.ref))); // 深掘り口は「→要点で詳しく」ボタンだけ（本体は表示専用）。<button>なのでEnter/Spaceはネイティブ対応
}

//==================== REF ====================
let refFilter='all';
function renderRef(){
  const el=document.getElementById('ref');
  const cats=['all',...new Set(REF.map(r=>r.cat))];
  el.innerHTML=`
    <div class="searchwrap" style="margin-bottom:6px"><span class="mag" aria-hidden="true">🔎</span><input type="search" class="search" id="refin" placeholder="要点を検索（語・条文・分野）" aria-label="要点を検索" enterkeyhint="search"></div>
    <div class="tagrow">${cats.map(c=>`<button class="filt ${c===refFilter?'on':''}" data-c="${c}">${c==='all'?'すべて':c}（${c==='all'?REF.length:REF.filter(r=>r.cat===c).length}）</button>`).join('')}</div>
    <div style="display:flex;justify-content:flex-end;margin:2px 2px 4px"><button class="btn ghost" id="refAll" style="padding:3px 11px;min-height:auto;font-size:.74rem">すべて開く</button></div>
    <div id="refList"></div>`;
  el.querySelectorAll('.filt').forEach(b=>b.addEventListener('click',()=>{refFilter=b.dataset.c;renderRef();}));
  let allOpen=false;
  const paint=()=>{
    const rawq=(el.querySelector('#refin').value||'').trim(),q=norm(rawq),terms=q.split(/\s+/).filter(Boolean);
    let list=REF.filter(r=>refFilter==='all'||r.cat===refFilter);
    if(terms.length)list=list.filter(r=>{const hay=norm((r.name+' '+r.points.join(' ')+' '+(r.tag||'')+' '+r.cat+' '+r.src).replace(/<[^>]+>/g,''));return terms.every(t=>hay.indexOf(t)>=0);}); // 表記ゆれ吸収＋複数語AND
    list=list.slice().sort((a,b)=>(isBM('ref',b.id)?1:0)-(isBM('ref',a.id)?1:0)); // 付箋を上部に固定
    document.getElementById('refList').innerHTML=list.length?list.map(r=>`
     <details class="acc" id="acc-${r.id}"${allOpen?' open':''}>
       <summary><span class="dot" style="background:${COLORS[r.cls]}"></span>${r.name}${r.tag?`<span style="font-size:.62rem;color:var(--sub);background:var(--card);border:1px solid var(--line);padding:1px 7px;border-radius:20px;margin-left:6px">${esc(r.tag)}</span>`:''}<button class="refstar" data-id="${r.id}" aria-label="付箋（あとで見返す）" aria-pressed="${isBM('ref',r.id)}" style="border:none;background:none;cursor:pointer;font-size:.95rem;margin-left:6px;padding:0">${isBM('ref',r.id)?'⭐':'☆'}</button><span class="chev">›</span></summary>
       <div class="body"><ul>${r.points.map(p=>`<li>${p}</li>`).join('')}</ul>
         <div class="src"><span>出典：${r.src}</span>${srcChk(r.src)}<button class="copybtn" data-id="${r.id}">📋 根拠をコピー</button></div></div>
     </details>`).join(''):`<p class="hint" style="margin:10px 2px">「${esc(rawq)}」に一致する要点がありません。</p>`;
    document.querySelectorAll('#refList .refstar').forEach(b=>b.addEventListener('click',ev=>{ev.preventDefault();ev.stopPropagation();const on=toggleBM('ref',b.dataset.id);b.textContent=on?'⭐':'☆';b.setAttribute('aria-pressed',on);toast(on?'付箋をつけました ⭐':'付箋を外しました');}));
    document.querySelectorAll('#refList details.acc').forEach(d=>d.addEventListener('toggle',()=>{if(d.open){const r=REF.find(x=>'acc-'+x.id===d.id);if(r)pushRecent('ref',r.id,r.name);}}));
    document.querySelectorAll('#refList .copybtn').forEach(b=>b.addEventListener('click',ev=>{ev.preventDefault();const r=REF.find(x=>x.id===b.dataset.id);const txt=`【${r.name}】\n`+r.points.map(p=>'・'+p.replace(/<[^>]+>/g,'')).join('\n')+`\n（出典：${r.src}）`;copyText(txt,'根拠をコピーしました 📋');}));
  };
  el.querySelector('#refin').addEventListener('input',paint);
  el.querySelector('#refAll').addEventListener('click',()=>{allOpen=!allOpen;el.querySelector('#refAll').textContent=allOpen?'すべて閉じる':'すべて開く';paint();});
  paint();
}

function renderLookup(){
  const el=document.getElementById('lookup');
  el.innerHTML=`<div class="searchwrap"><span class="mag" aria-hidden="true">🔎</span>
    <input class="search" id="lkin" placeholder="状況・キーワードで検索（例：不登校、ICT、研修）" aria-label="逆引き検索"></div>
    ${(()=>{const rec=(store.recent||[]).filter(r=>r.t==='lk').slice(0,6);return rec.length?`<div style="margin:0 2px 8px"><div class="recenthd">🕘 最近見た</div><div class="recentrow">${rec.map(r=>`<button class="lkrecent chip" data-sit="${esc(String(r.id))}">🔎 ${esc(r.label)}</button>`).join('')}</div></div>`:'';})()}
    <div class="chips" id="lkchips"></div><div id="lkres"></div>`;
  const chips=el.querySelector('#lkchips');
  el.querySelectorAll('.lkrecent').forEach(b=>b.addEventListener('click',()=>{const l=LOOKUP.find(x=>x.sit===b.dataset.sit);if(l){el.querySelector('#lkin').value='';show([l]);}})); // 最近見た→再オープン
  const lkSorted=LOOKUP.slice().sort((a,b)=>(isBM('lk',b.sit)?1:0)-(isBM('lk',a.sit)?1:0)); // 付箋を先頭に
  lkSorted.forEach(l=>{const b=document.createElement('button');b.textContent=(isBM('lk',l.sit)?'⭐ ':'')+l.sit;
    b.addEventListener('click',()=>{el.querySelector('#lkin').value='';show([l]);[...chips.children].forEach(c=>c.classList.remove('on'));b.classList.add('on');});chips.appendChild(b);});
  const LKHINT=`<p class="hint" style="margin:10px 2px">↑ 状況のボタンを選ぶ、または検索すると、根拠条文が表示されます（${LOOKUP.length}件）。</p>`;
  el.querySelector('#lkin').addEventListener('input',e=>{const terms=norm(e.target.value.trim()).split(/\s+/).filter(Boolean);[...chips.children].forEach(c=>c.classList.remove('on'));
    if(!terms.length){el.querySelector('#lkres').innerHTML=LKHINT;return;}
    show(LOOKUP.filter(l=>{const hay=norm(l.sit+' '+l.kw+' '+l.based.map(b=>b.join(' ')).join(' '));return terms.every(t=>hay.indexOf(t)>=0);}));}); // 表記ゆれ吸収＋複数語AND
  el.querySelector('#lkres').innerHTML=LKHINT;   // 初期＝メニュー（全カード展開でなくボタンから選ぶFAQ型）
  function show(list){const box=el.querySelector('#lkres');
    if(list.length===1)pushRecent('lk',list[0].sit,list[0].sit); // 特定状況を開いたら「最近見た」に記録
    box.innerHTML=list.length?list.map(l=>`<div class="lk"><h4 style="display:flex;align-items:center;gap:6px">${l.sit}<button class="lkstar" data-sit="${esc(l.sit)}" aria-label="付箋（あとで見返す）" aria-pressed="${isBM('lk',l.sit)}" style="border:none;background:none;cursor:pointer;font-size:.95rem;padding:0">${isBM('lk',l.sit)?'⭐':'☆'}</button></h4>${l.based.map(b=>`<div class="based"><b>${b[0]}</b>：${b[1]}${srcChk(b[0])}</div>`).join('')}<div style="margin-top:8px"><button class="btn ghost lkcopy" data-sit="${esc(l.sit)}" style="padding:4px 11px;min-height:auto">📋 根拠をコピー</button></div></div>`).join(''):`<p class="hint">該当なし。別の語で試してください。</p>`;
    box.querySelectorAll('.lkstar').forEach(btn=>btn.addEventListener('click',()=>{const on=toggleBM('lk',btn.dataset.sit);btn.textContent=on?'⭐':'☆';btn.setAttribute('aria-pressed',on);toast(on?'付箋をつけました ⭐':'付箋を外しました');}));
    box.querySelectorAll('.lkcopy').forEach(btn=>btn.addEventListener('click',()=>{const l=LOOKUP.find(x=>x.sit===btn.dataset.sit);if(!l)return;
      const txt=`【${l.sit}】\n`+l.based.map(b=>`・${b[0]}：${String(b[1]).replace(/<[^>]+>/g,'')}`).join('\n');
      copyText(txt,'根拠をコピーしました 📋');}));}
}

function quizarea(){return document.getElementById('quizarea');}
// クイズ開始時：モードグリッドと分野バーを退避し、出題が画面を占有するようにする（タップ後に出題が画面外に隠れる問題の解消）
function enterQuizView(){const mp=document.getElementById('modePicker');if(mp)mp.style.display='none';const b=document.getElementById('qback');if(b)b.hidden=false;try{window.scrollTo(0,0);}catch(_){}}
// 模試モードの経過タイマー
let quizMockStart=0,mockTimerId=null;
function stopMockTimer(){if(mockTimerId){clearInterval(mockTimerId);mockTimerId=null;}const t=document.getElementById('mockTimer');if(t)t.remove();}
function fmtSec(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function startMockTimer(resumeSec){stopMockTimer();quizMockStart=Date.now()-(resumeSec||0)*1000;const t=document.createElement('div');t.id='mockTimer';t.setAttribute('role','timer');t.setAttribute('aria-label','経過時間');t.style.cssText='position:fixed;top:calc(8px + env(safe-area-inset-top));right:10px;z-index:60;background:var(--accent);color:#fff;padding:5px 12px;border-radius:20px;font-weight:700;font-size:.85rem;box-shadow:var(--shadow)';document.body.appendChild(t);const upd=()=>{t.textContent='⏱ '+fmtSec(Math.floor((Date.now()-quizMockStart)/1000));};upd();mockTimerId=setInterval(upd,1000);}
function startQuiz(mode){
  quizMode=mode;quizIdx=0;sCorrect=0;sAnswered=0;sWrongIds=[];sStreak=0;
  enterQuizView();   // モードグリッド退避＋出題を画面先頭へ
  stopMockTimer();
  if(mode==='mock'){
    quizPool=shuffle(QUESTIONS).slice(0,20);            // 全分野ミックス20問
    if(!quizPool.length){quizarea().innerHTML=`<div class="quizcard"><p class="hint">問題がありません。</p></div>`;return;}
    store.session={mode:'mock',ids:quizPool.map(q=>q.id),idx:0,cat:'all',mockElapsed:0};save(); // 模試も中断復帰の対象（離脱で消えない）
    startMockTimer(0);showQ();return;
  }
  if(mode==='daily'){
    const due=dueList();                                   // due昇順（期日超過が先）
    const reviews=bucketShuffle(due.filter(q=>getCard(q.id))); // 既習＝due日バケット内でシャッフル（同due札のファイル順=qa偏重のタイブレークを断つ）
    const news=shuffle(due.filter(q=>!getCard(q.id)));     // 未習＝シャッフル（形式が偏らないよう毎回混ぜる）
    const newsPick=news.slice(0,6),reserve=Math.min(2,newsPick.length); // 直前期(既習だらけ)でも未習を最低2問は導入＝新範囲が永久に出ない問題を防ぐ
    quizPool=reviews.slice(0,12-reserve).concat(newsPick).slice(0,12);
    if(!quizPool.length)quizPool=shuffle(QUESTIONS.filter(q=>!isMastered(q.id))).slice(0,8);
    if(!quizPool.length)quizPool=shuffle(QUESTIONS).slice(0,8);
  }
  else if(mode==='review'){quizPool=shuffle(QUESTIONS.filter(q=>isWeak(q.id)));
    if(!quizPool.length){quizarea().innerHTML=`<div class="quizcard result"><div class="emoji">✨</div><div class="msg">弱点はありません。「今日の学習」で新しい問題に挑戦しましょう。</div></div>`;return;}}
  else if(mode==='bookmark'){const ids=new Set((store.bookmarks||[]).filter(k=>k.indexOf('q:')===0).map(k=>k.slice(2)));quizPool=shuffle(QUESTIONS.filter(q=>ids.has(q.id)));
    if(!quizPool.length){quizarea().innerHTML=`<div class="quizcard"><p class="hint">付箋はまだありません。問題の上の ☆ を押すと、ここに集まります。</p></div>`;return;}}
  else{quizPool=shuffle(QUESTIONS.filter(q=>q.type===mode&&(quizCat==='all'||q.cat===quizCat)));
    if(!quizPool.length){quizarea().innerHTML=`<div class="quizcard"><p class="hint">この分野×形式の問題はありません。分野を「全分野」に。</p></div>`;return;}}
  store.session={mode,ids:quizPool.map(q=>q.id),idx:0,cat:quizCat};save(); // 中断復帰用にセッションを保存
  showQ();
}
function resumeSession(){const s=store.session;if(!s||!Array.isArray(s.ids)){return;}
  go('quiz');                                        // #quizarea を用意（renderQuiz が quizMode=null にする）
  quizMode=s.mode;quizCat=s.cat||'all';
  quizPool=s.ids.map(id=>QUESTIONS.find(q=>q.id===id)).filter(Boolean);
  quizIdx=Math.min(s.idx||0,quizPool.length);sCorrect=0;sAnswered=0;
  enterQuizView();   // 復帰時もモードグリッドを退避して出題を前面に
  if(!quizPool.length){store.session=null;save();return;}
  if(quizMode==='mock')startMockTimer(s.mockElapsed||0);   // 模試はタイマーを保存済み経過から再開
  showQ();
}
function openCreate(){go('prog');setTimeout(()=>{const b=document.querySelector('#uqBox');if(b){b.open=true;b.scrollIntoView({behavior:'smooth',block:'start'});const f=b.querySelector('#uqQ');if(f)f.focus({preventScroll:true});}},60);}
function showQ(){
  const area=quizarea();
  if(quizIdx>=quizPool.length){
    store.session=null;save();                       // セッション完走＝中断状態をクリア
    const isMock=quizMode==='mock';const elapsed=isMock?Math.floor((Date.now()-quizMockStart)/1000):0;stopMockTimer();
    const pct=sAnswered?Math.round(sCorrect/sAnswered*100):0;
    const e=pct>=80?'🏆':pct>=50?'👍':'📚';
    const msg=pct>=80?'お見事。定着が進みました。':pct>=50?'いい調子。弱点を復習しましょう。':'反復が力に。忘れた頃に自動で戻ってきます。';
    const wrongN=[...new Set(sWrongIds)].length;   // ユニーク誤答数（重複評価を一度に）
    area.innerHTML=`<div class="quizcard result"><div class="emoji">${e}</div><div class="big">${sCorrect}/${sAnswered}</div>
      <div class="msg">正答率 ${pct}%　—　${msg}</div>
      ${isMock?`<div class="msg" style="font-weight:700">⏱ 所要時間 ${fmtSec(elapsed)}（1問あたり約${sAnswered?Math.round(elapsed/sAnswered):0}秒）</div><div class="msg" style="font-size:.74rem;color:var(--sub)">※解説の閲覧時間も含む参考値です</div>`:''}
      ${wrongN?`<button class="btn wide" id="rewrong" style="background:var(--ng-btn);color:#fff">✗ 間違えた ${wrongN}問を見直す</button>`:''}
      <button class="btn wide" id="again"${wrongN?' style="margin-top:9px"':''}>続けて次のセット</button>
      <button class="btn ghost wide" id="back" style="margin-top:9px">モード選択へ</button></div>`;
    const rw=area.querySelector('#rewrong');if(rw)rw.addEventListener('click',reviewWrong);
    area.querySelector('#again').addEventListener('click',()=>startQuiz(quizMode));
    area.querySelector('#back').addEventListener('click',()=>renderQuiz());
    try{window.scrollTo(0,0);}catch(_){}
    renderHome();if(gSignedIn)cloudSync();return;
  }
  if(store.session){store.session.idx=quizIdx;save();} // 中断復帰用に現在位置を保存
  const q=quizPool[quizIdx];
  const prog=`<div class="progressbar" role="progressbar" aria-valuemin="0" aria-valuemax="${quizPool.length}" aria-valuenow="${quizIdx+1}" aria-label="${quizPool.length}問中 ${quizIdx+1}問目"><i style="width:${quizIdx/quizPool.length*100}%"></i></div>
    <div id="sstat" style="display:flex;justify-content:space-between;font-size:.72rem;color:var(--sub);margin:4px 2px 2px"><span>残り ${Math.max(0,quizPool.length-quizIdx-1)}問</span><span class="sstreak">${sStreak>1?'🔥 '+sStreak+'連続正解':''}</span></div>`;
  let commBadge='';
  if(COMMUNITY_IDS.has(q.id)){
    const up=q.up||0;
    const badge=q.v
      ?`<span class="badge" style="background:#16a34a;color:#fff">みんなの問題・✓検証済み</span>`
      :`<span class="badge" style="background:#f59e0b;color:#1a1a1a">みんなの問題・未検証</span>`;
    const cnt=up>0?`<span style="font-size:.7rem;color:var(--sub)">👍${up}</span>`:'';
    const bst='font-size:.68rem;border:1px solid var(--line);background:var(--card);border-radius:10px;padding:1px 8px;min-height:auto;cursor:pointer';
    const vote=`<button type="button" class="qvote" data-id="${esc(q.id)}" aria-label="この問題は役に立った" style="${bst};color:var(--accent)">👍 役に立った</button>`;
    const rep=`<button type="button" class="qreport" data-id="${esc(q.id)}" aria-label="この問題を通報する" style="${bst};color:var(--sub)">⚠️通報</button>`;
    commBadge=`${badge}${cnt}${vote}${rep}`;
  }
  const star=`<button type="button" class="qstar" aria-label="付箋（あとで見返す）" aria-pressed="${isBM('q',q.id)}" style="border:none;background:none;cursor:pointer;font-size:1rem;padding:0 2px;line-height:1">${isBM('q',q.id)?'⭐':'☆'}</button>`;
  const meta=`<div class="qmeta"><span class="badge">${esc(q.cat)}・${typeName(q.type)}</span>${star}${commBadge}<span>${quizIdx+1} / ${quizPool.length}</span></div>`;
  area.innerHTML=prog;const card=document.createElement('div');area.appendChild(card);
  const r={qa:renderQA,mc:renderMC,cloze:renderCloze,order:renderOrder,match:renderMatch}[q.type];
  if(!r){quizIdx++;return showQ();}
  r(q,meta,q.id,card);
  const sb=card.querySelector('.qstar');if(sb)sb.addEventListener('click',()=>{const on=toggleBM('q',q.id);sb.textContent=on?'⭐':'☆';sb.setAttribute('aria-pressed',on);toast(on?'付箋をつけました ⭐':'付箋を外しました');}); // 付箋トグル
  const vb=card.querySelector('.qvote');if(vb)vb.addEventListener('click',()=>voteCommunity(q.id,vb)); // 👍役に立った（良問の浮上→検証済み昇格の起点）
  const rep=card.querySelector('.qreport');if(rep)rep.addEventListener('click',()=>reportCommunity(q.id,rep)); // 共有問題の通報（誤り/不適切→自動降格の起点）
  const h=card.querySelector('h2,.qtext');if(h){h.setAttribute('tabindex','-1');h.focus({preventScroll:true});}
  try{window.scrollTo(0,0);}catch(_){}   // 各問を画面先頭に（出題が下に隠れない）
}
function typeName(t){return{qa:'一問一答',mc:'4択',cloze:'穴埋め',order:'並べ替え',match:'関係づけ'}[t];}
function nextBtn(){return `<button class="btn wide qstick" style="margin-top:14px" id="nextQ">次へ →</button>`;}
function bindNext(s){const n=s.querySelector('#nextQ');if(n)n.addEventListener('click',()=>{quizIdx++;showQ();});}
// 採点の取り消し（MCの誤タップ救済）：採点前の状態を退避→復元して同じ問題を再描画
function snapAnswer(id){return {card:store.cards[id]?JSON.parse(JSON.stringify(store.cards[id])):null,sA:sAnswered,sC:sCorrect,sS:sStreak,sW:sWrongIds.length,tA:store.totalAnswered||0,tC:store.totalCorrect||0,dd:(store.dailyDone&&store.dailyDone[todayStr()])||0,streak:store.streak,lastDate:store.lastDate};}
function undoAnswer(snap,id){if(snap.card==null)delete store.cards[id];else store.cards[id]=snap.card;
  sAnswered=snap.sA;sCorrect=snap.sC;sStreak=snap.sS;sWrongIds=sWrongIds.slice(0,snap.sW);
  store.totalAnswered=snap.tA;store.totalCorrect=snap.tC;store.streak=snap.streak;store.lastDate=snap.lastDate;
  store.dailyDone=store.dailyDone||{};store.dailyDone[todayStr()]=snap.dd;save();showQ();}
// 結果画面：間違えた問題だけをもう一周（最も学習効果が高い瞬間。Quizlet/UWorld流）
function reviewWrong(){const ids=[...new Set(sWrongIds)];const pool=ids.map(id=>QUESTIONS.find(q=>q.id===id)).filter(Boolean);if(!pool.length)return;quizPool=pool;quizIdx=0;sCorrect=0;sAnswered=0;sStreak=0;sWrongIds=[];store.session=null;enterQuizView();showQ();}
// 出題中のキーボード操作（PC学習の定番：MC=1〜6 / 表示・採点=Space・1・0 / 次へ=Enter・→）
document.addEventListener('keydown',e=>{
  const qv=document.getElementById('quiz');if(!qv||!qv.classList.contains('active'))return;
  const t=e.target;if(t&&(t.tagName==='INPUT'||t.tagName==='TEXTAREA'||t.isContentEditable))return;
  if(e.metaKey||e.ctrlKey||e.altKey)return;
  const area=document.getElementById('quizarea');if(!area)return;
  const nb=area.querySelector('#nextQ');
  if((e.key==='Enter'||e.key==='ArrowRight')&&nb){e.preventDefault();nb.click();return;}
  const choices=area.querySelectorAll('#ch .choice');
  if(choices.length&&/^[1-6]$/.test(e.key)){const b=choices[+e.key-1];if(b&&!b.disabled){e.preventDefault();b.click();}return;}
  const showA=area.querySelector('#showA'),allrev=area.querySelector('#allrev');
  if(e.key===' '){if(showA){e.preventDefault();showA.click();return;}if(allrev){e.preventDefault();allrev.click();return;}}
  const g0=area.querySelector('#g0'),g1=area.querySelector('#g1'),g2=area.querySelector('#g2'); // qa/cloze 3段階：1=あいまい 2=できた 3=楽勝
  if(e.key==='1'&&g0&&!g0.disabled){e.preventDefault();g0.click();return;}
  if(e.key==='2'&&g1&&!g1.disabled){e.preventDefault();g1.click();return;}
  if(e.key==='3'&&g2&&!g2.disabled){e.preventDefault();g2.click();return;}
  const ck=area.querySelector('#ck');if(e.key==='Enter'&&ck&&!ck.disabled){e.preventDefault();ck.click();}
